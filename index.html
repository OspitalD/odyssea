    const block = getCurrentBlock(week);
    const todayDay = WEEK_DAYS.find(d => d.idx === getCurrentWeekDayIdx());
    const requestedDay = query.day || (todayDay?.strength ? todayDay.sessionDay : null);
    const day = WEEK_DAYS.find(d => d.sessionDay === requestedDay) || WEEK_DAYS[0];
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const exos = (programmeByDay && day.sessionDay) ? (programmeByDay[day.sessionDay] || []) : null;

    const [setsBySlot, refreshSets] = useSetsForDay(week, day.sessionDay);
    const [openSlot, setOpenSlot] = useState(1);

    const [streakTick, setStreakTick] = useState(0);
    const streak = useStreak(streakTick);

    const [endPhrase, setEndPhrase] = useState(null);
    const [endingSessionId, setEndingSessionId] = useState(null);
    const [terminating, setTerminating] = useState(false);
    const [recentBadges, setRecentBadges] = useState([]); // queue de badges fraîchement débloqués
    const onBadgesUnlocked = useCallback((newly) => {
      if (newly && newly.length) setRecentBadges(b => [...b, ...newly]);
    }, []);
    const [completedBlock, setCompletedBlock] = useState(null);
    const [council, setCouncil] = useState(null);

    // Vérif Conseil des Dieux : à chaque mount de la page (= ouverture app),
    // si dimanche et pas encore vu aujourd'hui → afficher.
    useEffect(() => {
      (async () => {
        if (await shouldShowCouncil()) {
          const recap = await computeWeeklyRecap();
          setCouncil(recap);
        }
      })();
    }, []);

    const closeCouncil = async () => {
      await markCouncilSeen();
      setCouncil(null);
    };

    // Les Sirènes — détection idle 20 min
    const [sirensVisible, dismissSirens] = useSirensWarning(setsBySlot, day.sessionDay);

    // Le Souffle — bouton optionnel pour DL/Squat lourds
    const [showBreath, setShowBreath] = useState(false);
    const dayHasHeavyLift = exos && exos.some(ex =>
      /deadlift|back squat|zercher squat/i.test(ex.exerciseName || '')
    );

    // Mode Hyperfocus (SPEC §11) — fond plus dark, nav cachée, only current exo
    const [hyperfocus, setHyperfocus] = useState(false);
    useEffect(() => {
      // Toggle CSS class sur app-shell pour cacher la bottom nav.
      const shell = document.querySelector('.app-shell');
      if (!shell) return;
      if (hyperfocus) shell.classList.add('hyperfocus');
      else shell.classList.remove('hyperfocus');
      return () => shell.classList.remove('hyperfocus');
    }, [hyperfocus]);

    // Activation TERMINER : ≥1 set validé sur CHAQUE exo.
    const canTerminate = exos && exos.length > 0 && setsBySlot &&
      exos.every(ex => (setsBySlot[ex.exerciseSlot] || []).length > 0);

    const onTerminate = async () => {
      if (!canTerminate || terminating) return;
      setTerminating(true);
      // Marquer la session comme complétée + récupérer son id pour le mood
      let sessionRowId = null;
      try {
        const existing = await db.sessions.where({ week, sessionDay: day.sessionDay }).first();
        if (existing) {
          await db.sessions.update(existing.id, { completedAt: new Date().toISOString(), syncedAt: null });
          sessionRowId = existing.id;
        } else {
          sessionRowId = await db.sessions.add({
            week, sessionDay: day.sessionDay,
            startedAt: new Date().toISOString(),
            completedAt: new Date().toISOString(),
            syncedAt: null,
          });
        }
      } catch {}
      setEndingSessionId(sessionRowId);
      // Bump streak (1× par jour max — multiples sessions le même jour ne cumulent pas)
      try { await bumpStreak(); } catch {}
      setStreakTick(t => t + 1);
      // Check badges après bumpStreak (Premier Pas, Sirènes, Héraclès…)
      try {
        const newly = await checkBadges();
        if (newly.length) setRecentBadges(b => [...b, ...newly]);
      } catch {}
      // Check transition de bloc (cycliquement : on a complété le bloc précédent)
      try {
        const finishedBlock = await checkBlockTransition(week);
        if (finishedBlock) setCompletedBlock(finishedBlock);
      } catch {}
      // Pioche phrase et l'affiche
      const phrase = await pickEndPhrase();
      setEndPhrase(phrase);
      // Sync en arrière-plan pendant le sas de décompression
      syncPendingSets().catch(() => {});
      // La nav est désormais déclenchée par SessionEndOverlay (mood picked
      // ou timeout 7s) — voir handleEndComplete ci-dessous.
    };

    const handleEndComplete = useCallback(() => {
      setEndPhrase(null);
      setEndingSessionId(null);
      setTerminating(false);
      navigate(ROUTES.SEMAINE);
    }, [navigate]);

    return (
      <>
        <PageWrap title={day.label} subtitle={`${day.fr} · Bloc ${block.id} · ${block.name} · Sem ${week}/${block.weeks[1]}`}>
          <div className="greek" style={{
            marginBottom: 14,
            fontSize: 14,
            fontStyle: 'italic',
            color: 'var(--text-secondary)',
            textAlign: 'center',
            lineHeight: 1.4,
            opacity: 0.85,
          }}>
            « {pickMantraOfDay()} »
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <AthxCountdown />
            {streak && <StreakBadge streak={streak} />}
          </div>
          {/* Compagnon symbolique : "Athéna observe" — visible quand au moins
              1 set a été validé sur la session du jour (la session est en cours). */}
          {setsBySlot && Object.values(setsBySlot).some(arr => arr.length > 0) && <AthenaPresence />}

          {/* Bouton Le Souffle — visible avant le 1er set sur les sessions DL/Squat lourd */}
          {dayHasHeavyLift && setsBySlot && Object.values(setsBySlot).every(arr => arr.length === 0) && (
            <button type="button" onClick={() => setShowBreath(true)}
              style={{
                marginTop: 10,
                width: '100%',
                background: 'transparent',
                border: '1px dashed var(--accent-royal)',
                borderRadius: 10,
                color: 'var(--accent-royal)',
                padding: '10px 14px',
                fontSize: 11,
                letterSpacing: '1.5px',
                textTransform: 'uppercase',
                fontWeight: 700,
                cursor: 'pointer',
              }}>
              ⊙ Le Souffle · respiration pré-session
            </button>
          )}

          {/* Les Sirènes — apparait après 20 min idle */}
          {sirensVisible && <SirensWarning onDismiss={dismissSirens} />}

          {/* Lien discret vers la carte du voyage */}
          <button type="button" onClick={() => navigate(ROUTES.CARTE)}
            style={{
              marginTop: 10,
              width: '100%',
              background: 'transparent',
              border: '1px solid var(--border-subtle)',
              borderRadius: 10,
              color: 'var(--text-secondary)',
              padding: '8px 12px',
              fontSize: 11,
              letterSpacing: '1.2px',
              textTransform: 'uppercase',
              fontWeight: 700,
              cursor: 'pointer',
            }}>
            ⟶ Voir la carte du voyage
          </button>
          <LotophagesWarning streak={streak} onPardonUsed={() => setStreakTick(t => t + 1)} />
          {!day.strength ? (
            <Card style={{ marginTop: 12 }}>
              <div style={{ color: 'var(--text-secondary)' }}>
                Pas de session strength aujourd'hui. {day.label}.
              </div>
            </Card>
          ) : exos === null ? (
            <Card style={{ marginTop: 12 }}><div style={{ color: 'var(--text-secondary)' }}>Chargement du programme…</div></Card>
          ) : exos.length === 0 ? (
            <Card style={{ marginTop: 12 }}>
              <div style={{ color: 'var(--text-primary)', fontSize: 12, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>
                Programme non chargé
              </div>
              <div style={{ color: 'var(--text-secondary)' }}>Reconnecte-toi pour charger la session.</div>
            </Card>
          ) : (
            <>
              {/* Toggle Mode Hyperfocus */}
              <button type="button" onClick={() => setHyperfocus(h => !h)}
                style={{
                  marginTop: 10,
                  width: '100%',
                  background: hyperfocus ? 'var(--accent-royal)' : 'transparent',
                  border: `1px solid ${hyperfocus ? 'var(--accent-royal)' : 'var(--border-strong)'}`,
                  borderRadius: 10,
                  color: hyperfocus ? '#0D0F0E' : 'var(--text-secondary)',
                  padding: '8px 0',
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: '1.5px',
                  textTransform: 'uppercase',
                  cursor: 'pointer',
                }}>
                {hyperfocus ? '◉ Sortir Hyperfocus' : '◎ Hyperfocus'}
              </button>

              {exos
                .filter(ex => !hyperfocus || ex.exerciseSlot === openSlot)
                .map(ex => (
                <ExoCard
                  key={ex.id}
                  ex={ex}
                  week={week}
                  sessionDay={day.sessionDay}
                  sets={setsBySlot ? (setsBySlot[ex.exerciseSlot] || []) : null}
                  isOpen={hyperfocus ? true : (openSlot === ex.exerciseSlot)}
                  onToggle={() => setOpenSlot(openSlot === ex.exerciseSlot ? null : ex.exerciseSlot)}
                  onSetValidated={refreshSets}
                  onBadgesUnlocked={onBadgesUnlocked}
                />
              ))}

              {/* Bouton TERMINER — large, fond olympus or, fixe en bas du flow.
                  Actif uniquement quand chaque exo a ≥1 set validé. */}
              <button
                type="button"
                onClick={onTerminate}
                disabled={!canTerminate || terminating}
                style={{
                  width: '100%',
                  marginTop: 20,
                  background: canTerminate ? 'var(--accent-olympus)' : 'var(--bg-surface-hover)',
                  color: canTerminate ? '#0D0F0E' : 'var(--text-tertiary)',
                  border: 'none',
                  borderRadius: 14,
                  minHeight: 56,
                  padding: '18px 0',
                  fontSize: 14,
                  fontWeight: 800,
                  letterSpacing: '2px',
                  textTransform: 'uppercase',
                  cursor: canTerminate ? 'pointer' : 'not-allowed',
                  opacity: terminating ? 0.6 : 1,
                }}
              >
                {terminating ? '…' : 'Terminer'}
              </button>

              {!canTerminate && (
                <div style={{
                  marginTop: 8,
                  textAlign: 'center',
                  fontSize: 11,
                  color: 'var(--text-tertiary)',
                  letterSpacing: '0.5px',
                }}>
                  Au moins 1 set validé sur chaque exo pour terminer.
                </div>
              )}
            </>
          )}
        </PageWrap>
        {endPhrase && (
          <SessionEndOverlay
            phrase={endPhrase}
            sessionId={endingSessionId}
            onComplete={handleEndComplete}
          />
        )}
        {recentBadges.length > 0 && (
          <BadgeToast
            badge={recentBadges[0]}
            onDone={() => setRecentBadges(b => b.slice(1))}
          />
        )}
        {completedBlock && (
          <BlockCompleteModal
            block={completedBlock}
            onClose={() => { setCompletedBlock(null); play(soundBell); }}
          />
        )}
        {council && (
          <CouncilOverlay recap={council} onClose={closeCouncil} />
        )}
        {showBreath && (
          <BreathOverlay onClose={() => setShowBreath(false)} />
        )}
      </>
    );
  };

  const DayCard = ({ day, programme, isToday, onTap }) => {
    const exos = programme || [];
    const isClickable = day.strength && exos.length > 0;
    const accentColor = isToday ? 'var(--accent-laurel)' : day.strength ? 'var(--text-primary)' : 'var(--text-secondary)';
    return (
      <button
        type="button"
        onClick={isClickable ? onTap : undefined}
        disabled={!isClickable}
        style={{
          width: '100%',
          textAlign: 'left',
          background: 'var(--bg-surface)',
          border: `1px solid ${isToday ? 'var(--accent-laurel)' : 'var(--border-subtle)'}`,
          borderRadius: 14,
          padding: 14,
          marginTop: 10,
          color: 'inherit',
          cursor: isClickable ? 'pointer' : 'default',
          opacity: day.strength ? 1 : 0.6,
          transition: 'border-color var(--dur-fast) var(--ease-out)',
        }}
      >
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12, marginBottom: exos.length ? 10 : 0 }}>
          <div>
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
              {day.fr}
            </div>
            <div style={{ fontSize: 16, fontWeight: 800, color: accentColor, marginTop: 2 }}>
              {day.label}
            </div>
          </div>
          <div style={{ fontSize: 18, color: accentColor }} aria-label={isToday ? 'aujourd’hui' : ''}>
            {isToday ? '⏰' : day.strength ? '⏳' : '·'}
          </div>
        </div>
        {exos.length > 0 && (
          <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
            {exos.map(ex => (
              <li key={ex.id} style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                <span style={{ color: 'var(--text-tertiary)', marginRight: 6 }}>{ex.exerciseSlot}.</span>
                {ex.exerciseName}
              </li>
            ))}
          </ul>
        )}
      </button>
    );
  };

  const SemainePage = () => {
    const week = getCurrentWeek();
    const block = getCurrentBlock(week);
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const todayIdx = getCurrentWeekDayIdx();
    const navigate = useNavigate();

    const empty = programmeByDay && Object.keys(programmeByDay).length === 0;

    return (
      <PageWrap title="Semaine" subtitle={`Bloc ${block.id} · ${block.name} · Sem ${week}/${block.weeks[1]}`}>
        {programmeByDay === null && (
          <Card>
            <div style={{ color: 'var(--text-secondary)' }}>Chargement…</div>
          </Card>
        )}
        {empty && (
          <Card>
            <div style={{ color: 'var(--text-primary)', fontSize: 12, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>
              Programme non chargé
            </div>
            <div style={{ color: 'var(--text-secondary)' }}>
              Reconnecte-toi à internet et rouvre l'app : le programme se chargera au prochain démarrage.
            </div>
          </Card>
        )}
        {programmeByDay && !empty && WEEK_DAYS.map(day => (
          <DayCard
            key={day.idx}
            day={day}
            programme={day.sessionDay ? programmeByDay[day.sessionDay] : null}
            isToday={day.idx === todayIdx}
            onTap={() => navigate(`${ROUTES.AUJOURDHUI}?day=${day.sessionDay}`)}
          />
        ))}
      </PageWrap>
    );
  };

  /* ==========================================================
     Carte du Voyage (SPEC §11 Étape 10) — SVG parchemin stylisé
     Troie → Lotophages → Cyclope → Circé → Ithaque, avec dot avatar
     positionné selon la semaine courante.
     ========================================================== */
  const CartePage = () => {
    const week = getCurrentWeek();
    const block = getCurrentBlock(week);

    // 4 stations, espacées proportionnellement (week 1 = Troie, week 20 = Ithaque)
    // Chaque station = nœud sur un parcours méandrique.
    const stations = [
      { id: 'troie',      label: 'Troie',          x:  10, y: 84, weekStart: 0  },
      { id: 'lotophages', label: 'Les Lotophages', x:  30, y: 30, weekStart: 1  },
      { id: 'cyclope',    label: 'Le Cyclope',     x:  55, y: 78, weekStart: 7  },
      { id: 'circe',      label: 'Circé',          x:  78, y: 32, weekStart: 13 },
      { id: 'ithaque',    label: 'Ithaque',        x:  92, y: 60, weekStart: 17 },
    ];

    // Position de l'avatar sur le parcours en fonction de la semaine.
    const avatarPos = (() => {
      if (week >= 17) {
        const ratio = Math.min(1, (week - 17) / 4);
        return interp(stations[3], stations[4], ratio);
      }
      if (week >= 13) {
        return interp(stations[2], stations[3], (week - 13) / 4);
      }
      if (week >= 7) {
        return interp(stations[1], stations[2], (week - 7) / 6);
      }
      if (week >= 1) {
        return interp(stations[0], stations[1], (week - 1) / 6);
      }
      return stations[0];
    })();

    const blockColor = ['var(--text-secondary)', 'var(--accent-laurel)', 'var(--accent-blood)', 'var(--accent-royal)', 'var(--accent-olympus)'][block.id] || 'var(--text-secondary)';

    return (
      <PageWrap title="Carte du Voyage" subtitle={`Bloc ${block.id} · ${block.name} · Sem ${week}/20`}>
        <div style={{
          background: 'rgba(232, 200, 140, 0.04)',
          border: '1px solid var(--border-subtle)',
          borderRadius: 14,
          padding: 16,
          position: 'relative',
        }}>
          <svg viewBox="0 0 100 110" style={{ width: '100%', height: 'auto', display: 'block' }} aria-label="Carte du Voyage Troie → Ithaque">
            {/* Parchemin texture (juste un rect rounded légèrement teinté) */}
            <defs>
              <pattern id="parchment" width="3" height="3" patternUnits="userSpaceOnUse">
                <rect width="3" height="3" fill="rgba(232, 200, 140, 0.02)" />
                <circle cx="0.5" cy="0.5" r="0.15" fill="rgba(232, 200, 140, 0.05)" />
              </pattern>
            </defs>
            <rect x="2" y="2" width="96" height="106" rx="3" fill="url(#parchment)" />

            {/* Parcours méandrique connectant les stations */}
            <path d="M 10 84 Q 18 60, 30 30 Q 42 0, 55 78 Q 68 100, 78 32 Q 86 6, 92 60"
                  fill="none"
                  stroke="var(--accent-olympus)"
                  strokeWidth="0.5"
                  strokeDasharray="2 1"
                  opacity="0.5" />

            {/* Stations */}
            {stations.map(s => {
              const isCurrent = s.id === ['troie','lotophages','cyclope','circe','ithaque'][block.id];
              const isPast = week >= (stations[stations.findIndex(x => x.id === s.id) + 1]?.weekStart ?? 999);
              return (
                <g key={s.id}>
                  <circle cx={s.x} cy={s.y} r={isCurrent ? 2.4 : 1.6}
                          fill={isPast ? 'var(--accent-laurel)' : isCurrent ? 'var(--accent-olympus)' : 'var(--bg-surface)'}
                          stroke={isCurrent ? 'var(--accent-olympus)' : 'var(--text-tertiary)'}
                          strokeWidth="0.6" />
                  <text x={s.x} y={s.y + 6}
                        textAnchor="middle"
                        fontSize="3.5"
                        fontFamily="EB Garamond, serif"
                        fontStyle="italic"
                        fill={isCurrent ? 'var(--accent-olympus)' : isPast ? 'var(--accent-laurel)' : 'var(--text-secondary)'}>
                    {s.label}
                  </text>
                </g>
              );
            })}

            {/* Avatar dot — Ω miniature sur le parcours */}
            <g transform={`translate(${avatarPos.x}, ${avatarPos.y - 0.4})`}>
              <circle r="3.5" fill="var(--bg-primary)" stroke={blockColor} strokeWidth="0.8">
                <animate attributeName="r" values="3.5;4;3.5" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <text textAnchor="middle"
                    dominantBaseline="middle"
                    fontSize="3.5"
                    fontFamily="EB Garamond, serif"
                    fontStyle="italic"
                    fill={blockColor}
                    fontWeight="bold">Ω</text>
            </g>
          </svg>
          <div style={{
            marginTop: 12,
            textAlign: 'center',
            fontSize: 11,
            color: 'var(--text-tertiary)',
            textTransform: 'uppercase',
            letterSpacing: '1.5px',
            fontWeight: 700,
          }}>
            {block.name} · {week >= 17 ? 'Retour à Ithaque' : 'En route'}
          </div>
        </div>

        <Card style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Étape narrative
          </div>
          <div className="greek" style={{ fontSize: 14, fontStyle: 'italic', color: 'var(--text-primary)', lineHeight: 1.5 }}>
            {NARRATIVE_BY_BLOCK[block.id] || ''}
          </div>
        </Card>
      </PageWrap>
    );
  };

  // Helper interp (linéaire entre 2 stations 2D).
  function interp(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  // Texte narratif par bloc — affiché sur /carte
  const NARRATIVE_BY_BLOCK = {
    1: "Tu quittes Troie. Les Lotophages t'appellent à oublier ton but. Résiste — la patience est ton arme.",
    2: "Le Cyclope se dresse. Force frontale, pas de mêtis ne suffit ici. Frappe juste, sois précis.",
    3: "Circé transforme ce que tu es. Accepte la métamorphose, le pic est ton vrai visage.",
    4: "Ithaque approche. L'arc t'attend. Tout ce que tu as enduré, c'était pour cet instant.",
  };

  /* ==========================================================
     Le Souffle (SPEC §11 Étape 13) — respiration carrée 4-4-4-4
     pour centrer avant session lourde. 5 cycles, animation simple.
     ========================================================== */
  const BreathOverlay = ({ onClose }) => {
    const PHASES = [
      { label: 'Inspire', dur: 4000, scale: 1.4 },
      { label: 'Tiens',   dur: 4000, scale: 1.4 },
      { label: 'Expire',  dur: 4000, scale: 0.8 },
      { label: 'Tiens',   dur: 4000, scale: 0.8 },
    ];
    const TOTAL_CYCLES = 5;
    const [cycle, setCycle] = useState(0);
    const [phaseIdx, setPhaseIdx] = useState(0);

    useEffect(() => {
      if (cycle >= TOTAL_CYCLES) return;
      const phase = PHASES[phaseIdx];
      const t = setTimeout(() => {
        const next = (phaseIdx + 1) % PHASES.length;
        if (next === 0) setCycle(c => c + 1);
        setPhaseIdx(next);
      }, phase.dur);
      return () => clearTimeout(t);
    }, [phaseIdx, cycle]);

    const phase = PHASES[phaseIdx];
    const finished = cycle >= TOTAL_CYCLES;

    return (
      <div style={{
        position: 'fixed', inset: 0, zIndex: 240,
        background: 'rgba(8,10,9,0.97)',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 32,
        padding: 32,
        animation: 'fade-in 600ms var(--ease-out)',
      }}>
        <div style={{
          fontSize: 11,
          color: 'var(--accent-royal)',
          textTransform: 'uppercase',
          letterSpacing: '2px',
          fontWeight: 800,
        }}>Le Souffle · {finished ? 'Terminé' : `Cycle ${cycle + 1}/${TOTAL_CYCLES}`}</div>

        <div style={{
          width: 220, height: 220,
          display: 'grid',
          placeItems: 'center',
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute',
            width: '100%', height: '100%',
            borderRadius: '50%',
            border: '1.5px solid var(--accent-royal)',
            opacity: 0.15,
          }} />
          <div style={{
            width: 160, height: 160,
            borderRadius: '50%',
            background: 'rgba(185,144,224,0.08)',
            border: '2px solid var(--accent-royal)',
            transform: finished ? 'scale(1)' : `scale(${phase.scale})`,
            transition: `transform ${phase.dur}ms cubic-bezier(0.4, 0.0, 0.2, 1)`,
            display: 'grid',
            placeItems: 'center',
          }}>
            <div className="greek" style={{
              fontSize: 22,
              fontStyle: 'italic',
              color: 'var(--text-primary)',
            }}>{finished ? 'Centré' : phase.label}</div>
          </div>
        </div>

        <button type="button" onClick={onClose}
          style={{
            background: finished ? 'var(--accent-laurel)' : 'transparent',
            border: finished ? 'none' : '1px solid var(--border-strong)',
            borderRadius: 12,
            color: finished ? '#0D0F0E' : 'var(--text-secondary)',
            padding: '12px 24px',
            fontSize: 12,
            fontWeight: 800,
            letterSpacing: '1.5px',
            textTransform: 'uppercase',
            cursor: 'pointer',
          }}>{finished ? 'Commencer la session' : 'Sortir'}</button>
      </div>
    );
  };

  /* ==========================================================
     Les Sirènes (SPEC §11 Étape 13) — anti-distraction
     Si une session est démarrée et quittée sans rien logger pendant
     20 min, notif in-app subtile : "Les Sirènes t'appellent. Reviens
     au mât." Bienveillant, mythologique, recadre.
     ========================================================== */
  const SIRENS_IDLE_MS = 20 * 60 * 1000;

  // Hook : surveille le temps écoulé depuis le dernier set validé sur la
  // session du jour (avec sets[] dispo). Si > 20 min ET dernier set < 60 min
  // ET on est revenu sur l'app (visibilitychange), affiche le warning.
  const useSirensWarning = (setsBySlot, sessionDay) => {
    const [show, setShow] = useState(false);
    useEffect(() => {
      if (!setsBySlot) return;
      // Le set le plus récent
      const allSetsForDay = Object.values(setsBySlot).flat();
      if (allSetsForDay.length === 0) return; // session pas démarrée

      const latest = allSetsForDay.reduce((m, s) =>
        (new Date(s.completedAt) > new Date(m.completedAt)) ? s : m,
        allSetsForDay[0]);
      if (!latest?.completedAt) return;

      const checkIdle = () => {
        const ms = Date.now() - new Date(latest.completedAt).getTime();
        if (ms > SIRENS_IDLE_MS && ms < 4 * SIRENS_IDLE_MS) {
          setShow(true);
        }
      };

      // Check au focus / visibilitychange (l'utilisateur revient sur l'app)
      const onVis = () => { if (!document.hidden) checkIdle(); };
      document.addEventListener('visibilitychange', onVis);
      window.addEventListener('focus', onVis);
      // Check une fois immédiatement
      checkIdle();
      return () => {
        document.removeEventListener('visibilitychange', onVis);
        window.removeEventListener('focus', onVis);
      };
    }, [setsBySlot, sessionDay]);
    return [show, () => setShow(false)];
  };

  // Calcule le récap de la semaine courante (lundi → dimanche).
  async function computeWeeklyRecap() {
    const week = getCurrentWeek();
    const allSets = await db.sets.toArray();
    const allSessions = await db.sessions.toArray();

    const weekSets = allSets.filter(s => s.week === week);
    const weekSessions = allSessions.filter(s => s.week === week && s.completedAt);
    const prCount = weekSets.filter(s => s.isPR).length;
    const totalVL = volumeLoad(weekSets);

    // Compare au volume sem-1
    const prevWeekSets = allSets.filter(s => s.week === week - 1);
    const prevVL = volumeLoad(prevWeekSets);
    const deltaVL = prevVL > 0 ? ((totalVL - prevVL) / prevVL) * 100 : null;

    // Génération suggestion : zone qui a le moins reçu d'attention.
    // Compte sets par axe radar.
    const counts = { squat: 0, deadlift: 0, push: 0, pull: 0 };
    for (const s of weekSets) {
      const std = matchStandard(s.exerciseName);
      if (std) counts[std.radarAxis] = (counts[std.radarAxis] || 0) + 1;
    }
    const minAxis = Object.entries(counts).reduce((m, [k, v]) =>
      v < m.v ? { k, v } : m, { k: null, v: Infinity });

    let suggestion = "";
    if (minAxis.k && minAxis.v < 2) {
      const labelMap = { squat: 'squat', deadlift: 'deadlift', push: 'pushing', pull: 'pulling' };
      suggestion = `Athéna te dit : ton ${labelMap[minAxis.k]} a peu vu d'attention. Prochaine épreuve : 2 sessions ${labelMap[minAxis.k]} solides.`;
    } else if (prCount > 0) {
      suggestion = `Athéna te dit : ${prCount} PR cette semaine. La progression est nette. Continue avec discipline.`;
    } else {
      suggestion = `Athéna te dit : la régularité est plus précieuse que l'éclat. Tu tiens le cap.`;
    }

    return {
      week,
      sessionsCompleted: weekSessions.length,
      prCount,
      totalVL,
      deltaVL,
      suggestion,
    };
  }

        const json = await res.json();
        if (json.ok) setPingState({ status: 'ok', msg: json.message || 'API alive' });
        else setPingState({ status: 'err', msg: json.error || 'Réponse inattendue' });
      } catch (e) {
        setPingState({ status: 'err', msg: e.message || 'Erreur réseau' });
      }
    };
    const pingColor = {
      idle:    'var(--text-tertiary)',
      loading: 'var(--accent-royal)',
      ok:      'var(--accent-laurel)',
      err:     'var(--accent-blood)',
    }[pingState.status];
    // Rewards UI state
    const [rewardsRefresh, setRewardsRefresh] = useState(0);
    const rewards = useRewards(rewardsRefresh);
    const [editingMilestone, setEditingMilestone] = useState(null);
    const [editingValue, setEditingValue] = useState('');

    const startEdit = (milestone) => {
      setEditingMilestone(milestone.id);
      setEditingValue(rewards?.[milestone.id]?.description || '');
    };
    const commitEdit = async () => {
      if (editingMilestone) {
        await saveReward(editingMilestone, editingValue.trim());
        setEditingMilestone(null);
        setEditingValue('');
        setRewardsRefresh(r => r + 1);
      }
    };
    const cancelEdit = () => { setEditingMilestone(null); setEditingValue(''); };

    // Sounds toggle
    const [soundsOn, setSoundsOn] = useState(isSoundsEnabled());
    const toggleSounds = async () => {
      const v = !soundsOn;
      await setSoundsEnabled(v);
      setSoundsOn(v);
      if (v) play(soundLyre); // preview son
    };

    return (
      <PageWrap title="Réglages" subtitle="API · ATHX · sons · récompenses · reset">
        <Card>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            API Apps Script
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)', wordBreak: 'break-all', marginBottom: 10 }}>
            {API_URL}
          </div>
          <button
            type="button"
            onClick={ping}
            style={{
              background: 'transparent',
              border: '1px solid var(--border-strong)',
              borderRadius: 10,
              color: 'var(--text-primary)',
              padding: '8px 14px',
              fontSize: 12,
              fontWeight: 700,
              letterSpacing: '0.4px',
              textTransform: 'uppercase',
              cursor: 'pointer',
            }}
          >Test connexion</button>
          {pingState.status !== 'idle' && (
            <div style={{ marginTop: 10, fontSize: 13, color: pingColor }}>{pingState.msg}</div>
          )}
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Bodyweight (kg)
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 8 }}>
            Pour les badges Atlas (squat 2× BW) et Achille (bench 1× BW).
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="number"
              inputMode="decimal"
              step="0.1"
              value={bodyweight}
              onChange={e => setBodyweight(e.target.value)}
              placeholder="ex: 78"
              style={{
                flex: 1,
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: 'var(--text-primary)',
                padding: '10px 12px',
                fontSize: 14,
                outline: 'none',
              }}
            />
            <button
              type="button"
              onClick={saveBodyweight}
              style={{
                background: bwSaved ? 'var(--accent-laurel)' : 'transparent',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: bwSaved ? '#0D0F0E' : 'var(--text-primary)',
                padding: '8px 18px',
                fontSize: 12,
                fontWeight: 700,
                letterSpacing: '0.4px',
                textTransform: 'uppercase',
                cursor: 'pointer',
                transition: 'all var(--dur-fast) var(--ease-out)',
              }}
            >{bwSaved ? '✓' : 'OK'}</button>
          </div>
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Sons
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Lyre sur PR battu, cloche sur badge / fin de bloc, tick sur milestones timer.
          </div>
          <button type="button" onClick={toggleSounds}
            style={{
              width: '100%',
              background: soundsOn ? 'var(--accent-laurel)' : 'transparent',
              border: `1px solid ${soundsOn ? 'var(--accent-laurel)' : 'var(--border-strong)'}`,
              borderRadius: 10,
              color: soundsOn ? '#0D0F0E' : 'var(--text-primary)',
              padding: '10px 14px',
              fontSize: 12,
              fontWeight: 700,
              letterSpacing: '1.2px',
              textTransform: 'uppercase',
              cursor: 'pointer',
            }}>{soundsOn ? '◉ Activés' : '◎ Désactivés'}</button>
        </Card>

        {/* Récompenses tangibles auto-définies (Étape 12) */}
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Mes récompenses
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Promesse physique pour chaque milestone. Contrat avec toi-même.
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {REWARD_MILESTONES.map(m => {
              const reward = rewards?.[m.id];
              const isEditing = editingMilestone === m.id;
              return (
                <div key={m.id} style={{
                  background: 'var(--bg-primary)',
                  border: '1px solid var(--border-subtle)',
                  borderRadius: 10,
                  padding: '10px 12px',
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>{m.label}</div>
                  {isEditing ? (
                    <div style={{ display: 'flex', gap: 6 }}>
                      <input
                        type="text"
                        value={editingValue}
                        onChange={e => setEditingValue(e.target.value)}
                        autoFocus
                        placeholder="Ex: t-shirt training"
                        style={{
                          flex: 1,
                          background: 'var(--bg-surface)',
                          border: '1px solid var(--border-strong)',
                          borderRadius: 8,
                          color: 'var(--text-primary)',
                          padding: '6px 10px',
                          fontSize: 12,
                          outline: 'none',
                        }}
                      />
                      <button type="button" onClick={commitEdit}
                        style={{ background: 'var(--accent-laurel)', border: 'none', borderRadius: 8, color: '#0D0F0E', padding: '6px 12px', fontSize: 11, fontWeight: 700, cursor: 'pointer' }}>OK</button>
                      <button type="button" onClick={cancelEdit}
                        style={{ background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 8, color: 'var(--text-secondary)', padding: '6px 10px', fontSize: 11, cursor: 'pointer' }}>×</button>
                    </div>
                  ) : (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ flex: 1, fontSize: 12, color: reward?.description ? 'var(--accent-olympus)' : 'var(--text-tertiary)', fontStyle: reward?.description ? 'normal' : 'italic' }}>
                        {reward?.description || 'Pas encore défini'}
                      </div>
                      <button type="button" onClick={() => startEdit(m)}
                        style={{ background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 8, color: 'var(--text-secondary)', padding: '4px 10px', fontSize: 10, fontWeight: 700, letterSpacing: '1px', textTransform: 'uppercase', cursor: 'pointer' }}>{reward?.description ? 'Modif' : 'Définir'}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Card>

        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Date Ithaque
          </div>
          <div>{ATHX_DATE} · ATHX Marseille</div>
        </Card>
      </PageWrap>
    );
  };

  /* ==========================================================
     APP SHELL — header avec logo Ω
     ========================================================== */
  const AppHeader = () => (
    <header style={{
      padding: '20px 16px 8px',
      display: 'flex',
      justifyContent: 'center',
    }}>
      <Logo size="sm" />
    </header>
  );

  /* ==========================================================
     Service worker registration
     ========================================================== */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  /* ==========================================================
     APP — boot :
     1. Splash si 1ère ouverture (flag localStorage)
     2. seedIfEmpty() pour le programme
     3. syncPendingSets() pour pousser les sets stockés offline
     ========================================================== */
  const App = () => {
    const [seedTick, setSeedTick] = useState(0);
    const [showSplash, setShowSplash] = useState(() => {
      try { return !localStorage.getItem(ONBOARD_KEY); } catch { return false; }
    });

    useEffect(() => {
      seedIfEmpty().then(r => {
        if (r.ok && !r.skipped) setSeedTick(t => t + 1);
      });
      // Sync les sets stockés offline au lancement (no-op si online et tout déjà sync).
      syncPendingSets().catch(() => {});
      // Octroie 1 pardon mensuel si le mois a changé.
      ensureMonthlyPardon().catch(() => {});
      // Charge la pref sons (default true).
      loadSoundsPref().catch(() => {});
    }, []);

    const dismissSplash = () => {
      try { localStorage.setItem(ONBOARD_KEY, '1'); } catch {}
      setShowSplash(false);
    };

    return (
      <SeedContext.Provider value={seedTick}>
        <HashRouter>
          <div className="app-shell">
            <AppHeader />
            <main className="app-main">
              <Routes>
                <Route path={ROUTES.AUJOURDHUI} element={<AujourdhuiPage />} />
                <Route path={ROUTES.SEMAINE}    element={<SemainePage />} />
                <Route path={ROUTES.HEROS}      element={<HerosPage />} />
                <Route path={ROUTES.CARTE}      element={<CartePage />} />
                <Route path={ROUTES.STATS}      element={<HerosPage />} />
                <Route path={ROUTES.REGLAGES}   element={<ReglagesPage />} />
                <Route path="*" element={<AujourdhuiPage />} />
              </Routes>
            </main>
            <BottomNav />
          </div>
          {showSplash && <Splash onDismiss={dismissSplash} />}
        </HashRouter>
      </SeedContext.Provider>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
