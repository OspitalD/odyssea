  // E1RMCurve — courbe lissée 20 semaines pour /progression
  const E1RMCurve = ({ liftKey, width = 328, height = 200 }) => {
    const stats = useLiftStats(liftKey);
    if (!stats || !stats.history.length) return null;
    const { baseline, record, history } = stats;
    const totalWeeks = 20;
    const padL = 36, padR = 16, padT = 24, padB = 32;
    const chartW = width - padL - padR;
    const chartH = height - padT - padB;
    const allVals = [baseline, record, ...history];
    const minV = Math.min(...allVals) - 5;
    const maxV = Math.max(...allVals) + 5;
    const xOf = (w) => padL + (w / totalWeeks) * chartW;
    const yOf = (v) => padT + chartH - ((v - minV) / (maxV - minV)) * chartH;

    // Smooth cubic bezier path through data points
    const pts = history.map((v, i) => ({ x: xOf(i + 1), y: yOf(v) }));
    let curvePath = '';
    if (pts.length >= 2) {
      curvePath = `M${pts[0].x},${pts[0].y}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(pts.length - 1, i + 2)];
        const tension = 0.3;
        const cp1x = p1.x + (p2.x - p0.x) * tension;
        const cp1y = p1.y + (p2.y - p0.y) * tension;
        const cp2x = p2.x - (p3.x - p1.x) * tension;
        const cp2y = p2.y - (p3.y - p1.y) * tension;
        curvePath += ` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
      }
    }

    // Area fill path (smooth curve down to baseline)
    const areaPath = pts.length >= 2
      ? curvePath + ` L${pts[pts.length - 1].x},${yOf(baseline)} L${pts[0].x},${yOf(baseline)} Z`
      : '';

    const lastPt = pts.length > 0 ? pts[pts.length - 1] : null;
    const ticks = [1, 5, 10, 15, 20];

    return (
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
        {/* Area fill — subtle */}
        {areaPath && <path d={areaPath} fill="var(--viz-zone)" />}
        {/* Baseline dashed */}
        <line x1={padL} y1={yOf(baseline)} x2={width - padR} y2={yOf(baseline)}
          stroke="var(--text-quaternary)" strokeWidth="0.8" strokeDasharray="4 4" />
        {/* Record dashed */}
        <line x1={padL} y1={yOf(record)} x2={width - padR} y2={yOf(record)}
          stroke="var(--accent-olympus)" strokeWidth="0.8" strokeDasharray="4 4" opacity="0.5" />
        {/* Smooth curve */}
        {curvePath && <path d={curvePath} fill="none" stroke="var(--viz-current)" strokeWidth="1.8" strokeLinecap="round" />}
        {/* Data points — small, last one bigger */}
        {pts.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y}
            r={i === pts.length - 1 ? 4 : 2}
            fill={i === pts.length - 1 ? 'var(--accent-olympus)' : 'var(--viz-current)'}
            stroke={i === pts.length - 1 ? 'var(--bg-primary)' : 'none'}
            strokeWidth={i === pts.length - 1 ? 1.5 : 0} />
        ))}
        {/* X ticks */}
        {ticks.map(w => (
          <text key={w} x={xOf(w)} y={height - 8} textAnchor="middle"
            fontSize="9" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">S{w}</text>
        ))}
        {/* Baseline label */}
        <text x={padL - 6} y={yOf(baseline)} textAnchor="end" dominantBaseline="middle"
          fontSize="9" fontFamily="var(--font-mono)" fill="var(--text-tertiary)">{baseline}</text>
        {/* Record label */}
        <text x={padL - 6} y={yOf(record)} textAnchor="end" dominantBaseline="middle"
          fontSize="9" fontFamily="var(--font-mono)" fill="var(--accent-olympus)" opacity="0.7">{record}</text>
        {/* PR annotation on last point */}
        {lastPt && (
          <text x={lastPt.x + 10} y={lastPt.y - 6}
            fontSize="11" fontFamily="var(--font-greek)" fontStyle="italic" fill="var(--accent-olympus)">
            PR {history[history.length - 1]}

  };

  const Stepper = ({ value, onChange, steps, unit = '', min = 0, max = 9999, fontSize = 30, roundFn }) => {

    const apply = (delta) => {

    const StepBtn = ({ delta }) => {

      return (
        <button
          type="button"
          onClick={() => apply(delta)}
          style={{
            flex: 1,
            background: 'var(--bg-primary)',
            border: '1px solid var(--border-strong)',
            borderRadius: 10,
            color: 'var(--text-primary)',
            fontSize: 13,

            minWidth: 44,

        padding: '0 32px',
      }}>Le voyage commence.</div>
      <div style={{
        marginTop: 12,
        fontSize: 11,
        color: 'var(--text-tertiary)',

  /* ==========================================================
     Radar — 5 concentric dotted rings, baseline+current polygons
     Per design handoff: vertex discs 2.5px, central glyph EB Garamond 36px
     ========================================================== */
  const Radar = ({ size = 280, current, baseline, glyph = 'Α', accent = 'var(--accent-laurel)', accentBaseline = 'var(--text-tertiary)', showRings = 5 }) => {
    const axes = ['Σ', 'Β', 'Π', 'Μ', 'Α'];
    const cx = size / 2, cy = size / 2;
    const rMax = (size / 2) - 30;
    const N = 5;
    const pt = (i, val) => {
      const a = (i * 2 * Math.PI) / N - Math.PI / 2;
      return [cx + rMax * val * Math.cos(a), cy + rMax * val * Math.sin(a)];
    };
    const poly = (vals) => vals.map((v, i) => pt(i, v).join(',')).join(' ');
    const ringPoly = (pct) => Array.from({length: N}, (_, i) => pt(i, pct).join(',')).join(' ');
    const labelPt = (i) => {
      const a = (i * 2 * Math.PI) / N - Math.PI / 2;
      return [cx + (rMax + 18) * Math.cos(a), cy + (rMax + 18) * Math.sin(a)];
    };

    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="Radar 5 attributs">
        {/* Concentric rings — dotted */}
        {Array.from({length: showRings}, (_, i) => {
          const pct = (i + 1) / showRings;
          return <polygon key={i} points={ringPoly(pct)} fill="none"
            stroke="var(--border-subtle)" strokeWidth="0.6" strokeDasharray="2 2" />;
        })}
        {/* Axes */}
        {Array.from({length: N}, (_, i) => {
          const [x, y] = pt(i, 1);
          return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border-subtle)" strokeWidth="0.4" />;
        })}
        {/* Baseline polygon — dashed */}
        {baseline && <polygon points={poly(baseline)} fill="none"
          stroke={accentBaseline} strokeWidth="1" strokeDasharray="4 3" />}
        {/* Current polygon — filled 18% + stroke */}
        {current && (
          <>
            <polygon points={poly(current)} fill={accent} fillOpacity="0.18"
              stroke={accent} strokeWidth="1.5" />
            {/* Vertex discs */}
            {current.map((v, i) => {
              const [x, y] = pt(i, v);
              return <circle key={i} cx={x} cy={y} r="2.5" fill={accent} />;
            })}
          </>
        )}
        {/* Central glyph */}
        <text x={cx} y={cy + 2} textAnchor="middle" dominantBaseline="middle"
          fontSize="36" fontFamily="var(--font-greek)" fontStyle="italic"
          fill="var(--text-primary)" opacity="0.85">{glyph}</text>
        {/* Axis labels */}
        {axes.map((label, i) => {
          const [x, y] = labelPt(i);
          return (
            <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
              fontSize="13" fontFamily="var(--font-greek)" fontStyle="italic"
              fill="var(--text-secondary)">{label}</text>
          );
        })}
      </svg>
    );
  };
  // Legacy compat alias
  const RadarChart = ({ axes, axesPrev, size, color }) => {
    const current = axes ? axes.map(a => a.value) : null;
    const baseline = axesPrev ? axesPrev.map(a => a.value) : null;
    return React.createElement(Radar, { size: size || 260, current, baseline, accent: color });
  };

  /* ==========================================================
     HeroAvatar — bloc identitaire : Ω + rang + streak.

        <div className="greek" style={{

  /* ==========================================================
     StandardBar — différentiel kg + jauge 3 zones ATHX.
     below    → text-secondary (pas encore au seuil)
     in_range → laurel (dans la zone cible)
     above    → olympus (divin, standard dépassé)
     ========================================================== */
  const StandardBar = ({ standard, bodyweight }) => {
    const currentKg = standard.bestE1RM || 0;

            ) : !hasE1RM ? (

            ) : zone === 'below' ? (

                <div style={{ fontSize: 10, fontWeight: 400, fontStyle: 'italic', color: 'var(--text-tertiary)', marginTop: 2 }}>pour seuil ATHX</div>

        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8, fontSize: 11, color: 'var(--text-tertiary)' }}>
          {hasBW && hasE1RM ? (
            <>
              <span style={{ color: 'var(--text-secondary)', fontWeight: 700 }}>{standard.ratioBW.toFixed(2)}× BW</span>
              <span>·</span>
              <span>{standard.startBW}× → {standard.targetBW}× BW</span>
            </>
          ) : (
            <span>{standard.startBW}× → {standard.targetBW}× BW</span>
          )}
        </div>
        {hasBW && hasE1RM && scale > 0 && (
          <div style={{
            height: 6,
            borderRadius: 3,
            background: 'var(--bg-surface-hover)',
            position: 'relative',
            overflow: 'visible',
          }}>
            <div style={{
              position: 'absolute',
              left: `${(loKg / scale) * 100}%`,
              width: `${((hiKg - loKg) / scale) * 100}%`,
              height: '100%',
              top: 0,
              borderRadius: 3,
              background: 'var(--accent-laurel)',
              opacity: 0.15,
            }} />
            <div style={{
              position: 'absolute',
              left: `${(Math.min(currentKg, scale) / scale) * 100}%`,
              width: 2,
              height: 12,
              top: -3,
              transform: 'translateX(-1px)',
              borderRadius: 1,
              background: markerColor,
            }} />
          </div>
        )}
      </div>
    );
  };

  /* ==========================================================
     LiftTrajectory — mini line chart e1RM par lift, depuis le 1er set.
     Réponse visuelle à la question Job #2 #1 ("Où en est mon e1RM
     par rapport à mon point de départ ?"). Un point par semaine
     avec data, max e1RM de la semaine. Delta vs point de départ :
       +X kg → laurel  (victoire mortelle, sur la voie)
       0     → text-tertiary (stagnation, pas de jugement)
       -X kg → blood   (vraie régression — usage légitime du sang)
     ========================================================== */
  const LiftTrajectory = ({ name, points }) => {
    if (!points || points.length < 2) return null;
    const W = 120, H = 28;
    const e1RMs = points.map(p => p.e1RM);
    const minE = Math.min(...e1RMs);
    const maxE = Math.max(...e1RMs);
    const range = maxE - minE || 1;
    // x linéaire sur l'index des points enregistrés (compresse les
    // semaines vides pour lisibilité ; l'objet est la trajectoire,
    // pas l'échelle calendaire).
    const xOf = (i) => (i / (points.length - 1)) * W;
    // Padding 4px haut/bas pour que le path ne touche pas les bords.
    const yOf = (v) => (H - 4) - ((v - minE) / range) * (H - 8);
    const path = points
      .map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)},${yOf(p.e1RM).toFixed(1)}`)
      .join(' ');
    const last = points[points.length - 1];
    const first = points[0];
    const delta = last.e1RM - first.e1RM;
    const deltaColor = delta > 0
      ? 'var(--accent-laurel)'
      : delta < 0
        ? 'var(--accent-blood)'
        : 'var(--text-tertiary)';
    const deltaStr = delta === 0
      ? '—'
      : `${delta > 0 ? '+' : ''}${(Math.round(delta * 10) / 10)} kg`;
    return (
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 12,
        padding: '8px 0',
      }}>
        <div style={{
          flex: '0 0 56px',
          fontSize: 10,
          fontWeight: 700,
          color: 'var(--text-tertiary)',
          textTransform: 'uppercase',
          letterSpacing: '1.2px',
        }}>{name}</div>
        <svg viewBox={`0 0 ${W} ${H}`}
             preserveAspectRatio="none"
             style={{ flex: 1, height: H, minWidth: 0 }}
             aria-label={`Trajectoire e1RM ${name} sur ${points.length} semaines`}>
          <path d={path}
                fill="none"
                stroke="var(--text-secondary)"
                strokeWidth="1.5"
                strokeLinecap="round"
                strokeLinejoin="round"
                vectorEffect="non-scaling-stroke" />
          <circle cx={xOf(points.length - 1)}
                  cy={yOf(last.e1RM)}
                  r="2.4"
                  fill="var(--text-primary)" />
        </svg>
        <div style={{ flex: '0 0 auto', textAlign: 'right', minWidth: 64 }}>
          <div style={{
            fontSize: 13,
            fontWeight: 800,
            color: 'var(--text-primary)',
            lineHeight: 1,
            fontVariantNumeric: 'tabular-nums',
          }}>{last.e1RM} kg</div>
          <div style={{
            fontSize: 10,
            color: deltaColor,
            fontWeight: 700,
            marginTop: 3,
            fontVariantNumeric: 'tabular-nums',
          }}>{deltaStr}</div>
        </div>
      </div>
    );
  };

  /* ==========================================================
     Web Audio helpers — sons synthétiques discrets (lyre/cloche/beep).
     Pas de fichier audio, tout généré au tap.
     ========================================================== */
  let _audioCtx = null;
  function audio() {
    if (!_audioCtx) {
      try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
    }
    return _audioCtx;
  }
  function tone(freq, durMs, type = 'sine', vol = 0.08) {
    const ctx = audio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = type;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + durMs / 1000);
    osc.start(t);
    osc.stop(t + durMs / 1000);
  }
  // Lyre — pluck triangle 440Hz, durée 200ms
  function soundLyre()  { tone(440, 200, 'triangle', 0.06); }
  // Cloche bronze — sine 660Hz, durée 500ms
  function soundBell()  { tone(660, 500, 'sine', 0.05); }
  // Beep timer — tick rapide 880Hz, durée 80ms
  function soundTick()  { tone(880, 80,  'sine', 0.04); }

  // Toggle son global stocké en prefs.soundsEnabled (default true).
  let _soundsEnabledCache = true;
  async function loadSoundsPref() {
    const row = await db.prefs.get('soundsEnabled');
    _soundsEnabledCache = row?.value !== false;
    return _soundsEnabledCache;
  }
  function isSoundsEnabled() { return _soundsEnabledCache; }
  async function setSoundsEnabled(v) {
    _soundsEnabledCache = !!v;
    await db.prefs.put({ key: 'soundsEnabled', value: !!v });
  }
  function play(soundFn) { if (isSoundsEnabled()) soundFn(); }

  /* ==========================================================
     Timer intégré (SPEC §11) — count-down circulaire pour density
     sets (14 min Squat/Bench, 10-12 min jumps).
     Sons discrets aux milestones (5, 10, 13 min).
     ========================================================== */
  function getTimerConfig(prescription, format) {
    const p = (prescription || '').toLowerCase();
    if (format === 'emom') {
      const durMatch = p.match(/(\d+)\s*min/);
      return { type: 'interval', intervalSec: 60, totalMin: durMatch ? parseInt(durMatch[1], 10) : 10 };
    }
    if (format === 'density') {
      const durMatch = p.match(/(\d+)\s*min/);
      return { type: 'countdown', minutes: durMatch ? parseInt(durMatch[1], 10) : 14 };
    }
    if (format === 'jump') {
      const durMatch = p.match(/jump for (\d+)/i);
      return { type: 'countdown', minutes: durMatch ? parseInt(durMatch[1], 10) : 10 };
    }
    return null;
  }

  const CountdownTimer = ({ durationMin, onClose, accentColor, showTotalReps, totalReps }) => {
    const accent = accentColor || 'var(--accent-olympus)';
    const totalSec = durationMin * 60;
    const [elapsed, setElapsed] = useState(0);
    const [running, setRunning] = useState(true);
    const milestones = useMemo(() => [5 * 60, 10 * 60, 13 * 60].filter(s => s < totalSec), [totalSec]);
    const lastTickRef = React.useRef(-1);

    useEffect(() => {
      if (!running) return;
      const start = Date.now() - elapsed * 1000;
      const id = setInterval(() => {
        const e = Math.min(totalSec, Math.floor((Date.now() - start) / 1000));
        setElapsed(e);
        for (const ms of milestones) {
          if (e >= ms && lastTickRef.current < ms) {
            lastTickRef.current = ms;
            play(soundTick);
            try { navigator.vibrate && navigator.vibrate(40); } catch {}
          }
        }
        if (e >= totalSec) {
          clearInterval(id);
          setRunning(false);
          play(soundBell);
          try { navigator.vibrate && navigator.vibrate([60, 40, 80]); } catch {}
        }
      }, 250);
      return () => clearInterval(id);
    }, [running, totalSec, milestones]);

    const remaining = totalSec - elapsed;
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    const progress = elapsed / totalSec;
    const size = 200;
    const r = (size - 16) / 2;
    const C = 2 * Math.PI * r;
    const dashOffset = C * (1 - progress);

    return (
      <div style={{
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
        padding: 16, background: 'var(--bg-primary)', border: `1px solid ${accent}`,
        borderRadius: 14, marginBottom: 12,
      }}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-subtle)" strokeWidth="6" />
          <circle cx={size/2} cy={size/2} r={r} fill="none"
                  stroke={accent} strokeWidth="6" strokeLinecap="round"
                  strokeDasharray={C} strokeDashoffset={dashOffset}
                  transform={`rotate(-90 ${size/2} ${size/2})`} />
          {showTotalReps ? (
            <>
              <text x={size/2} y={size/2 - 18} textAnchor="middle" fill={accent} fontSize="42" fontWeight="800">
                {totalReps || 0}
              </text>
              <text x={size/2} y={size/2 + 8} textAnchor="middle" fill="var(--text-secondary)" fontSize="10" fontWeight="700" letterSpacing="2">
                TOTAL REPS
              </text>
              <text x={size/2} y={size/2 + 30} textAnchor="middle" fill="var(--text-primary)" fontSize="16" fontWeight="700">
                {String(min).padStart(2, '0')}:{String(sec).padStart(2, '0')}
              </text>
            </>
          ) : (
            <>
              <text x={size/2} y={size/2 - 4} textAnchor="middle" fill="var(--text-primary)" fontSize="26" fontWeight="800">
                {String(min).padStart(2, '0')}:{String(sec).padStart(2, '0')}
              </text>
              <text x={size/2} y={size/2 + 28} textAnchor="middle" fill="var(--text-secondary)" fontSize="11" fontWeight="700" letterSpacing="2">
                {running ? 'EN COURS' : (remaining === 0 ? 'TERMINÉ' : 'PAUSE')}
              </text>
            </>
          )}
        </svg>
        <div style={{ display: 'flex', gap: 10 }}>
          <button type="button" onClick={() => setRunning(r => !r)}
            style={{
              background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 10,
              color: 'var(--text-primary)', padding: '10px 18px', fontSize: 12, fontWeight: 700,
              textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
            }}>{running ? 'Pause' : 'Reprendre'}</button>
          <button type="button" onClick={onClose}
            style={{
              background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 10,
              color: 'var(--text-secondary)', padding: '10px 18px', fontSize: 12, fontWeight: 700,
              textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
            }}>Fermer</button>
        </div>
      </div>
    );
  };

  const IntervalTimer = ({ intervalSec, totalMin, onClose, onIntervalComplete }) => {
    const totalIntervals = Math.floor((totalMin * 60) / intervalSec);
    const [phase, setPhase] = useState('setup');
    const [adjustedMin, setAdjustedMin] = useState(totalMin);
    const [elapsed, setElapsed] = useState(0);
    const [running, setRunning] = useState(false);
    const lastIntervalRef = React.useRef(0);

    const adjustedIntervals = Math.floor((adjustedMin * 60) / intervalSec);
    const totalSec = adjustedMin * 60;
    const currentInterval = Math.min(adjustedIntervals, Math.floor(elapsed / intervalSec) + 1);
    const elapsedInInterval = elapsed % intervalSec;
    const remainingInInterval = intervalSec - elapsedInInterval;
    const progress = elapsedInInterval / intervalSec;

    useEffect(() => {
      if (phase !== 'running' || !running) return;
      const start = Date.now() - elapsed * 1000;
      const id = setInterval(() => {
        const e = Math.min(totalSec, Math.floor((Date.now() - start) / 1000));
        setElapsed(e);
        const curInt = Math.floor(e / intervalSec);
        if (curInt > lastIntervalRef.current && curInt < adjustedIntervals) {
          lastIntervalRef.current = curInt;
          play(soundTick);
          try { navigator.vibrate && navigator.vibrate(40); } catch {}
          if (onIntervalComplete) onIntervalComplete(curInt);
        }
        if (e >= totalSec) {
          clearInterval(id);
          setRunning(false);
          play(soundBell);
          try { navigator.vibrate && navigator.vibrate([60, 40, 80]); } catch {}
        }
      }, 250);
      return () => clearInterval(id);
    }, [phase, running, totalSec, intervalSec, adjustedIntervals]);

    const size = 200;
    const r = (size - 16) / 2;
    const C = 2 * Math.PI * r;
    const dashOffset = C * (1 - progress);
    const accent = 'var(--accent-royal)';
    const done = elapsed >= totalSec;

    if (phase === 'setup') {
      return (
        <div style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
          padding: 16, background: 'var(--bg-primary)', border: `1px solid ${accent}`,
          borderRadius: 14, marginBottom: 12,
        }}>
          <div style={{ fontSize: 11, color: accent, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
            EMOM — {adjustedIntervals} sets × {intervalSec}s
          </div>
          <Stepper value={adjustedMin} onChange={setAdjustedMin} steps={[-1, +1]} unit="min" min={1} max={30} fontSize={32} />
          <div style={{ display: 'flex', gap: 10 }}>
            <button type="button" onClick={() => { setPhase('running'); setRunning(true); }}
              style={{
                background: accent, border: 'none', borderRadius: 10, color: '#0D0F0E',
                padding: '12px 24px', fontSize: 13, fontWeight: 800, textTransform: 'uppercase',
                letterSpacing: '1.2px', cursor: 'pointer',
              }}>Démarrer</button>
            <button type="button" onClick={onClose}
              style={{
                background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 10,
                color: 'var(--text-secondary)', padding: '12px 18px', fontSize: 12, fontWeight: 700,
                textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
              }}>Fermer</button>
          </div>
        </div>
      );
    }

    const rMin = Math.floor(remainingInInterval / 60);
    const rSec = remainingInInterval % 60;

    return (
      <div style={{
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
        padding: 16, background: 'var(--bg-primary)', border: `1px solid ${accent}`,
        borderRadius: 14, marginBottom: 12,
      }}>
        <div style={{ fontSize: 11, color: accent, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
          SET {currentInterval}/{adjustedIntervals} · EMOM
        </div>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-subtle)" strokeWidth="6" />
          <circle cx={size/2} cy={size/2} r={r} fill="none"
                  stroke={accent} strokeWidth="6" strokeLinecap="round"
                  strokeDasharray={C} strokeDashoffset={dashOffset}
                  transform={`rotate(-90 ${size/2} ${size/2})`} />
          <text x={size/2} y={size/2 - 4} textAnchor="middle" fill="var(--text-primary)" fontSize="26" fontWeight="800">
            {done ? 'FIN' : `${String(rMin).padStart(2, '0')}:${String(rSec).padStart(2, '0')}`}
          </text>
          <text x={size/2} y={size/2 + 28} textAnchor="middle" fill="var(--text-secondary)" fontSize="11" fontWeight="700" letterSpacing="2">
            {done ? 'TERMINÉ' : (running ? 'EN COURS' : 'PAUSE')}
          </text>
        </svg>
        <div style={{ display: 'flex', gap: 10 }}>
          {!done && (
            <button type="button" onClick={() => setRunning(r => !r)}
              style={{
                background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 10,
                color: 'var(--text-primary)', padding: '10px 18px', fontSize: 12, fontWeight: 700,
                textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
              }}>{running ? 'Pause' : 'Reprendre'}</button>
          )}
          <button type="button" onClick={onClose}
            style={{
              background: 'transparent', border: '1px solid var(--border-strong)', borderRadius: 10,
              color: 'var(--text-secondary)', padding: '10px 18px', fontSize: 12, fontWeight: 700,
              textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
            }}>Fermer</button>
        </div>
      </div>
    );
  };

  // RIR toggle : 6 cercles 0..5. Le sélectionné est rempli en --accent-laurel.
  // Convention : 0 = à l'échec, 5 = très facile.
  const RirToggle = ({ value, onChange }) => (
    <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
      {[0, 1, 2, 3, 4, 5].map(n => {
        const selected = value === n;
        return (
          <button
            key={n}
            type="button"
            onClick={() => onChange(n)}
            aria-label={`RIR ${n}`}
            aria-pressed={selected}
            style={{
              flex: 1,
              minWidth: 44, minHeight: 44,
              aspectRatio: '1 / 1',
              borderRadius: '50%',
              background: selected ? 'var(--accent-laurel)' : 'transparent',
              border: `1.5px solid ${selected ? 'var(--accent-laurel)' : 'var(--border-strong)'}`,
              color: selected ? '#0D0F0E' : 'var(--text-secondary)',
              fontSize: 14,
              fontWeight: 800,
              cursor: 'pointer',
            }}
          >{n}</button>
        );
      })}
    </div>
  );

  /* ==========================================================
     PAGES — mocks Mardi.
     - /aujourdhui → Mer/Jeu : steppers, saisie set, calculs live
     - /semaine    → Mer : 7 cards jour, statuts
     - /stats      → Jeu/Ven : e1RM par exo + delta + (badges N3)
     - /reglages   → Ven : ATHX date, sons, reset, export
     ========================================================== */
  // ExoCard : 1 carte par exo, accordéon, saisie set complète.
  const ExoCard = ({ ex, week, sessionDay, sets, isOpen, onToggle, onSetValidated, onBadgesUnlocked }) => {
    const lastSet = sets && sets.length ? sets[sets.length - 1] : null;
    const [weight, setWeightRaw] = useState(() => lastSet?.weight ?? 0);
    const [reps, setReps] = useState(() => lastSet?.reps ?? 5);
    const [rir, setRir] = useState(() => lastSet?.rir ?? 2);
    const [jumpHeight, setJumpHeight] = useState(0);
    const [jumpDistance, setJumpDistance] = useState(0);
    const [userTouchedWeight, setUserTouchedWeight] = useState(false);
    const setWeight = (v) => { setUserTouchedWeight(true); setWeightRaw(v); };

    const [formatOverride, setFormatOverride] = useFormatOverride(week, sessionDay, ex.exerciseSlot);
    const detectedFormat = detectFormat(ex.prescription, ex.exerciseName);
    const format = formatOverride || detectedFormat;
    const fmtMeta = FORMAT_META[format] || FORMAT_META.traditional;
    const isVerticalJump = format === 'jump' && !/\bbroad\b/i.test(ex.prescription || '');
    const [showFormatDropdown, setShowFormatDropdown] = useState(false);
    const [densityTotalReps, setDensityTotalReps] = useState(() => {
      if (format === 'density' && sets && sets.length > 0) {
        return sets.reduce((sum, s) => sum + (s.reps || 0), 0);
      }
      return 0;
    });

    const weekSuggestion = useSuggestion(week, sessionDay, ex.exerciseSlot);
    const suggestionApplied = weekSuggestion?.suggestedWeight != null
      && !userTouchedWeight && (!sets || sets.length === 0);

    useEffect(() => {
      if (weekSuggestion?.suggestedWeight != null && (!sets || sets.length === 0) && !userTouchedWeight) {
        setWeightRaw(weekSuggestion.suggestedWeight);
      }
    }, [weekSuggestion]);

    useEffect(() => {
      if (lastSet) {
        setWeightRaw(lastSet.weight);
        setReps(lastSet.reps);
        setRir(lastSet.rir);
      }
    }, [lastSet?.id]);

    const setEntryRef = React.useRef(null);
    useEffect(() => {
      if (!isOpen) return;
      const id = requestAnimationFrame(() => {
        setEntryRef.current?.scrollIntoView({ behavior: 'auto', block: 'center' });
      });
      return () => cancelAnimationFrame(id);
    }, [isOpen]);

    const historicalBest = useBestE1RMFor(ex.exerciseName, sets?.length || 0);
    const setsHistoricalBest = useSetsBestE1RMFor(ex.exerciseName, sets?.length || 0);
    const lastWeekBest = useLastWeekBest(ex.exerciseName, week);
    const timerConfig = getTimerConfig(ex.prescription || '', format);
    const [timerOpen, setTimerOpen] = useState(false);
    const hasWeightInput = format !== 'jump';
    const previewE1RM = hasWeightInput && weight > 0 && reps > 0 ? round05(epley(weight, reps)) : 0;
    const previewSI = hasWeightInput && weight > 0 && reps > 0 ? stressIndex(weight, reps, rir, historicalBest || previewE1RM) : 0;
    const sessionVL = volumeLoad(sets || []);
    const sessionBest = bestE1RM(sets || []);

    const nextSetNumber = (sets?.length || 0) + 1;
    const isPreviewPR = hasWeightInput && setsHistoricalBest != null && setsHistoricalBest > 0 && previewE1RM > setsHistoricalBest;

    const backoffInfo = parseBackoffPercent(ex.prescription);
    const topSetInSession = sets && sets.length > 0 ? sets.reduce((best, s) => (s.e1RM > (best?.e1RM || 0) ? s : best), null) : null;
    const suggestedWeight = useMemo(() => {
      if (!backoffInfo) return null;
      if (backoffInfo.mode === 'stripWeight' && topSetInSession?.weight) {
        return calculateSuggestedWeight(topSetInSession.weight, backoffInfo);
      }
      if (backoffInfo.mode === 'ofE1RM' && historicalBest) {
        return calculateSuggestedWeight(historicalBest, backoffInfo);
      }
      return null;
    }, [backoffInfo, topSetInSession?.weight, topSetInSession?.e1RM, historicalBest]);

    const isTopSet = (format === 'topBackoff' || format === 'softAmrap') && nextSetNumber === 1;
    const isBackOff = (format === 'topBackoff' || format === 'softAmrap') && nextSetNumber > 1;

    const [flash, setFlash] = useState(false);
    const [prOverlay, setPrOverlay] = useState(null);

    const validate = async () => {
      if (format === 'jump') {
        const measurement = isVerticalJump ? jumpHeight : jumpDistance;
        if (!measurement || measurement <= 0) return;
        await db.sets.add({
          week, sessionDay,
          exerciseSlot: ex.exerciseSlot,
          exerciseName: ex.exerciseName,
          setNumber: nextSetNumber,
          format: 'jump',
          jumpHeight: isVerticalJump ? jumpHeight : null,
          jumpDistance: !isVerticalJump ? jumpDistance : null,
          weight: null, reps: null, rir: null, e1RM: null, isPR: false,
          completedAt: new Date().toISOString(),
          syncedAt: null,
        });
        try { navigator.vibrate && navigator.vibrate(20); } catch {}
        checkBadges().then(newly => { if (newly.length) onBadgesUnlocked(newly); });
        setFlash(true);
        setTimeout(() => setFlash(false), 250);
        onSetValidated();
        return;
      }
      if (format === 'density') {
        if (reps <= 0) return;
        const newTotal = densityTotalReps + reps;
        setDensityTotalReps(newTotal);
        const tc = getTimerConfig(ex.prescription, 'density');
        await db.sets.add({
          week, sessionDay,
          exerciseSlot: ex.exerciseSlot,
          exerciseName: ex.exerciseName,
          setNumber: nextSetNumber,
          format: 'density',
          weight: weight || null, reps, rir: null, e1RM: null, isPR: false,
          totalReps: newTotal,
          durationMinutes: tc ? tc.minutes : null,
          completedAt: new Date().toISOString(),
          syncedAt: null,
        });
        try { navigator.vibrate && navigator.vibrate(20); } catch {}
        checkBadges().then(newly => { if (newly.length) onBadgesUnlocked(newly); });
        setFlash(true);
        setTimeout(() => setFlash(false), 250);
        onSetValidated();
        return;
      }
      if (weight <= 0 || reps <= 0) return;
      const e1RM = round05(epley(weight, reps));
      const rpgEligible = new Set(['traditional', 'doubleProg', 'topBackoff', 'softAmrap', 'amrap']);
      const isPR = rpgEligible.has(format) && setsHistoricalBest != null && setsHistoricalBest > 0 && e1RM > setsHistoricalBest;
      const emomTc = format === 'emom' ? getTimerConfig(ex.prescription, 'emom') : null;
      const setData = {
        week, sessionDay,
        exerciseSlot: ex.exerciseSlot,
        exerciseName: ex.exerciseName,
        setNumber: nextSetNumber,
        format: format || 'traditional',
        weight, reps, rir, e1RM, isPR,
        durationMinutes: emomTc ? emomTc.totalMin : null,
        completedAt: new Date().toISOString(),
        syncedAt: null,
      };
      if (format === 'topBackoff' || format === 'softAmrap') {
        setData.isTopSet = isTopSet;
        setData.isBackOff = isBackOff;
        if (suggestedWeight) setData.suggestedWeight = suggestedWeight;
      }
      const setId = await db.sets.add(setData);
      try {
        const prResult = await detectPR({ ...setData, id: setId });
        if (prResult.isPR) {
          await db.prs.add({
            liftKey: prResult.liftKey,
            exerciseName: ex.exerciseName,
            weight, reps, rir, e1RM,
            sessionDay, week,
            block: getCurrentBlock(week).id,
            validatedAt: new Date().toISOString(),
            setId,
          });
          setPrOverlay({ exerciseName: prResult.exerciseName, weight, e1RM });
        }
      } catch {}
      try { navigator.vibrate && navigator.vibrate(isPR ? [30, 50, 60] : 20); } catch {}
      if (isPR) { fireConfetti(); play(soundLyre); }
      checkBadges().then(newly => { if (newly.length) onBadgesUnlocked(newly); });
      setFlash(true);
      setTimeout(() => setFlash(false), 250);
      onSetValidated();
    };

    const renderSetBadge = (s) => {
      const sFmt = FORMAT_META[s.format] || FORMAT_META.traditional;
      if (s.format === 'jump') {
        const val = s.jumpHeight != null ? `${s.jumpHeight} cm` : `${s.jumpDistance} m`;
        return (
          <li key={s.id} style={{
            display: 'flex', alignItems: 'center', gap: 10, fontSize: 13,
            padding: '8px 12px', background: 'var(--bg-primary)',
            border: '1px solid var(--border-subtle)', borderRadius: 10,
          }}>
            <span style={{ color: 'var(--text-tertiary)', fontSize: 11, fontWeight: 700, minWidth: 24 }}>#{s.setNumber}</span>
            <span style={{ color: 'var(--accent-blood)', fontWeight: 700 }}>{val}</span>
          </li>
        );
      }
      if (s.format === 'density') {
        return (
          <li key={s.id} style={{
            display: 'flex', alignItems: 'center', gap: 10, fontSize: 13,
            padding: '8px 12px', background: 'var(--bg-primary)',
            border: '1px solid var(--border-subtle)', borderRadius: 10,
          }}>
            <span style={{ color: 'var(--text-tertiary)', fontSize: 11, fontWeight: 700, minWidth: 24 }}>#{s.setNumber}</span>
            <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{s.weight ? `${s.weight} kg` : ''}</span>
            <span style={{ color: 'var(--accent-royal-soft)', fontWeight: 700 }}>{s.reps} reps</span>
            <span style={{ flex: 1 }} />
            {s.totalReps && <span style={{ color: 'var(--accent-royal-soft)', fontSize: 11, fontWeight: 700 }}>total: {s.totalReps}</span>}
          </li>
        );
      }
      const prefix = s.isTopSet ? 'TOP' : s.isBackOff ? 'BO' : null;
      return (
        <li key={s.id} style={{
          display: 'flex', alignItems: 'center', gap: 10, fontSize: 13,
          padding: '8px 12px',
          background: s.isPR ? 'rgba(232,160,32,0.08)' : 'var(--bg-primary)',
          border: `1px solid ${s.isPR ? 'rgba(232,160,32,0.4)' : 'var(--border-subtle)'}`,
          borderRadius: 10,
        }}>
          <span style={{ color: 'var(--text-tertiary)', fontSize: 11, fontWeight: 700, minWidth: 24 }}>
            {prefix ? <span style={{ color: sFmt.color, fontSize: 9, fontWeight: 800 }}>{prefix} </span> : ''}#{s.setNumber}
          </span>
          <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{s.weight} kg</span>
          <span style={{ color: 'var(--text-secondary)' }}>×{s.reps}</span>
          {s.rir != null && <span style={{ color: 'var(--text-secondary)', fontSize: 11 }}>RIR {s.rir}</span>}
          <span style={{ flex: 1 }} />
          {s.isPR && <span style={{ color: 'var(--accent-olympus)', fontSize: 13, fontWeight: 800 }} title="PR — nouvel e1RM record">★</span>}
          {s.e1RM && <span style={{ color: s.isPR ? 'var(--accent-olympus)' : 'var(--accent-laurel)', fontSize: 11, fontWeight: 700 }}>e1RM {s.e1RM}</span>}
        </li>
      );
    };

    const renderJumpInput = () => {
      const measurement = isVerticalJump ? jumpHeight : jumpDistance;
      const setMeasurement = isVerticalJump ? setJumpHeight : setJumpDistance;
      const unit = isVerticalJump ? 'cm' : 'm';
      const steps = isVerticalJump ? [-5, -1, +1, +5] : [-0.10, -0.05, +0.05, +0.10];
      const max = isVerticalJump ? 100 : 4.00;
      const roundBroad = (v) => Math.round(v * 20) / 20;
      const attemptLabel = nextSetNumber <= 3
        ? `Attempt ${nextSetNumber}/3`
        : `Attempt ${nextSetNumber} · best of 3`;
      return (
        <div ref={setEntryRef}>
          <div style={{ fontSize: 11, color: 'var(--accent-blood)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 10 }}>
            {attemptLabel}
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 4 }}>
              {isVerticalJump ? 'Hauteur' : 'Distance'}
            </div>
            <Stepper value={measurement} onChange={setMeasurement} steps={steps} unit={unit} min={0} max={max} fontSize={32}
              roundFn={isVerticalJump ? undefined : roundBroad} />
          </div>
          <button type="button" onClick={validate} disabled={measurement <= 0}
            style={{
              width: '100%',
              background: flash ? 'var(--text-primary)' : (measurement > 0 ? 'var(--accent-blood)' : 'var(--bg-surface-hover)'),
              color: flash ? '#0D0F0E' : (measurement > 0 ? '#0D0F0E' : 'var(--text-tertiary)'),
              border: 'none', borderRadius: 12, minHeight: 56, padding: '18px 0',
              fontSize: 14, fontWeight: 800, letterSpacing: '1.5px', textTransform: 'uppercase',
              cursor: measurement > 0 ? 'pointer' : 'not-allowed',
              transform: flash ? 'scale(0.98)' : 'scale(1)',
            }}>Valider attempt</button>
        </div>
      );
    };

    const renderTraditionalInput = () => (
      <div ref={setEntryRef}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
            Set {nextSetNumber}
          </div>
          {previewE1RM > 0 && (
            <div style={{ fontSize: 11, color: isPreviewPR ? 'var(--accent-olympus)' : 'var(--text-secondary)', fontWeight: 700 }}>
              {isPreviewPR && '★ '}e1RM {previewE1RM} · SI {previewSI.toFixed(2)}
            </div>
          )}
        </div>
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 4, display: 'flex', alignItems: 'center', gap: 6 }}>Weight{suggestionApplied && <span style={{ fontSize: 10, color: 'var(--accent-laurel)', border: '1px solid var(--accent-laurel)', borderRadius: 4, padding: '2px 4px', textTransform: 'none', letterSpacing: '0.3px', fontWeight: 600 }}>Suggéré S{weekSuggestion.sourceWeek}</span>}</div>
          <Stepper value={weight} onChange={setWeight} steps={[-5, -2.5, +2.5, +5]} unit="kg" fontSize={32} />
        </div>
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 4 }}>Reps</div>
          <Stepper value={reps} onChange={setReps} steps={[-1, +1]} unit="" max={99} fontSize={24} />
        </div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>RIR · reps en réserve</div>
          <RirToggle value={rir} onChange={setRir} />
        </div>
        <button type="button" onClick={validate} disabled={weight <= 0 || reps <= 0}
          style={{
            width: '100%',
            background: flash ? 'var(--text-primary)' : (weight > 0 && reps > 0 ? 'var(--accent-laurel)' : 'var(--bg-surface-hover)'),
            color: flash ? '#0D0F0E' : (weight > 0 && reps > 0 ? '#0D0F0E' : 'var(--text-tertiary)'),
            border: 'none', borderRadius: 12, minHeight: 56, padding: '18px 0',
            fontSize: 14, fontWeight: 800, letterSpacing: '1.5px', textTransform: 'uppercase',
            cursor: weight > 0 && reps > 0 ? 'pointer' : 'not-allowed',
            transform: flash ? 'scale(0.98)' : 'scale(1)',

  /* ==========================================================
     MODE SÉANCE — sous-composants pour /aujourdhui

     ========================================================== */

  // Chrono de session : tick chaque seconde, format hh:mm:ss.
  // Source de vérité = startedAt (string ISO), stocké dans le flag
  // db.prefs.sessionInProgress (lecture facile au reload).
  const useSessionTimer = (startedAt) => {
    const [now, setNow] = useState(Date.now());
    useEffect(() => {
      if (!startedAt) return;
      const id = setInterval(() => setNow(Date.now()), 1000);
      return () => clearInterval(id);
    }, [startedAt]);
    if (!startedAt) return '00:00:00';
    const elapsed = Math.max(0, Math.floor((now - new Date(startedAt).getTime()) / 1000));
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
  };

  /* ==========================================================

  const BLOCK_TYPES = [
    { type: 'aerobic',   label: 'Aérobie',    accent: 'var(--accent-laurel)' },

            <UdStepper label="RPE cible" value={block.rpeTarget} onChange={v => set('rpeTarget', v)} min={1} max={10} step={1} />

            <UdStepper label="RPE cible" value={block.rpeTarget} onChange={v => set('rpeTarget', v)} min={1} max={10} step={1} />

                      background: block.laterality === l ? 'var(--accent-olympus)' : 'var(--bg-primary)',
                      color: block.laterality === l ? 'var(--bg-primary)' : 'var(--text-secondary)',
                      border: `1px solid ${block.laterality === l ? 'var(--accent-olympus)' : 'var(--border-strong)'}`,

            <UdStepper label="Séries" value={block.setsTarget} onChange={v => set('setsTarget', v)} min={1} max={10} step={1} />
            <UdStepper label="Répétitions" value={block.repsTarget} onChange={v => set('repsTarget', v)} min={1} max={30} step={1} />

        {block.type === 'sprint' && (
          <>
            <UdStepper label="Distance" value={block.distanceYards} onChange={v => set('distanceYards', v)} min={5} max={100} step={1} unit="yards" />
            <UdStepper label="Reps" value={block.repsTarget} onChange={v => set('repsTarget', v)} min={1} max={20} step={1} />

          </>

      </Card>

  };

  const udBlockSummary = (block) => {
    if (block.type === 'aerobic') return `${block.exerciseName} · ${block.mode} · ${block.durationMinutesTarget} min · RPE ${block.rpeTarget}`;
    if (block.type === 'anaerobic') return `${block.exerciseName} · ${block.mode} · ${block.durationMinutesTarget} min · RPE ${block.rpeTarget}`;
    if (block.type === 'strength') {
      let s = `${block.exerciseName} · ${block.setsTarget}×${block.repsTarget}`;
      if (block.weightTarget) s += ` @ ${block.weightTarget}kg`;
      return s;
    }
    if (block.type === 'iso') return `${block.exerciseName} · ${block.roundsTarget} × ${block.durationSecondsTarget}s`;
    if (block.type === 'plyo') return `${block.exerciseName || '—'} · ${block.laterality === 'unilateral' ? 'UNI' : 'BI'} · ${block.setsTarget}×${block.repsTarget}`;
    if (block.type === 'sprint') return `${block.exerciseName} · ${block.repsTarget}×${block.distanceYards}y · ${block.restSecondsTarget}s rest`;
    return block.exerciseName || '?';
  };

  const UdStrengthInput = ({ blk, blockIdx, sets, onValidated }) => {
    const blockSets = sets.filter(s => s.exerciseSlot === blockIdx && s.format === 'strength')
      .sort((a, b) => a.setNumber - b.setNumber);
    const lastSet = blockSets[blockSets.length - 1];
    const [weight, setWeight] = useState(lastSet?.weight ?? blk.weightTarget ?? 0);
    const [reps, setReps] = useState(lastSet?.reps ?? blk.repsTarget);
    const [rir, setRir] = useState(lastSet?.rir ?? 2);

    useEffect(() => {
      if (lastSet) { setWeight(lastSet.weight ?? blk.weightTarget ?? 0); setReps(lastSet.reps ?? blk.repsTarget); }
    }, [blockSets.length]);

    const validateSet = async () => {
      const setNumber = blockSets.length + 1;
      await db.sets.add({
        week: getCurrentWeek(), sessionDay: blk._sessionDay, exerciseSlot: blockIdx,
        setNumber, format: 'strength', exerciseName: blk.exerciseName,
        weight, reps, rir, e1RM: round05(epley(weight, reps)),
        completedAt: new Date().toISOString(), syncedAt: null,
      });
      onValidated();
    };
    const removeLastSet = async () => {
      if (!lastSet) return;
      await db.sets.delete(lastSet.id);
      onValidated();
    };

    return (
      <Card style={{ padding: '16px' }}>
        {blockSets.length > 0 && (
          <div style={{ marginBottom: 14, borderBottom: '1px solid var(--border-subtle)', paddingBottom: 10 }}>

        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 8 }}>

        </div>

        <UdStepper label="Reps" value={reps} onChange={setReps} min={1} max={50} step={1} />
        <UdStepper label="RIR" value={rir} onChange={setRir} min={0} max={5} step={1} />
        <button type="button" onClick={validateSet} className="ody-btn-primary"

  const UdIsoInput = ({ blk, blockIdx, sets, onValidated }) => {
    const blockSets = sets.filter(s => s.exerciseSlot === blockIdx && s.format === 'iso')
      .sort((a, b) => a.setNumber - b.setNumber);

      const setNumber = blockSets.length + 1;
      await db.sets.add({
        week: getCurrentWeek(), sessionDay: blk._sessionDay, exerciseSlot: blockIdx,
        setNumber, format: 'iso', exerciseName: blk.exerciseName,

      onValidated();

    return (
      <Card style={{ padding: '16px' }}>
        {blockSets.length > 0 && (
          <div style={{ marginBottom: 14, borderBottom: '1px solid var(--border-subtle)', paddingBottom: 10 }}>
            {blockSets.map(s => (
              <div key={s.id} style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4 }}>
                <span style={{ color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', fontSize: 11, marginRight: 8 }}>R{s.setNumber}</span>
                {s.durationSeconds}s

        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 8 }}>
