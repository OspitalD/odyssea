<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0D0F0E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Odyssea" />
  <meta name="description" content="Odyssea — Ὀδύσσεια. 20 semaines, 4 chants, 1 destination." />
  <title>Odyssea — Ὀδύσσεια</title>

  <!-- Fonts : Plus Jakarta Sans + EB Garamond + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-512.png" />
  <!-- iOS Home Screen — doit être PNG, SVG ignoré -->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png" />

  <style>
    /* ==========================================================
       Odyssea Design System v2 — tokens.css
       Source de vérité visuelle. Aucune couleur en dur ailleurs.
       ========================================================== */
    :root {
      /* ─── BACKGROUNDS ─── */
      --bg-primary:       #0D0F0E;
      --bg-surface:       #111412;
      --bg-surface-hover: #141815;
      --bg-deep:          #07090A;

      /* ─── BORDERS ─── */
      --border-subtle:     rgba(255, 255, 255, 0.06);
      --border-strong:     rgba(255, 255, 255, 0.10);
      --border-active:     #1A1E1C;
      --surface-highlight: rgba(255, 255, 255, 0.025);

      /* ─── ACCENTS ─── */
      --accent-laurel:  #3ECFA0;
      --accent-olympus: #E8A020;
      --accent-royal:   #B990E0;
      --accent-blood:   #E05A4A;
      --accent-royal-soft:   #C4B3DB; /* hsl(270, 36%, 82%) — dérivé royal */
      --accent-olympus-soft: #D4A95C; /* hsl(38, 61%, 62%) — dérivé olympus */
      --accent-blood-soft:   #D49084; /* hsl(6, 52%, 68%) — dérivé blood */

      /* ─── TEXT ─── */
      --text-primary:    #F5F5F3;
      --text-secondary:  #7A7C7A;
      --text-tertiary:   #4A4D4B;
      --text-quaternary: #2E312F;

      /* ─── DATA VIZ ─── */
      --viz-baseline: var(--text-tertiary);
      --viz-record:   var(--accent-olympus);
      --viz-current:  var(--accent-laurel);
      --viz-zone:     rgba(62, 207, 160, 0.06);

      /* ─── TYPOGRAPHY ─── */
      --font-sans:  'Plus Jakarta Sans', system-ui, sans-serif;
      --font-greek: 'EB Garamond', 'Times New Roman', serif;
      --font-mono:  'JetBrains Mono', ui-monospace, monospace;

      /* ─── SIZES ─── */
      --size-totem-xl:    56px;
      --size-totem-lg:    40px;
      --size-totem-md:    32px;
      --size-numeric:     24px;
      --size-inscription: 11px;

      /* ─── DEPTH (tablette de pierre) ─── */
      --depth-tablet:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 -1px 0 rgba(0, 0, 0, 0.4),
        0 1px 0 rgba(0, 0, 0, 0.5);

      /* ─── SPACING (4-base) ─── */
      --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

      /* ─── RADIUS ─── */
      --r-sm: 4px; --r-md: 6px; --r-lg: 8px;

      /* ─── DURATIONS ─── */
      --d-fast:   120ms;
      --d-base:   240ms;
      --d-slow:   600ms;
      --d-ritual: 1800ms;

      /* ─── LEGACY COMPAT ─── */
      --rank-mortel:   #7A7C7A; --rank-hoplite:  #CD8032;
      --rank-stratege: #A8A8BE; --rank-heros:    #DAA520;
      --rank-demidieu: #B8E0F8; --rank-olympien: #C39BD3;
      --bottom-nav-h: 64px;
      --max-app-width: 430px;
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 0.12s;
      --dur-normal: 0.24s;
    }

    /* ─── UTILITY CLASSES ─── */
    .ody-tablet {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      box-shadow: var(--depth-tablet);
      border-radius: var(--r-md);
      position: relative;
    }
    .ody-tablet::before {
      content: '';
      position: absolute; inset: 3px;
      border-radius: calc(var(--r-md) - 2px);
      border: 1px solid var(--surface-highlight);
      pointer-events: none;
    }
    .ody-meander {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path d='M0 4h12v8h-8v8h16v-8h-8V4h12' stroke='%23ffffff' stroke-opacity='0.035' stroke-width='1' fill='none'/></svg>");
      background-size: 64px 64px;
    }
    .ody-inscription {
      font-family: var(--font-sans);
      font-size: var(--size-inscription);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .ody-totem {
      font-family: var(--font-sans);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }
    .ody-greek {
      font-family: var(--font-greek);
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .ody-tactical {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .ody-btn-primary {
      background: var(--accent-olympus);
      color: var(--bg-primary);
      border: none;
      border-radius: 0;
      padding: 14px 0;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      transition: filter var(--d-fast);
    }
    .ody-btn-primary:active { filter: brightness(0.92); }
    .ody-btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-strong);
      border-radius: 0;
      padding: 12px 0;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 44px;
      width: 100%;
      transition: border-color var(--d-fast), background var(--d-fast);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: none;
    }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input, textarea, select { font-family: inherit; color: inherit; }

    .greek { font-family: var(--font-greek); font-style: italic; }

    /* ─── APP SHELL ─── */
    .app-shell {
      min-height: 100%;
      max-width: var(--max-app-width);
      margin: 0 auto;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .app-main {
      flex: 1 1 auto;
      padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0px));
      min-height: 0;
    }
    .app-main--no-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .app-shell.session-focus nav[aria-label="Navigation principale"],
    .app-shell.session-focus header { display: none !important; }
    .app-shell.session-focus .app-main { padding-bottom: env(safe-area-inset-bottom, 0px); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    button, [role="button"] { min-height: 44px; }
    .tap-area { min-width: 44px; min-height: 44px; }

    #boot-loader {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg-primary);
      color: var(--accent-olympus);
      font-family: var(--font-greek);
      font-style: italic;
      font-size: 48px;
    }

    /* ─── KEYFRAMES ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes halo-cascade {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pr-scale {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes char-reveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes star-spin {
      from { transform: scale(0) rotate(180deg); }
      to   { transform: scale(1) rotate(0deg); }
    }
    @keyframes meander-slide {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100vw); }
    }
    @keyframes pr-star-in {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(90deg); opacity: 0; }
      70%  { transform: translate(-50%,-50%) scale(1.2) rotate(-10deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes pr-flash {
      0%   { opacity: 0; }
      40%  { opacity: 0.15; }
      100% { opacity: 0; }
    }
    @keyframes pr-text-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pr-fade-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot-loader">Ω</div>
  </div>

  <noscript>

  <!-- ============================================================
       VENDOR (CDN) — React 18 + Babel standalone + Dexie (IndexedDB)
       ============================================================ -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://unpkg.com/dexie@4.0.10/dist/dexie.min.js"></script>

  <!-- ============================================================
       APPLICATION
       ============================================================ -->
  <script type="text/babel" data-presets="react">
  const { useState, useEffect, useMemo, useContext, createContext, useCallback } = React;

  /* ==========================================================
     CONST API (SPEC v3 §API)
     ========================================================== */
  const API_URL = 'https://script.google.com/macros/s/AKfycbx1fBaHJpvRSMKfTnpFM5OdML8IMeUKZEQnI-k3rVzl_V1Lq3lp4bIt6-xcHPny9p3OrA/exec';
  const ATHX_DATE = '2026-09-19';

  const ROUTES = {
    AUJOURDHUI:  '/aujourdhui',
    SEMAINE:     '/semaine',
    HEROS:       '/heros',
    PROGRESSION: '/progression',
    CARTE:       '/carte',
    STATS:       '/stats',
    REGLAGES:   '/reglages',
  };
  const DEFAULT_ROUTE = ROUTES.AUJOURDHUI;

  /* ==========================================================
     CATALOGUE STATIQUE — Mythologie (SPEC v3 §Niveau 2 + v4 patch)
     ========================================================== */
  // Blocks renommés (v4 patch — Lotophages en B1, pattern de drop documenté)
  const BLOCKS = [
    { id: 1, name: 'Les Lotophages', glyph: 'A', weeks: [1,  6]  },
    { id: 2, name: 'Le Cyclope',     glyph: 'B', weeks: [7,  12] },
    { id: 3, name: 'Circé',          glyph: 'Γ', weeks: [13, 16] },
    { id: 4, name: 'Ithaque',        glyph: 'Δ', weeks: [17, 20] },
  ];

  // Streak ranks Mortel → Olympien
  const STREAK_RANKS = [
    { min: 0,   name: 'Mortel',    token: 'var(--rank-mortel)'   },
    { min: 7,   name: 'Hoplite',   token: 'var(--rank-hoplite)'  },
    { min: 14,  name: 'Stratège',  token: 'var(--rank-stratege)' },
    { min: 30,  name: 'Héros',     token: 'var(--rank-heros)'    },
    { min: 60,  name: 'Demi-dieu', token: 'var(--rank-demidieu)' },
    { min: 100, name: 'Olympien',  token: 'var(--rank-olympien)' },
  ];

  /* ==========================================================
     ATHX STANDARDS (SPEC §11) — targets bodyweight-based pour les
     4 lifts principaux du programme. Phase 2 ajoute pull-ups / jumps
     / row 2K / 5K running quand l'app trackera ces formats.
     ========================================================== */
  const ATHX_STANDARDS = [
    {
      id: 'squat',
      name: 'Back Squat',
      pattern: /back squat|^squat$|zercher squat/i,
      kind: 'lift',
      startBW: 1.8,
      targetBW: 2.0,
      radarAxis: 'squat',
    },
    {
      id: 'deadlift',
      name: 'Deadlift',
      pattern: /deadlift|^dl$/i,
      kind: 'lift',
      startBW: 2.2,
      targetBW: 2.5,
      radarAxis: 'deadlift',
    },
    {
      id: 'bench',
      name: 'Bench Press',
      pattern: /bench press|pin bench|low incline press/i,
      kind: 'lift',
      startBW: 1.2,
      targetBW: 1.5,
      radarAxis: 'push',
    },
    {
      id: 'ohp',
      name: 'Overhead Press',
      pattern: /^ohp|overhead press|seated press/i,
      kind: 'lift',
      startBW: 0.8,
      targetBW: 1.0,
      radarAxis: 'push',
    },
    {
      id: 'row',
      name: 'Pendlay Row',
      pattern: /pendlay row|barbell row/i,
      kind: 'lift',
      startBW: 1.0,
      targetBW: 1.5,
      radarAxis: 'pull',
    },
  ];

  // BADGES (SPEC §7.3) — catalogue des achievements.
  // Chaque badge a un check() async qui peut lire ctx (passé par checkBadges).
  // Trigger : appelés après TERMINER (session_complete) ou VALIDER SET (set_validated).
  // Atlas/Achille requièrent un bodyweight stocké en prefs (saisi dans /reglages).
  const BADGES = [
    {
      id: 'first_step',
      name: 'Premier Pas',
      description: '1ère session complétée',
      glyph: 'Α',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt);
      },
    },
    {
      id: 'atlas',
      name: 'Atlas',
      description: 'Squat 2× BW soulevé',
      glyph: 'Β',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /squat/i.test(s.exerciseName || '') && s.weight >= 2 * ctx.bodyweight);
      },
    },
    {
      id: 'achille',
      name: 'Achille',
      description: 'Bench 1× BW soulevé',
      glyph: 'Γ',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /bench/i.test(s.exerciseName || '') && s.weight >= ctx.bodyweight);
      },
    },
    {
      id: 'sirenes',
      name: 'Sirènes',
      description: 'Reprise après break streak',
      glyph: 'Δ',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak > 0 && s.longestStreak > s.currentStreak;
      },
    },
    {
      id: 'heracles',
      name: 'Héraclès',
      description: '12 sessions consécutives',
      glyph: 'Ε',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak >= 12;
      },
    },
    {
      id: 'arc_ulysse',
      name: "L'Arc d'Ulysse",
      description: 'Bloc 4 démarré',
      glyph: 'Ζ',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt && s.week >= 17);
      },
    },
    {
      id: 'penelope',
      name: 'Pénélope',
      description: '100 sessions cumulées',
      glyph: 'Η',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.filter(s => s.completedAt).length >= 100;
      },
    },
    {
      id: 'ithaque',
      name: 'Ithaque',
      description: 'ATHX complété',
      glyph: 'Θ',
      check: async () => {
        const today = new Date();
        return today >= new Date(ATHX_DATE + 'T00:00:00');
      },
    },
  ];

  // Pool de mantras du jour (SPEC §11 Étape 9) — pool tournant à chaque
  // ouverture, mix homérique + stoïcien (Marc Aurèle, Épictète).
  // Affichage discret en haut de /aujourdhui en EB Garamond italique.
  const MANTRAS = [
    // Homère / Odyssée
    "Endure, mon cœur ; tu as enduré pis encore.",
    "L'homme qui se gouverne lui-même est invincible.",
    "L'arc d'Ulysse, nul ne le tend que celui qui doit le tendre.",
    "Mêtis vaut mieux que force.",
    "Le mât tient. Toi aussi.",
    "Pénélope tisse. Toi aussi.",
    "Ne crains ni Charybde ni Scylla. Choisis.",
    "Les vents te portent quand tu rames.",
    // Stoïciens
    "Tu as autorité sur ton esprit, pas sur les événements.",
    "L'obstacle au chemin devient le chemin.",
    "Confine-toi au présent.",
    "Tu deviens ce à quoi tu prêtes attention.",
    "Le corps est l'instrument de l'âme.",
    "Vis selon ta nature.",
    "Souviens-toi : ce qui dépend de toi, et rien d'autre.",
    "Les difficultés révèlent l'homme.",
    "Aime ce que tu fais. Fais ce que tu aimes.",
    "Ne sois pas en colère contre la pierre qui tombe.",
    // Pindare / lyrique grecque
    "Deviens ce que tu es.",
    "Brève est la vie. Sois magnanime.",
    // Aristote
    "Nous sommes ce que nous répétons.",
    "L'excellence est une habitude, pas un acte.",
    // Héraclite
    "Le caractère est destin.",
    "On ne se baigne pas deux fois dans le même fleuve.",
  ];

  function pickMantraOfDay() {
    // Déterministe par jour : même mantra entre 2 ouvertures du jour.
    const day = new Date().toISOString().slice(0, 10);
    let h = 0;
    for (const c of day) h = (h * 31 + c.charCodeAt(0)) | 0;
    return MANTRAS[Math.abs(h) % MANTRAS.length];
  }

  /* ==========================================================
     SEED DATA V2 — fixtures from design handoff (data-model.md)
     Utilisées pour affichage quand les données réelles sont vides.
     ========================================================== */
  const SEED_LIFTS = [
    { key: 'squat',    name: 'Back Squat' },
    { key: 'deadlift', name: 'Deadlift' },
    { key: 'bench',    name: 'Bench Press' },
    { key: 'ohp',      name: 'Overhead Press' },
    { key: 'row',      name: 'Pendlay Row' },
  ];

  const SEED_ATHX_STANDARDS = [
    { lift: 'squat',    targetRatio: 2.0 },
    { lift: 'deadlift', targetRatio: 2.5 },
    { lift: 'bench',    targetRatio: 1.5 },
    { lift: 'ohp',      targetRatio: 1.0 },
    { lift: 'row',      targetRatio: 1.5 },
  ];

  const ATTRIBUTES_INFO = {
    sthenos: {
      label: 'Sthenos', glyph: 'Σ', color: 'var(--accent-laurel)',
      formula: 'moyenne ponderee e1RM Squat/Deadlift/Bench/OHP/Row, normalisee vs seuil ATHX (xBW)',
      advice: 'progresse via les TOP sets Strength 1/2 — ajoute du tonnage absolu, vise +2.5kg/sem.'
    },
    bia: {
      label: 'Bia', glyph: 'B', color: 'var(--accent-olympus)',
      formula: 'index puissance derive des slots JUMP/THROW/SPRINT — vitesse x charge sur mouvements explosifs',
      advice: 'concentre-toi sur les box jumps et med ball throws en debut de seance, repos complet entre tentatives.'
    },
    ponos: {
      label: 'Ponos', glyph: 'Π', color: 'var(--accent-royal)',
      formula: 'volume tenable x densite — temps sous tension cumule sur les slots EMOM/DENS/MAP',
      advice: 'ne saute pas les Energy 1/2 — la densite paye sur l\'horizon ATHX, ajoute 1 round si RPE < 8.'
    },
    metis: {
      label: 'Metis', glyph: 'M', color: 'var(--text-secondary)',
      formula: 'qualite technique x choix tactiques — RPE prescrits respectes, charge auto-regulee correctement',
      advice: 'travaille les fondations : sors de ta zone, fais 1 set technique a RPE 6 avant chaque TOP set.'
    },
    arete: {
      label: 'Arete', glyph: 'A', color: 'var(--accent-laurel)',
      formula: 'agregat des 4 autres + assiduite (seances tenues / planifiees) + PR cumules sur le bloc',
      advice: 'tiens la regularite — 4 seances sur 4 cette semaine, et l\'Arete monte mecaniquement.'
    },
  };

  const ATTR_KEYS = ['sthenos', 'bia', 'ponos', 'metis', 'arete'];
  const DAY_LABELS = ['', 'LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM', 'DIM'];

  // Mood tracking (SPEC §11 Étape 9) — 4 emojis post-session.

    { id: 'fire',    emoji: '🔥', label: 'Galvanisé' },
    { id: 'happy',   emoji: '🙂', label: 'Bien'      },
    { id: 'neutral', emoji: '😐', label: 'Moyen'     },
    { id: 'drained', emoji: '😩', label: 'Vidé'      },
  ];

  // Pool de phrases fin de session (v4 patch §Microcopy variable)
  const SESSION_END_PHRASES = [
    "Endure, mon cœur.",
    "Mètis intacte.",
    "Thumos plein.",
    "Kléos accroît.",
    "Cyclope aveuglé.",
    "Sirènes ignorées.",
    "Lotophages dépassés.",

    "Athéna veille.",

  /* ==========================================================
     SESSION DAY LAYOUT — 7 jours de la semaine
     Mon/Wed/Fri/Sat = strength (sessionDay côté API)
     Tue/Thu/Sun = light/off (label uniquement, pas de programme API)
     ========================================================== */
  const PROGRAMME_START = '2026-05-11'; // Lundi 11 mai 2026 = J1 Block 1 Sem 1

  const WEEK_DAYS = [
    { idx: 1, fr: 'Lundi',    en: 'Monday',    sessionDay: 'Monday',    label: 'Strength 1',           strength: true  },
    { idx: 2, fr: 'Mardi',    en: 'Tuesday',   sessionDay: 'Tuesday',   label: 'Aérobie + bras + abs',    strength: false, userDefined: true },
    { idx: 3, fr: 'Mercredi', en: 'Wednesday', sessionDay: 'Wednesday', label: 'Strength 2',           strength: true  },
    { idx: 4, fr: 'Jeudi',    en: 'Thursday',  sessionDay: 'Thursday',  label: 'Sprints + Anaérobie HIIT', strength: false, userDefined: true },
    { idx: 5, fr: 'Vendredi', en: 'Friday',    sessionDay: 'Friday',    label: 'Strength 3',           strength: true  },
    { idx: 6, fr: 'Samedi',   en: 'Saturday',  sessionDay: 'Saturday',  label: 'Upper Body',           strength: true  },
    { idx: 0, fr: 'Dimanche', en: 'Sunday',    sessionDay: null,        label: 'Off / Light',          strength: false },
  ];

  /* ==========================================================
     UTILS
     ========================================================== */
  const daysUntil = (isoDate) => {
    const target = new Date(isoDate + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.max(0, Math.round((target - now) / 86400000));
  };

  // Semaine courante (1..20). Pré-démarrage = 1, post-fin = 20.
  const getCurrentWeek = () => {
    const start = new Date(PROGRAMME_START + 'T00:00:00');
    const now = new Date();
    if (now < start) return 1;
    const days = Math.floor((now - start) / 86400000);
    return Math.max(1, Math.min(20, Math.floor(days / 7) + 1));
  };

  // Jour courant en idx 0..6 (dimanche..samedi convention JS).
  const getCurrentWeekDayIdx = () => new Date().getDay();

  const getCurrentBlock = (week) => {
    return BLOCKS.find(b => week >= b.weeks[0] && week <= b.weeks[1]) || BLOCKS[0];
  };

  const getRank = (streak) => {
    let current = STREAK_RANKS[0];
    for (const rank of STREAK_RANKS) {
      if (streak >= rank.min) current = rank;
    }
    return current;
  };

  /* ==========================================================
     CALCULS (SPEC v5 §10)
     ========================================================== */
  const epley = (weight, reps) => weight * (1 + 0.0333 * reps);

  // Stress Index : (weight/e1RM_known) × reps × f_rir.
  // Si pas d'e1RM_known, on utilise l'e1RM du set lui-même (fallback)
  // — donne une valeur "interne" au set, comparable entre sets de même exo.
  const stressIndex = (weight, reps, rir, e1RMKnown) => {
    const ref = e1RMKnown || epley(weight, reps);
    const fRir = 1 + 1 / ((rir || 0) + 1);
    return (weight / ref) * reps * fRir;
  };

  const volumeLoad = (sets) => sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);

  // Best e1RM parmi un tableau de sets (ignore null/undefined).
  const bestE1RM = (sets) => sets.reduce((m, s) => (s.e1RM > m ? s.e1RM : m), 0);

  // Round à 0.5 (utile pour les steppers fractionnaires).
  const round05 = (x) => Math.round(x * 2) / 2;

  const FORMAT_META = {
    traditional: { label: 'TRAD',        color: 'var(--text-secondary)' },
    doubleProg:  { label: 'DBL PROG',    color: 'var(--accent-laurel)' },
    emom:        { label: 'EMOM',        color: 'var(--accent-royal)' },
    density:     { label: 'DENSITY',     color: 'var(--accent-royal-soft)' },
    topBackoff:  { label: 'TOP+BO',      color: 'var(--accent-olympus)' },
    softAmrap:   { label: 'SOFT AMRAP',  color: 'var(--accent-olympus-soft)' },
    amrap:       { label: 'AMRAP',       color: 'var(--accent-blood-soft)' },
    jump:        { label: 'JUMP',        color: 'var(--accent-blood)' },
  };

  // Format detection — 8 niveaux, précédence stricte, premier match gagne
  function detectFormat(prescription, exerciseName) {
    const p = (prescription || '').toLowerCase();
    const n = (exerciseName || '').toLowerCase();
    const pn = p + ' ' + n;
    // 1. JUMP
    if (/\b(single effort|max jump|1 max effort|broad jump|vertical jump)\b/.test(pn)) return 'jump';
    // 2. EMOM (only — density is separate)
    if (/\b(emom|every minute on the minute)\b/.test(p)) return 'emom';
    // 3. DENSITY
    if (/\bdensity set\b/.test(p)) return 'density';
    // 4. TOP SET + BACK-OFF
    if (/\b(top set|work up to|1\s*set\s*to\s*failure)\b/.test(p) || /\d+\s*[x×]\s*\d+\s*@\s*rpe\s*\d+\s*then\s+\d+\s*[x×]\s*\d+/.test(p)) return 'topBackoff';
    // 5. SOFT AMRAP (before amrap — "soft amrap" contains "amrap")
    if (/\bsoft amrap\b/.test(p)) return 'softAmrap';
    // 6. AMRAP
    if (/\b(true amrap|amrap set)\b/.test(p) || /followed by.*amrap/i.test(p) || /\bamrap\b/.test(p)) return 'amrap';
    // 7. DOUBLE PROG — double condition (range + mention)
    if (/\d+\s*[-–]\s*\d+\s*reps?/.test(p) && /\b(double progression|rep range)\b/.test(p)) return 'doubleProg';
    // 8. TRADITIONAL — fallback
    return 'traditional';
  }

  function convertLbsToKg(text) {
    if (!text) return text;
    return text.replace(/(\d+\.?\d*)\s*(lbs?|pounds?)\b/gi, (_, num) => round05(parseFloat(num) * 0.4536) + ' kg');
  }

  function parseRepRange(prescription) {
    const m = (prescription || '').match(/(\d+)\s*[-–]\s*(\d+)\s*reps?/i);
    return m ? [parseInt(m[1], 10), parseInt(m[2], 10)] : null;
  }

  function parseDuration(prescription) {
    const m = (prescription || '').match(/(\d+)\s*min/i);
    return m ? parseInt(m[1], 10) : null;
  }

  function parseBackoffPercent(prescription) {
    if (!prescription) return null;
    const p = prescription.toLowerCase();
    // "strip 5-10%" or "drop 10%"
    const stripMatch = p.match(/\b(?:strip|drop|reduce)\s+(\d+)\s*[-–]?\s*(\d+)?\s*%/);
    if (stripMatch) {
      const lo = parseInt(stripMatch[1], 10);
      const hi = stripMatch[2] ? parseInt(stripMatch[2], 10) : lo;
      return { mode: 'stripWeight', percent: (lo + hi) / 2 / 100 };
    }
    // "take 87-93% of estimated 1RM" or "use 85% of e1RM"
    const ofMatch = p.match(/\b(\d+)\s*[-–]?\s*(\d+)?\s*%\s*(?:of\s+)?(?:estimated\s+)?(?:1\s*rm|e1rm|one.rep.max)/);
    if (ofMatch) {
      const lo = parseInt(ofMatch[1], 10);
      const hi = ofMatch[2] ? parseInt(ofMatch[2], 10) : lo;
      return { mode: 'ofE1RM', percent: (lo + hi) / 2 / 100 };
    }
    return null;
  }

  function calculateSuggestedWeight(referenceWeight, backoffInfo) {
    if (!backoffInfo || !referenceWeight) return null;
    if (backoffInfo.mode === 'stripWeight') {
      return round05(referenceWeight * (1 - backoffInfo.percent));
    }
    if (backoffInfo.mode === 'ofE1RM') {
      return round05(referenceWeight * backoffInfo.percent);
    }
    return null;
  }

  function parseDensityPercents(prescription) {
    const m = (prescription || '').match(/(\d+(?:\.\d+)?)\s*[-–]?\s*(\d+(?:\.\d+)?)?\s*%/);
    if (!m) return null;
    const lo = parseFloat(m[1]);
    const hi = m[2] ? parseFloat(m[2]) : lo;
    return { lo, hi };
  }

  function parseEmomRepsTarget(prescription) {
    const p = (prescription || '').toLowerCase();
    const m1 = p.match(/(\d+)\s*reps?\s+(?:every|per|emom)/);
    if (m1) return parseInt(m1[1], 10);
    const m2 = p.match(/sets?\s+of\s+(\d+)\s*reps?/);
    if (m2) return parseInt(m2[1], 10);
    const m3 = p.match(/(\d+)\s*reps?\s+(?:on the minute|otm)/);
    if (m3) return parseInt(m3[1], 10);
    return null;
  }

  function parseEmomPercents(prescription) {
    return parseDensityPercents(prescription);
  }

  function computeSuggestions(sourceWeek, sessionDay, exerciseSlot, exerciseName, format, prescription, sets) {
    if (sourceWeek < 1 || !sets || sets.length === 0) return null;

    switch (format) {
      case 'density': {
        const lastWeight = sets[sets.length - 1]?.weight;
        if (!lastWeight) return null;
        const finalTotalReps = sets.reduce((sum, s) => sum + (s.reps || 0), 0);
        if (finalTotalReps > 25) return { suggestedWeight: round05(lastWeight + 7.5), suggestedReps: null, delta: '+7.5 kg', rule: 'density_>25reps_+7.5kg' };
        if (finalTotalReps >= 20) return { suggestedWeight: round05(lastWeight + 2.5), suggestedReps: null, delta: '+2.5 kg', rule: 'density_20-25reps_+2.5kg' };
        return { suggestedWeight: lastWeight, suggestedReps: null, delta: 'même charge', rule: 'density_<20reps_sameload_morereps' };
      }
      case 'doubleProg': {
        const range = parseRepRange(prescription);
        if (!range) return null;
        const lastWeight = sets[sets.length - 1]?.weight;
        if (!lastWeight) return null;
        const allAtTop = sets.every(s => (s.reps || 0) >= range[1]);
        if (allAtTop) return { suggestedWeight: round05(lastWeight + 5), suggestedReps: null, delta: '+5 kg', rule: 'doubleProg_topRange_+5kg' };
        return { suggestedWeight: lastWeight, suggestedReps: 'morereps', delta: 'même charge', rule: 'doubleProg_belowRange_morereps' };
      }
      case 'topBackoff': {
        const topSets = sets.filter(s => s.isTopSet);
        if (topSets.length === 0) return null;
        const topWeight = Math.max(...topSets.map(s => s.weight || 0));
        const hasPR = topSets.some(s => s.isPR);
        if (hasPR) return { suggestedWeight: round05(topWeight + 2.5), suggestedReps: null, delta: '+2.5 kg', rule: 'topBackoff_PR_+2.5kg' };
        return { suggestedWeight: topWeight, suggestedReps: null, delta: 'même charge', rule: 'topBackoff_noPR_sameload' };
      }
      case 'emom': {
        const repsTarget = parseEmomRepsTarget(prescription);
        const minutesTarget = parseDuration(prescription) || 10;
        const lastWeight = sets[sets.length - 1]?.weight;
        if (!repsTarget || !lastWeight) return null;
        const allRepsAchieved = sets.every(s => (s.reps || 0) >= repsTarget);
        const setsAchieved = sets.length >= minutesTarget;
        if (allRepsAchieved && setsAchieved) return { suggestedWeight: round05(lastWeight + 2.5), suggestedReps: null, delta: '+2.5 kg', rule: 'emom_completed_+2.5kg' };
        return { suggestedWeight: lastWeight, suggestedReps: null, delta: 'même charge', rule: 'emom_incomplete_sameload' };
      }
      case 'softAmrap': {
        const topSet = sets.reduce((best, s) => (!best || (s.reps || 0) > (best.reps || 0)) ? s : best, null);
        if (!topSet || !topSet.weight) return null;
        const topReps = topSet.reps || 0;
        if (topReps >= 12) return { suggestedWeight: round05(topSet.weight + 5), suggestedReps: null, delta: '+5 kg', rule: 'softAmrap_12+_+5kg' };
        if (topReps >= 10) return { suggestedWeight: round05(topSet.weight + 2.5), suggestedReps: null, delta: '+2.5 kg', rule: 'softAmrap_10-12_+2.5kg' };
        return { suggestedWeight: topSet.weight, suggestedReps: 'morereps', delta: 'même charge', rule: 'softAmrap_<10_sameload' };
      }
      default:
        return null;
    }
  }

  /* ==========================================================
     DATA LAYER — Dexie / IndexedDB (SPEC v5 §9)
     Schéma complet anticipé pour Phase 2 et 3 (évite migrations lourdes).
     ========================================================== */
  const db = new Dexie('Odyssea');
  db.version(1).stores({
    sets:         '++id, [week+sessionDay+exerciseSlot+setNumber], week, sessionDay, exerciseSlot, completedAt, syncedAt',
    sessions:     '++id, [week+sessionDay], week, sessionDay, completedAt, syncedAt',
    programme:    '++id, [week+sessionDay+exerciseSlot], block, week, sessionDay',
    oneRMs:       '++id, exerciseName, computedAt',
    streak:       '++id',
    badges:       '++id, badgeId, unlockedAt',
    prefs:        'key',
    rewards:      '++id, milestoneId, unlockedAt, claimedAt',
    mantrasSeen:  '++id, mantraId, seenAt',
    moods:        '++id, sessionId, loggedAt',
  });

  db.version(2).stores({
    userSessionConfigs: 'sessionDay',
  });

  db.version(3).stores({
    weekSuggestions: '[week+sessionDay+exerciseSlot]',
  });

  db.version(4).stores({
    attributes: '++id, type, computedAt',
  });

  db.version(5).stores({
    prs: '++id, liftKey, week, block, validatedAt',
  });

  // Singleton de protection contre les seeds concurrents au boot.
  let seedInFlight = null;

  // Seed du `programme` table depuis l'API si vide. Idempotent : no-op
  // si déjà rempli. En cas d'erreur réseau, on ne marque rien et on
  // retentera au prochain démarrage.
  async function seedIfEmpty() {
    if (seedInFlight) return seedInFlight;
    seedInFlight = (async () => {
      const count = await db.programme.count();
      if (count > 0) return { ok: true, skipped: true, count };
      try {
        // CRITIQUE : pas de Content-Type explicite. Apps Script fait du
        // 302 → script.googleusercontent.com sur les POST. application/json
        // déclenche un preflight CORS qu'Apps Script ne gère pas → fail.
        // text/plain (default fetch) = "simple request" → pas de preflight.
        // Apps Script lit `e.postData.contents` en raw, le JSON.parse marche.
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'readWeek', week: 1 }),
        });
        const data = await res.json();
        if (!data || !data.ok || !data.sessions) {
          throw new Error(data && data.error || 'Réponse API invalide');
        }
        const block = getCurrentBlock(1).id;
        const rows = [];
        for (const sess of data.sessions) {
          for (const ex of (sess.exercises || [])) {
            rows.push({
              block,
              week: data.week,
              sessionDay: sess.day,
              exerciseSlot: ex.slot,
              exerciseName: ex.name || '',
              prescription: ex.prescription || '',
              format: ex.format || detectFormat(ex.prescription, ex.name),
            });
          }
        }
        await db.programme.bulkAdd(rows);
        await db.prefs.put({ key: 'lastSeedAt', value: new Date().toISOString() });
        return { ok: true, count: rows.length };
      } catch (e) {
        await db.prefs.put({ key: 'lastSeedError', value: { message: String(e), at: new Date().toISOString() } });
        return { ok: false, error: String(e) };
      }
    })();
    try { return await seedInFlight; } finally { seedInFlight = null; }
  }

  // Hook : lit le programme d'une semaine groupé par jour.
  // Reactif sur `week` ; rafraîchit aussi quand un seed se termine.
  const useWeekProgramme = (week, refreshKey = 0) => {
    const [byDay, setByDay] = useState(null);
    useEffect(() => {
      let alive = true;
      db.programme.where('week').equals(week).toArray().then(rows => {
        if (!alive) return;
        rows.sort((a, b) => a.exerciseSlot - b.exerciseSlot);
        const grouped = {};
        for (const r of rows) (grouped[r.sessionDay] ||= []).push(r);
        setByDay(grouped);
      });
      return () => { alive = false; };
    }, [week, refreshKey]);
    return byDay;
  };

  // Hook : lit tous les sets d'une session (week+sessionDay), groupés par
  // exerciseSlot, triés par setNumber. Renvoie [setsBySlot, refresh].
  const useSetsForDay = (week, sessionDay) => {
    const [bySlot, setBySlot] = useState(null);
    const [tick, setTick] = useState(0);
    const refresh = useCallback(() => setTick(t => t + 1), []);
    useEffect(() => {
      if (!sessionDay) { setBySlot({}); return; }
      let alive = true;
      db.sets.where('week').equals(week).toArray().then(all => {
        if (!alive) return;
        const filtered = all.filter(s => s.sessionDay === sessionDay);
        filtered.sort((a, b) => (a.exerciseSlot - b.exerciseSlot) || (a.setNumber - b.setNumber));
        const grouped = {};
        for (const s of filtered) (grouped[s.exerciseSlot] ||= []).push(s);
        setBySlot(grouped);
      });
      return () => { alive = false; };
    }, [week, sessionDay, tick]);
    return [bySlot, refresh];
  };

  const useWeekStats = (week) => {
    const [stats, setStats] = useState({ volume: 0, prCount: 0, doneDays: 0, totalDays: 0, doneSessionDays: [] });
    useEffect(() => {
      db.sets.where('week').equals(week).toArray().then(all => {
        const vol = all.reduce((s, r) => s + ((r.weight || 0) * (r.reps || 0)), 0);
        const prs = all.filter(r => r.isPR).length;
        const daySet = new Set(all.map(r => r.sessionDay));
        const totalDays = WEEK_DAYS.filter(d => d.strength || d.userDefined).length;
        setStats({ volume: vol, prCount: prs, doneDays: daySet.size, totalDays, doneSessionDays: [...daySet] });
      });
    }, [week]);
    return stats;
  };

  /* ==========================================================
     SYNC LAYER — POST writeSet vers Apps Script
     ========================================================== */
  async function postWriteSet(set) {
    // CORS-safe : pas de Content-Type explicite (cf. seedIfEmpty).
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'writeSet',
        week: set.week,
        sessionDay: set.sessionDay,
        exerciseSlot: set.exerciseSlot,
        setNumber: set.setNumber,
        exerciseName: set.exerciseName ?? null,
        format: set.format ?? 'traditional',
        weight: set.weight ?? null,
        reps: set.reps ?? null,
        rir: set.rir ?? null,
        e1RM: set.e1RM ?? null,
        totalReps: set.totalReps ?? null,
        durationMinutes: set.durationMinutes ?? null,
        jumpHeight: set.jumpHeight ?? null,
        jumpDistance: set.jumpDistance ?? null,
        isTopSet: set.isTopSet ?? null,
        isBackOff: set.isBackOff ?? null,
        completedAt: set.completedAt ?? null,
      }),
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || 'writeSet failed');
    return data;
  }

  const USER_DEFINED_DAYS = ['Tuesday', 'Thursday'];

  // Sync de tous les sets non-syncés STRENGTH. Retourne {success, fail}.
  // Appelé au boot (si online) et à chaque tap TERMINER.
  // Exclut les sets user-defined (syncs via writeUserSession au TERMINER).
  async function syncPendingSets() {
    if (!navigator.onLine) return { success: 0, fail: 0, skipped: 'offline' };
    const all = await db.sets.toArray();
    const unsynced = all.filter(s => !s.syncedAt && !USER_DEFINED_DAYS.includes(s.sessionDay));
    let success = 0, fail = 0;
    for (const set of unsynced) {
      try {
        await postWriteSet(set);
        await db.sets.update(set.id, { syncedAt: new Date().toISOString() });
        success++;
      } catch (e) {
        fail++;
      }
    }
    return { success, fail, total: unsynced.length };
  }

  async function postWriteUserSession(week, sessionDay, configuration, sets, completedAt, notes) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'writeUserSession',
        week, sessionDay, configuration, sets, completedAt,
        ...(notes ? { notes } : {}),
      }),
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || 'writeUserSession failed');
    return data;
  }

  async function syncPendingUserSessions() {
    if (!navigator.onLine) return;
    for (const day of USER_DEFINED_DAYS) {
      const sets = await db.sets.where('sessionDay').equals(day).toArray();
      const unsynced = sets.filter(s => !s.syncedAt);
      if (unsynced.length === 0) continue;
      const flag = await db.prefs.get('udSessionInProgress');
      if (flag?.value?.sessionDay === day) continue;
      const configRow = await db.userSessionConfigs.get(day);
      if (!configRow?.configuration) continue;
      const weekVal = unsynced[0].week;
      try {
        await postWriteUserSession(weekVal, day, configRow.configuration, unsynced, new Date().toISOString());
        const now = new Date().toISOString();
        for (const s of unsynced) await db.sets.update(s.id, { syncedAt: now });
      } catch {}
    }
  }

  /* ==========================================================
     SYNC RECOVERY — Pull sets/sessions from backend after wipe
     V1 = one-shot recovery, no incremental sync.
     ========================================================== */
  async function syncSetsFromBackend({ force = false } = {}) {
    if (!force) {
      const localCount = await db.sets.count();
      if (localCount > 0) {
        console.log('[sync] db.sets not empty, skip');
        return { skipped: true };
      }
    }
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'readSets' }),
      });
      const data = await res.json();
      if (!data.ok || !Array.isArray(data.sets)) {
        console.warn('[sync] readSets failed:', data.error);
        return { error: data.error };
      }
      if (data.sets.length === 0) {
        console.log('[sync] no remote sets to pull');
        return { pulled: 0 };
      }
      const rows = data.sets.map(s => ({
        week: Number(s.week),
        sessionDay: s.sessionDay,
        exerciseSlot: Number(s.exerciseSlot),
        setNumber: Number(s.setNumber),
        exerciseName: s.exerciseName || '',
        format: s.format || 'traditional',
        weight: typeof s.weight === 'number' ? s.weight : null,
        reps: typeof s.reps === 'number' ? s.reps : null,
        rir: typeof s.rir === 'number' ? s.rir : null,
        e1RM: typeof s.e1RM === 'number' ? s.e1RM : null,
        totalReps: typeof s.totalReps === 'number' ? s.totalReps : null,
        durationMinutes: typeof s.durationMinutes === 'number' ? s.durationMinutes : null,
        jumpHeight: typeof s.jumpHeight === 'number' ? s.jumpHeight : null,
        jumpDistance: typeof s.jumpDistance === 'number' ? s.jumpDistance : null,
        isTopSet: !!s.isTopSet,
        isBackOff: !!s.isBackOff,
        completedAt: s.completedAt || s.timestamp || new Date().toISOString(),
        block: getCurrentBlock(Number(s.week)).id,
        synced: true,
      }));
      await db.sets.bulkAdd(rows);
      console.log(`[sync] pulled ${rows.length} sets from backend`);
      return { pulled: rows.length };
    } catch (e) {
      console.warn('[sync] syncSetsFromBackend error:', e);
      return { error: e.message };
    }
  }

  async function syncSessionsFromBackend({ force = false } = {}) {
    if (!force) {
      const localCount = await db.sessions.count();
      if (localCount > 0) {
        console.log('[sync] db.sessions not empty, skip');
        return { skipped: true };
      }
    }
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'readUserSessions' }),
      });
      const data = await res.json();
      if (!data.ok || !Array.isArray(data.sessions)) {
        console.warn('[sync] readUserSessions failed:', data.error);
        return { error: data.error };
      }
      if (data.sessions.length === 0) {
        console.log('[sync] no remote sessions to pull');
        return { pulled: 0 };
      }
      const rows = data.sessions.map(s => ({
        week: Number(s.week),
        sessionDay: s.sessionDay,
        completedAt: s.completedAt || s.timestamp || new Date().toISOString(),
        syncedAt: new Date().toISOString(),
      }));
      await db.sessions.bulkAdd(rows);
      console.log(`[sync] pulled ${rows.length} sessions from backend`);
      return { pulled: rows.length };
    } catch (e) {
      console.warn('[sync] syncSessionsFromBackend error:', e);
      return { error: e.message };
    }
  }

  /* ==========================================================
     STREAK SYSTEM (SPEC v5 §7.2)
     - Tolérance 4 jours : ≤ 4 j sans session = streak continue
     - > 4 j sans session = streak break, repart à 1
     - 1 incrément par jour max (multiples sessions/jour ne cumulent pas)
     ========================================================== */
  const STREAK_BREAK_THRESHOLD = 4; // jours
  const STREAK_WARN_THRESHOLD = 3;  // alerte Lotophages à J3

  async function getStreak() {
    let row = await db.streak.get(1);
    if (!row) {
      row = {
        id: 1,
        currentStreak: 0,
        longestStreak: 0,
        lastSessionDate: null,
        currentRank: STREAK_RANKS[0].name,
        pardonsAvailable: 0,
        pardonsUsed: 0,
      };
      await db.streak.put(row);
    }
    return row;
  }

  // Bump streak après une session validée. Retourne le nouveau streak.
  async function bumpStreak() {
    const todayIso = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    const row = await getStreak();
    if (row.lastSessionDate === todayIso) return row; // déjà bumpé aujourd'hui
    let next = 1;
    if (row.lastSessionDate) {
      const last = new Date(row.lastSessionDate);
      const today = new Date(todayIso);
      const days = Math.round((today - last) / 86400000);
      next = days > STREAK_BREAK_THRESHOLD ? 1 : (row.currentStreak + 1);
    }
    const updated = {
      ...row,
      currentStreak: next,
      longestStreak: Math.max(row.longestStreak, next),
      lastSessionDate: todayIso,
      currentRank: getRank(next).name,
    };
    await db.streak.put(updated);
    return updated;
  }

  /* ==========================================================
     Pardon hebdo (SPEC §11 Étape 8) — 1 pardon octroyé par mois.
     Permet de "sauter" une session manquée sans casser le streak.
     Stocké dans streak.pardonsAvailable / pardonsUsed + lastPardonMonth.
     ========================================================== */
  async function ensureMonthlyPardon() {
    const row = await getStreak();
    const monthKey = new Date().toISOString().slice(0, 7); // YYYY-MM
    if (row.lastPardonMonth === monthKey) return row;
    const updated = {
      ...row,
      pardonsAvailable: (row.pardonsAvailable || 0) + 1,
      lastPardonMonth: monthKey,
    };
    await db.streak.put(updated);
    return updated;
  }

  // Utilise un pardon : avance lastSessionDate à aujourd'hui sans bumper le
  // count. Le streak ne casse pas, mais ne progresse pas non plus.
  async function usePardon() {
    const row = await getStreak();
    if (!row.pardonsAvailable || row.pardonsAvailable < 1) return null;
    const todayIso = new Date().toISOString().slice(0, 10);
    const updated = {
      ...row,
      pardonsAvailable: row.pardonsAvailable - 1,
      pardonsUsed: (row.pardonsUsed || 0) + 1,
      lastSessionDate: todayIso, // sauve le streak du break
    };
    await db.streak.put(updated);
    return updated;
  }

  // À J3 sans session strength : warning "Ne sois pas Ulysse aux Lotophages"
  function daysSinceLastSession(streak) {
    if (!streak?.lastSessionDate) return null;
    const last = new Date(streak.lastSessionDate);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((today - last) / 86400000);
  }

  /* ==========================================================
     HERO STATS (SPEC §11 Avatar du Héros)
     ========================================================== */
  const clamp01 = (x) => Math.max(0, Math.min(1, x));

  // Match un set à un standard ATHX par regex sur exerciseName.
  const matchStandard = (exerciseName) =>
    ATHX_STANDARDS.find(s => s.pattern.test(exerciseName || ''));

  // Calcule pour chaque standard : best e1RM, ratio current/target.
  // Retourne array [{id, name, bestE1RM, ratioBW, progress, ...}]
  // - ratioBW : best e1RM / BW (null si pas de BW)
  // - progress : (ratioBW - startBW) / (targetBW - startBW), clampé 0..1
  // declaredE1RMByName : map { exerciseName → e1RM déclaré le plus récent
  // dans db.oneRMs }, optionnel. Si fourni, le bestE1RM affiché est le max
  // entre le meilleur set logué et le déclaratif (matching via std.pattern,
  // donc "OHP" déclaré matche le std `ohp` /^ohp/ etc.).
  function computeStandards(allSets, bodyweight, declaredE1RMByName = {}) {
    return ATHX_STANDARDS.map(std => {
      const matches = allSets.filter(s => std.pattern.test(s.exerciseName || '') && s.e1RM);
      const setsBest = matches.length ? Math.max(...matches.map(s => s.e1RM)) : 0;
      let declaredBest = 0;
      for (const [name, weight] of Object.entries(declaredE1RMByName)) {
        if (std.pattern.test(name) && weight > declaredBest) declaredBest = weight;
      }
      const bestE1RM = Math.max(setsBest, declaredBest);
      const ratioBW = bodyweight > 0 ? bestE1RM / bodyweight : null;
      const progress = ratioBW != null
        ? clamp01((ratioBW - std.startBW) / (std.targetBW - std.startBW))
        : 0;
      return { ...std, bestE1RM, ratioBW, progress };
    });
  }

  // Pour chaque standard ATHX (lift), retourne la trajectoire e1RM
  // semaine par semaine : [{week, e1RM}] trié ascendant.
  // Une semaine = le meilleur e1RM mesuré sur cette semaine pour ce lift.
  // Permet de visualiser la progression depuis le point de départ
  // (réponse à la question "Comment évolue mon e1RM ?" du Job #2).
  function computeWeeklyE1RMs(allSets) {
    const out = {};
    for (const std of ATHX_STANDARDS) {
      out[std.id] = [];
      const byWeek = {};
      for (const s of allSets) {
        if (!std.pattern.test(s.exerciseName || '')) continue;
        if (!s.e1RM) continue;
        if (!byWeek[s.week] || s.e1RM > byWeek[s.week]) {
          byWeek[s.week] = s.e1RM;
        }
      }
      const weeks = Object.keys(byWeek).map(Number).sort((a, b) => a - b);
      out[std.id] = weeks.map(w => ({ week: w, e1RM: byWeek[w] }));
    }
    return out;
  }

  // Compute les 5 attributs RPG sur un sous-ensemble de sets, ancré à
  // une semaine de référence. Ré-utilisé pour le snapshot actuel ET
  // pour le snapshot historique (radar comparatif).
  // - Sthénos : moyenne des progress des 4 lifts principaux (Squat/DL/Bench/OHP)
  // - Bia     : DL progress (puissance brute) — TODO jumps en Phase 2+
  // - Pónos   : volume cumulé sur les 4 sem glissantes finissant à anchorWeek
  // - Mètis   : ratio (sets PR) / (sessions completed) sur le sous-ensemble
  // - Áreté   : moyenne des 4 ci-dessus
  function computeAttributes(sets, sessions, bw, anchorWeek) {
    // EMOM et Jump exclus des calculs RPG
    // TODO post-Block 1 : Bia devrait inclure les jumps via une métrique power dédiée, Pónos devrait inclure les EMOM
    const rpgFormats = new Set([undefined, 'traditional', 'doubleProg', 'topBackoff', 'softAmrap', 'amrap']);
    const rpgSets = sets.filter(s => rpgFormats.has(s.format));
    const standards = computeStandards(rpgSets, bw);

    const sthenos = (() => {
      const main = standards.filter(s => ['squat', 'deadlift', 'bench', 'ohp'].includes(s.id));
      if (!main.length) return 0;
      return main.reduce((a, s) => a + s.progress, 0) / main.length;
    })();

    const bia = standards.find(s => s.id === 'deadlift')?.progress || 0;

    const ponos = (() => {
      const since = anchorWeek - 3;
      const recent = rpgSets.filter(s => s.week >= since && s.week <= anchorWeek && s.completedAt);
      const vl = recent.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
      // Baseline arbitraire pour normaliser : 80 000 kg sur 4 sem = "haut"
      return clamp01(vl / 80000);
    })();

    const completedSessions = sessions.filter(s => s.completedAt);
    const prCount = rpgSets.filter(s => s.isPR).length;
    const metis = completedSessions.length > 0
      ? clamp01(prCount / completedSessions.length)
      : 0;

    const arete = (sthenos + bia + ponos + metis) / 4;

    return { sthenos, bia, ponos, metis, arete, standards, completedSessionsCount: completedSessions.length, prCount };
  }

  // Construit le tableau radar (5 axes) depuis un objet d'attributs.
  function radarFromAttributes(attrs) {
    return [
      { id: 'sthenos', label: 'Sthénos', value: attrs.sthenos },
      { id: 'bia',     label: 'Bia',     value: attrs.bia },
      { id: 'ponos',   label: 'Pónos',   value: attrs.ponos },
      { id: 'metis',   label: 'Mètis',   value: attrs.metis },
      { id: 'arete',   label: 'Áreté',   value: attrs.arete },
    ];
  }

  // ── Pentagon RPG Live ──────────────────────────────────────
  function parseDurationMinutes(prescription) {
    const p = (prescription || '');
    const range = p.match(/(\d+)\s*[-–]\s*(\d+)\s*min/i);
    if (range) return (parseInt(range[1], 10) + parseInt(range[2], 10)) / 2;
    const single = p.match(/(\d+)\s*min/i);
    if (single) return parseInt(single[1], 10);
    return 0;
  }

  function getPrescribedRir(programmeRow) {
    if (!programmeRow?.prescription) return null;
    const p = programmeRow.prescription;
    const rirRange = p.match(/RIR\s*(\d+)\s*[-–]\s*(\d+)/i);
    if (rirRange) return (parseInt(rirRange[1], 10) + parseInt(rirRange[2], 10)) / 2;
    const rir = p.match(/RIR\s*(\d+)/i);
    if (rir) return parseInt(rir[1], 10);
    const rpeRange = p.match(/RPE\s*(\d+)\s*[-–]\s*(\d+)/i);
    if (rpeRange) return 10 - (parseInt(rpeRange[1], 10) + parseInt(rpeRange[2], 10)) / 2;
    const rpe = p.match(/RPE\s*(\d+)/i);
    if (rpe) return 10 - parseInt(rpe[1], 10);
    return null;
  }

  async function computeAttributesLive(blockId) {
    const [allSets, allProgramme, allOneRMs, bwPref, allUserConfigs] = await Promise.all([
      db.sets.toArray(),
      db.programme.toArray(),
      db.oneRMs.toArray(),
      db.prefs.get('bodyweight'),
      db.userSessionConfigs.toArray(),
    ]);
    const bodyweight = bwPref?.value || 0;
    const blockSets = allSets.filter(s => {
      const w = s.week || 0;
      const b = getCurrentBlock(w);
      return b.id === blockId;
    });
    const blockProgramme = allProgramme.filter(p => p.block === blockId);

    // ── Sthénos ──
    const sthenosBreakdown = {};
    const sthenosRatios = [];
    for (const std of ATHX_STANDARDS.filter(s => s.kind === 'lift')) {
      const declared = allOneRMs.filter(o => std.pattern.test(o.exerciseName || ''));
      const declaredBest = declared.length ? Math.max(...declared.map(o => o.weight || o.e1RM || 0)) : 0;
      const setsMatch = allSets.filter(s => std.pattern.test(s.exerciseName || '') && s.e1RM);
      const setsBest = setsMatch.length ? Math.max(...setsMatch.map(s => s.e1RM)) : 0;
      const record = Math.max(declaredBest, setsBest);
      let ratio = 0;
      if (record > 0 && bodyweight > 0) {
        ratio = Math.min((record / bodyweight) / std.targetBW, 1.0);
      }
      sthenosRatios.push(ratio);
      sthenosBreakdown[std.id] = { record, targetBW: std.targetBW, ratio };
    }
    const sthenos = sthenosRatios.length ? sthenosRatios.reduce((a, b) => a + b, 0) / sthenosRatios.length : 0;

    // ── Bia ──
    const biaSets = blockSets.filter(s => s.format === 'jump');
    const biaUserBlocks = allUserConfigs.flatMap(uc => (uc.configuration?.blocks || []))
      .filter(b => b.type === 'plyo' || b.type === 'sprint');
    const biaCurrentCount = biaSets.length + biaUserBlocks.reduce((sum, b) => sum + (b.sets?.length || 0), 0);
    const prescribedJumpSlots = blockProgramme.filter(p => p.format === 'jump');
    const prescribedSetsPerJumpSlot = 5;
    const biaPrescribedCount = prescribedJumpSlots.length * prescribedSetsPerJumpSlot;
    const bia = biaPrescribedCount > 0 ? Math.min(biaCurrentCount / biaPrescribedCount, 1.0) : 0;

    // ── Pónos ──
    const ponosFormats = new Set(['emom', 'density', 'softAmrap']);
    const ponosSets = blockSets.filter(s => ponosFormats.has(s.format) && s.durationMinutes);
    const currentMinutesFromSets = ponosSets.reduce((a, s) => a + s.durationMinutes, 0);
    const ponosUserBlocks = allUserConfigs.flatMap(uc => (uc.configuration?.blocks || []))
      .filter(b => b.type === 'aerobic' || b.type === 'anaerobic' || b.type === 'iso');
    const currentMinutesFromUd = ponosUserBlocks.reduce((a, b) => a + (b.durationMinutes || b.durationMinutesTarget || 0), 0);
    const currentMinutes = currentMinutesFromSets + currentMinutesFromUd;
    const ponosPrescribedSlots = blockProgramme.filter(p => ponosFormats.has(p.format));
    const prescribedMinutes = ponosPrescribedSlots.reduce((a, p) => a + parseDurationMinutes(p.prescription), 0);
    const ponos = prescribedMinutes > 0 ? Math.min(currentMinutes / prescribedMinutes, 1.0) : 0;

    // ── Mètis ──
    const programmeBySlot = {};
    for (const p of blockProgramme) {
      const key = `${p.week}_${p.sessionDay}_${p.exerciseSlot}`;
      programmeBySlot[key] = p;
    }
    const eligibleSets = blockSets.filter(s => {
      if (s.rir === null || s.rir === undefined) return false;
      const key = `${s.week}_${s.sessionDay}_${s.exerciseSlot}`;
      const prog = programmeBySlot[key];
      return getPrescribedRir(prog) !== null;
    });
    const inWindow = eligibleSets.filter(s => {
      const key = `${s.week}_${s.sessionDay}_${s.exerciseSlot}`;
      const prescribed = getPrescribedRir(programmeBySlot[key]);
      return Math.abs(s.rir - prescribed) <= 1;
    });
    const metis = eligibleSets.length > 0 ? inWindow.length / eligibleSets.length : 0.5;

    // ── Áreté ──
    const plannedSessions = new Set();
    const strengthFormats = new Set(['traditional', 'doubleProg', 'topBackoff', 'softAmrap', 'amrap', 'density', 'emom', 'jump']);
    for (const p of blockProgramme) {
      if (strengthFormats.has(p.format)) plannedSessions.add(`${p.week}_${p.sessionDay}`);
    }
    const doneSessions = new Set();
    for (const s of blockSets) {
      doneSessions.add(`${s.week}_${s.sessionDay}`);
    }
    const sessionsPlanned = plannedSessions.size;
    const sessionsDone = [...doneSessions].filter(k => plannedSessions.has(k)).length;
    const assiduity = sessionsPlanned > 0 ? Math.min(sessionsDone / sessionsPlanned, 1.0) : 0;

    const arete = 0.30 * sthenos + 0.15 * bia + 0.25 * ponos + 0.15 * metis + 0.15 * assiduity;

    return {
      sthenos, bia, ponos, metis, arete,
      breakdown: {
        sthenos: { ratios: sthenosBreakdown, mean: sthenos },
        bia: { current_count: biaCurrentCount, prescribed_count: biaPrescribedCount, fraction: bia },
        ponos: { current_minutes: currentMinutes, prescribed_minutes: prescribedMinutes, fraction: ponos },
        metis: { in_window: inWindow.length, total_with_prescribed: eligibleSets.length, fraction: metis },
        arete: { components: { sthenos: 0.30, bia: 0.15, ponos: 0.25, metis: 0.15, assiduity: 0.15 }, assiduity },
      },
    };
  }

  async function computeBaselineAttributes() {
    const [allOneRMs, bwPref] = await Promise.all([
      db.oneRMs.toArray(),
      db.prefs.get('bodyweight'),
    ]);
    const bodyweight = bwPref?.value || 0;
    const sthenosBreakdown = {};
    const sthenosRatios = [];
    for (const std of ATHX_STANDARDS.filter(s => s.kind === 'lift')) {
      const declared = allOneRMs.filter(o => std.pattern.test(o.exerciseName || ''));
      const declaredBest = declared.length ? Math.max(...declared.map(o => o.weight || o.e1RM || 0)) : 0;
      let ratio = 0;
      if (declaredBest > 0 && bodyweight > 0) {
        ratio = Math.min((declaredBest / bodyweight) / std.targetBW, 1.0);
      }
      sthenosRatios.push(ratio);
      sthenosBreakdown[std.id] = { record: declaredBest, targetBW: std.targetBW, ratio };
    }
    const sthenos = sthenosRatios.length ? sthenosRatios.reduce((a, b) => a + b, 0) / sthenosRatios.length : 0;
    const arete = 0.30 * sthenos + 0.15 * 0 + 0.25 * 0 + 0.15 * 0.5 + 0.15 * 0;
    return {
      sthenos, bia: 0, ponos: 0, metis: 0.5, arete,
      breakdown: {
        sthenos: { ratios: sthenosBreakdown, mean: sthenos },
        bia: { current_count: 0, prescribed_count: 0, fraction: 0 },
        ponos: { current_minutes: 0, prescribed_minutes: 0, fraction: 0 },
        metis: { in_window: 0, total_with_prescribed: 0, fraction: 0.5 },
        arete: { components: { sthenos: 0.30, bia: 0.15, ponos: 0.25, metis: 0.15, assiduity: 0.15 }, assiduity: 0 },
      },
    };
  }

  let _attrComputeLock = null;
  async function ensureAttributes(blockId) {
    if (_attrComputeLock) return _attrComputeLock;
    _attrComputeLock = (async () => {
      let baseline = await db.attributes.where('type').equals('baseline').first();
      if (!baseline) {
        const oneRMs = await db.oneRMs.toArray();
        if (oneRMs.length > 0) {
          const baseVals = await computeBaselineAttributes();
          const row = { type: 'baseline', ...baseVals, computedAt: new Date().toISOString() };
          const id = await db.attributes.add(row);
          baseline = { ...row, id };
        }
      }
      const currentVals = await computeAttributesLive(blockId);
      const currentRow = { type: 'current', ...currentVals, computedAt: new Date().toISOString() };
      const existingCurrent = await db.attributes.where('type').equals('current').first();
      if (existingCurrent) {
        await db.attributes.update(existingCurrent.id, currentRow);
      } else {
        await db.attributes.add(currentRow);
      }
      _attrComputeLock = null;
      return {
        current: currentVals,
        baseline: baseline || { sthenos: 0, bia: 0, ponos: 0, metis: 0.5, arete: 0, breakdown: null },
        breakdown: currentVals.breakdown,
      };
    })();
    return _attrComputeLock;
  }

  const useAttributes = (refreshKey = 0) => {
    const [attrs, setAttrs] = useState(null);
    useEffect(() => {
      let alive = true;
      (async () => {
        const week = getCurrentWeek();
        const blockId = getCurrentBlock(week).id;
        const result = await ensureAttributes(blockId);
        if (alive) {
          setAttrs(result);
        }
      })();
      return () => { alive = false; };
    }, [refreshKey]);
    return attrs;
  };

  async function computeHeroStats() {
    const [allSets, sessions, bwPref, currentWeek] = await Promise.all([
      db.sets.toArray(),
      db.sessions.toArray(),
      db.prefs.get('bodyweight'),
      Promise.resolve(getCurrentWeek()),
    ]);
    const bw = bwPref?.value || 0;

    const current = computeAttributes(allSets, sessions, bw, currentWeek);

    // Snapshot historique : 4 semaines en arrière. Permet au radar
    // d'afficher un second polygone "Sem -4" pour visualiser la
    // trajectoire des 5 attributs sur la dernière fenêtre glissante.
    // Pas dispo avant la sem 5 (rien à comparer) — pastRadar reste null.
    let pastRadar = null;
    const pastAnchor = currentWeek - 4;
    if (pastAnchor >= 1) {
      const pastSets = allSets.filter(s => s.week <= pastAnchor);
      const pastSessions = sessions.filter(s => s.week <= pastAnchor);
      if (pastSets.length > 0) {
        const past = computeAttributes(pastSets, pastSessions, bw, pastAnchor);
        pastRadar = radarFromAttributes(past);
      }
    }

    return {
      sthenos: current.sthenos,
      bia: current.bia,
      ponos: current.ponos,
      metis: current.metis,
      arete: current.arete,
      standards: current.standards,
      // Radar = 5 attributs RPG (cf. Design Context). Chaque axe est
      // borné [0..1] comme tous les attributs.
      radar: radarFromAttributes(current),
      pastRadar,
      pastAnchorWeek: pastRadar ? pastAnchor : null,
      // Trajectoire e1RM par lift (toutes semaines avec data, triées asc).
      weeklyE1RMs: computeWeeklyE1RMs(allSets),
      bodyweight: bw,
      sessionsCompleted: current.completedSessionsCount,
      prCount: current.prCount,
    };
  }

  // Hook : compute les stats hero, refresh sur tick (post session/PR).
  const useHeroStats = (refreshKey = 0) => {
    const [stats, setStats] = useState(null);
    useEffect(() => {
      let alive = true;
      computeHeroStats().then(s => { if (alive) setStats(s); });
      return () => { alive = false; };
    }, [refreshKey]);
    return stats;
  };

  /* ==========================================================
     BADGES — DB helpers + checkBadges + lazy confetti loader
     ========================================================== */
  async function unlockedBadgeIds() {
    const rows = await db.badges.toArray();
    return new Set(rows.map(r => r.badgeId));
  }

  async function getBodyweight() {
    const row = await db.prefs.get('bodyweight');
    return row?.value || null;
  }

  // Vérifie tous les badges non encore unlock. Renvoie les nouveaux.
  // À appeler après les events qui peuvent déclencher : session_complete, set_validated.
  async function checkBadges() {
    const unlocked = await unlockedBadgeIds();
    const ctx = { bodyweight: await getBodyweight() };
    const newly = [];
    for (const badge of BADGES) {
      if (unlocked.has(badge.id)) continue;
      try {
        if (await badge.check(ctx)) {
          await db.badges.add({ badgeId: badge.id, unlockedAt: new Date().toISOString() });
          newly.push(badge);
        }
      } catch {}
    }
    return newly;
  }

  // Confetti — lazy load CDN au 1er trigger pour ne pas alourdir le boot.
  let _confettiPromise = null;
  function loadConfetti() {
    if (_confettiPromise) return _confettiPromise;
    _confettiPromise = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js';
      s.onload = () => resolve(window.confetti);
      s.onerror = () => { _confettiPromise = null; reject(new Error('confetti load failed')); };
      document.head.appendChild(s);
    });
    return _confettiPromise;
  }

  async function fireConfetti() {
    try {
      const confetti = await loadConfetti();
      confetti({
        particleCount: 70,
        spread: 75,
        origin: { y: 0.6 },

  async function pickEndPhrase() {
    const last = await db.prefs.get('lastEndPhrase');
    const lastValue = last?.value;
    const candidates = SESSION_END_PHRASES.filter(p => p !== lastValue);
    const phrase = candidates[Math.floor(Math.random() * candidates.length)];

  // Hook : streak réactif. Refresh à chaque incrément manuel via tick.

    useEffect(() => {

      getStreak().then(s => { if (alive) setStreak(s); });
      return () => { alive = false; };
    }, [refreshKey]);

  };

  const useWeekKPIs = (week, streak) => {
    const [kpis, setKpis] = useState(null);
    useEffect(() => {
      let alive = true;
      Promise.all([
        db.sets.where('week').equals(week).toArray(),
        week > 1 ? db.sets.where('week').equals(week - 1).toArray() : Promise.resolve([]),
      ]).then(([cur, prev]) => {
        if (!alive) return;
        const volCur = volumeLoad(cur);
        const volPrev = volumeLoad(prev);
        const fmtVol = volCur >= 10000 ? (volCur / 1000).toFixed(1) + 'k' : String(volCur);
        const delta = volPrev > 0
          ? ((volCur - volPrev) / volPrev * 100 >= 0 ? '+' : '') + Math.round((volCur - volPrev) / volPrev * 100) + '%'
          : null;
        const deltaRef = volPrev > 0 ? 'vs S' + (week - 1) : null;
        const sessionDays = new Set(cur.map(s => s.sessionDay));
        const strengthCount = ['Monday','Wednesday','Friday','Saturday'].filter(d => sessionDays.has(d)).length;
        const rank = streak ? getRank(streak.currentStreak) : STREAK_RANKS[0];
        const streakVal = streak ? streak.currentStreak : 0;
        const athxDays = daysUntil(ATHX_DATE);
        setKpis([
          { label: 'Volume Load', value: fmtVol, unit: 'kg', delta, ref: deltaRef, accent: 'var(--accent-laurel)' },
          { label: 'Sessions', value: strengthCount + '/4', unit: '', delta: null, ref: 'cette sem', accent: null },
          { label: 'Streak', value: String(streakVal), unit: 'j', delta: rank.name, ref: 'rang', accent: 'var(--accent-olympus)' },
          { label: 'ATHX', value: String(athxDays), unit: 'j', delta: null, ref: 'restants', accent: 'var(--accent-olympus)' },
        ]);
      });
      return () => { alive = false; };
    }, [week, streak]);
    return kpis;

  // Hook : meilleur set (par e1RM) de la semaine précédente pour un exo
  // donné. Sert au bandeau "Sem -1" sur ExoCard. Renvoie {none:true} si rien.
  const useLastWeekBest = (exerciseName, currentWeek) => {
    const [state, setState] = useState(null);
    useEffect(() => {
      if (currentWeek <= 1 || !exerciseName) { setState({ none: true }); return; }
      let alive = true;
      db.sets.where('week').equals(currentWeek - 1).toArray().then(rows => {
        if (!alive) return;
        const matches = rows.filter(s => s.exerciseName === exerciseName);
        if (!matches.length) { setState({ none: true }); return; }
        const withE1RM = matches.filter(s => s.e1RM);
        if (withE1RM.length) {
          setState(withE1RM.reduce((m, s) => (s.e1RM > m.e1RM ? s : m), withE1RM[0]));
          return;
        }
        const withJump = matches.filter(s => s.jumpHeight != null || s.jumpDistance != null);
        if (withJump.length) {
          const best = withJump.reduce((m, s) => {
            const mVal = m.jumpHeight || m.jumpDistance || 0;
            const sVal = s.jumpHeight || s.jumpDistance || 0;
            return sVal > mVal ? s : m;
          }, withJump[0]);
          setState({ ...best, jumpAttempts: withJump.length });
          return;
        }
        setState({ none: true });
      });
      return () => { alive = false; };
    }, [exerciseName, currentWeek]);
    return state;
  };

  // Hook : best e1RM historique pour un exo donné (sert d'e1RM_known).
  // Lit deux sources et renvoie le max :
  //   1. db.sets : meilleur e1RM des sets logués pour ce exerciseName
  //      (matching EXACT, pas fuzzy — "Pause Low Incline Press" ne lit
  //      pas le 1RM "Bench Press").
  //   2. db.oneRMs : 1RM le plus récent déclaré (par computedAt desc)
  //      pour ce exerciseName, saisi à l'onboarding ou dans /reglages.
  const useBestE1RMFor = (exerciseName, refreshKey) => {
    const [best, setBest] = useState(null);
    useEffect(() => {
      if (!exerciseName) return;
      let alive = true;
      Promise.all([db.sets.toArray(), db.oneRMs.toArray()]).then(([allSets, allOneRMs]) => {
        if (!alive) return;
        const setMatches = allSets.filter(s => s.exerciseName === exerciseName && s.e1RM);
        const setsBest = setMatches.length ? Math.max(...setMatches.map(s => s.e1RM)) : 0;
        const declaredRows = allOneRMs.filter(r => r.exerciseName === exerciseName);
        let declaredBest = 0;
        if (declaredRows.length) {
          const latest = declaredRows.reduce((a, b) =>
            (a.computedAt || '') > (b.computedAt || '') ? a : b);
          declaredBest = latest.e1RM || latest.weight || 0;
        }
        setBest(Math.max(setsBest, declaredBest));
      });
      return () => { alive = false; };
    }, [exerciseName, refreshKey]);
    return best;
  };

  // Hook : best e1RM des SETS LOGUÉS uniquement, pour cet exo (matching
  // EXACT par exerciseName). Sémantique stricte "PR vient d'un set
  // logué", utilisé pour la détection PR (preview + validate). Ne lit
  // PAS db.oneRMs — sinon un déclaratif gonflé bloquerait la détection
  // de PR sur les sets et propagerait l'effet dans Mètis / Áreté /
  // useAllPRs / WeekStats / glyphe doré / lyre.
  const useSetsBestE1RMFor = (exerciseName, refreshKey) => {
    const [best, setBest] = useState(null);
    useEffect(() => {
      if (!exerciseName) return;
      let alive = true;
      db.sets.toArray().then(all => {
        if (!alive) return;
        const matches = all.filter(s => s.exerciseName === exerciseName && s.e1RM);
        setBest(matches.length ? Math.max(...matches.map(s => s.e1RM)) : 0);
      });
      return () => { alive = false; };
    }, [exerciseName, refreshKey]);
    return best;
  };

  const PR_ELIGIBLE_FORMATS = new Set(['traditional', 'doubleProg', 'topBackoff', 'amrap']);

  async function detectPR(newSetRow) {
    const std = matchStandard(newSetRow.exerciseName);
    if (!std) return { isPR: false };
    if (!PR_ELIGIBLE_FORMATS.has(newSetRow.format)) return { isPR: false };
    if (!newSetRow.e1RM || newSetRow.e1RM <= 0) return { isPR: false };
    const [allSets, allOneRMs] = await Promise.all([db.sets.toArray(), db.oneRMs.toArray()]);
    const historicalBest = allSets
      .filter(s => std.pattern.test(s.exerciseName || '') && s.e1RM && s.id !== newSetRow.id)
      .reduce((m, s) => Math.max(m, s.e1RM), 0);
    const declaredBest = allOneRMs
      .filter(r => std.pattern.test(r.exerciseName || ''))
      .reduce((m, r) => Math.max(m, r.e1RM || r.weight || 0), 0);
    const previousBest = Math.max(historicalBest, declaredBest);
    const isPR = newSetRow.e1RM > previousBest;
    return { isPR, liftKey: std.id, exerciseName: std.name, previousBest, newBest: newSetRow.e1RM };
  }

        const latestByName = {};

          if (!cur || (row.computedAt || '') > (cur.computedAt || '')) {

          }
        }
        const declaredE1RMByName = {};
        for (const [name, row] of Object.entries(latestByName)) {
          declaredE1RMByName[name] = row.e1RM || row.weight || 0;
        }
        setStandards(computeStandards(allSets, bw, declaredE1RMByName));

  const useLiftStats = (liftKey, refreshKey) => {
    const [stats, setStats] = useState(null);
    useEffect(() => {
      if (!liftKey) return;
      const std = ATHX_STANDARDS.find(s => s.id === liftKey);
      if (!std) return;
      let alive = true;
      Promise.all([db.sets.toArray(), db.oneRMs.toArray()]).then(([allSets, allOneRMs]) => {
        if (!alive) return;
        const matchedSets = allSets.filter(s => std.pattern.test(s.exerciseName || '') && s.e1RM);
        const setsBestE1RM = matchedSets.length ? Math.max(...matchedSets.map(s => s.e1RM)) : 0;
        let declaredBest = 0;
        for (const row of allOneRMs) {
          if (std.pattern.test(row.exerciseName || '')) {
            const w = row.e1RM || row.weight || 0;
            if (w > declaredBest) declaredBest = w;
          }
        }
        const baseline = declaredBest || (matchedSets.length ? Math.min(...matchedSets.map(s => s.e1RM)) : 0);
        const record = Math.max(setsBestE1RM, declaredBest);
        const byWeek = {};
        for (const s of matchedSets) {
          if (!byWeek[s.week] || s.e1RM > byWeek[s.week]) byWeek[s.week] = s.e1RM;
        }
        const weeks = Object.keys(byWeek).map(Number).sort((a, b) => a - b);
        const history = weeks.slice(-5).map(w => byWeek[w]);
        setStats({ baseline, record, history });
      });
      return () => { alive = false; };
    }, [liftKey, refreshKey]);
    return stats;
  };

  const useAthxStanding = (liftKey, bodyweight, refreshKey) => {
    const stats = useLiftStats(liftKey, refreshKey);

  const RouterContext = createContext({ path: DEFAULT_ROUTE, query: {}, navigate: () => {} });

  const parseHash = () => {
    const raw = (window.location.hash || '').replace(/^#/, '');
    const [pathRaw, queryRaw = ''] = raw.split('?');
    const path = pathRaw || DEFAULT_ROUTE;
    const query = {};
    if (queryRaw) {
      queryRaw.split('&').forEach(pair => {
        if (!pair) return;
        const [k, v = ''] = pair.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v);
      });
    }
    return { path, query };
  };

  const HashRouter = ({ children }) => {
    const [state, setState] = useState(parseHash);
    useEffect(() => {
      const onHash = () => setState(parseHash());
      window.addEventListener('hashchange', onHash);
      if (!window.location.hash) {
        window.location.hash = '#' + DEFAULT_ROUTE;
      }
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const navigate = useCallback((to, opts = {}) => {
      const target = to.startsWith('#') ? to : '#' + to;
      if (opts.replace) {
        const newUrl = window.location.pathname + window.location.search + target;
        window.history.replaceState(null, '', newUrl);
        setState(parseHash());
      } else {
        window.location.hash = target;
      }
    }, []);

    return (
      <RouterContext.Provider value={{ ...state, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  };

  const Routes = ({ children }) => {
    const { path } = useContext(RouterContext);
    const routes = React.Children.toArray(children);
    const exact = routes.find(r => r.props.path === path);
    if (exact) return exact.props.element;
    const wildcard = routes.find(r => r.props.path === '*');
    return wildcard ? wildcard.props.element : null;
