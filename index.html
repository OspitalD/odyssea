<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0D0F0E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Odyssea" />
  <meta name="description" content="Odyssea — Ὀδύσσεια. 20 semaines, 4 chants, 1 destination." />
  <title>Odyssea — Ὀδύσσεια</title>

  <!-- Fonts : Plus Jakarta Sans (texte) + EB Garamond italic (grec ancien) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-512.png" />
  <!-- iOS Home Screen — doit être PNG, SVG ignoré -->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png" />

  <style>
    /* ==========================================================
       Design tokens — Odyssea (SPEC v3 §Niveau 1)
       Tokens renommés mythologiquement, mêmes hex que mobility-dashboard.
       ========================================================== */
    :root {
      /* Backgrounds */
      --bg-primary: #0D0F0E;
      --bg-surface: #111412;
      --bg-surface-hover: #141815;

      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.10);
      --border-active: #1A1E1C;

      /* Accents — mythologie */
      --accent-laurel:  #3ECFA0;  /* succès, set validé, victoire mortelle */
      --accent-olympus: #E8A020;  /* divin, PR battu, rang supérieur */
      --accent-royal:   #B990E0;  /* noble, info, achievement */
      --accent-blood:   #E05A4A;  /* sacrifice, recul, danger */

      /* Text */
      --text-primary:   #F5F5F3;
      --text-secondary: #7A7C7A;
      --text-tertiary:  #4A4D4B;

      /* Streak ranks (Mortel→Olympien) */
      --rank-mortel:    #7A7C7A;
      --rank-hoplite:   #CD8032;
      --rank-stratege:  #A8A8BE;
      --rank-heros:     #DAA520;
      --rank-demidieu:  #B8E0F8;
      --rank-olympien:  #C39BD3;

      /* Typography */
      --font-sans:  'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-greek: 'EB Garamond', 'Times New Roman', Georgia, serif;

      /* Layout */
      --bottom-nav-h: 72px;
      --max-app-width: 430px;

      /* Motion */
      --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
      --dur-fast: 0.15s;
      --dur-normal: 0.25s;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: none;
    }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input, textarea, select { font-family: inherit; color: inherit; }

    .greek { font-family: var(--font-greek); font-style: italic; }

    .app-shell {
      min-height: 100%;
      max-width: var(--max-app-width);
      margin: 0 auto;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: env(safe-area-inset-top, 0px);
      box-sizing: border-box;
    }
    .app-main {
      flex: 1 1 auto;
      padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0px));
      min-height: 0;
    }
    .app-main--no-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }

    /* Mode Hyperfocus — cache la bottom nav et le header logo */
    .app-shell.hyperfocus nav[aria-label="Navigation principale"],
    .app-shell.hyperfocus header { display: none; }
    .app-shell.hyperfocus .app-main { padding-bottom: env(safe-area-inset-bottom, 0px); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    button, [role="button"] { min-height: 44px; }
    .tap-area { min-width: 44px; min-height: 44px; }

    #boot-loader {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg-primary);
      color: var(--accent-olympus);
      font-family: var(--font-greek);
      font-style: italic;
      font-size: 48px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot-loader">Ω</div>
  </div>

  <noscript>
    <div style="padding:40px;text-align:center;color:#F5F5F3;font-family:system-ui,sans-serif;">
      Active JavaScript pour utiliser Odyssea.
    </div>
  </noscript>

  <!-- ============================================================
       VENDOR (CDN) — React 18 + Babel standalone + Dexie (IndexedDB)
       ============================================================ -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://unpkg.com/dexie@4.0.10/dist/dexie.min.js"></script>

  <!-- ============================================================
       APPLICATION
       ============================================================ -->
  <script type="text/babel" data-presets="react">
  const { useState, useEffect, useMemo, useContext, createContext, useCallback } = React;

  /* ==========================================================
     CONST API (SPEC v3 §API)
     ========================================================== */
  const API_URL = 'https://script.google.com/macros/s/AKfycbxsOdnNAEmyONDJYYkCWwQjK5bX6HunFQ3auV_pInSTzoz-GE5rEfdHr9SeZ2Gvwei7oQ/exec';
  const ATHX_DATE = '2026-09-19';

  const ROUTES = {
    AUJOURDHUI: '/aujourdhui',
    SEMAINE:    '/semaine',
    HEROS:      '/heros',
    CARTE:      '/carte',
    STATS:      '/stats',     // legacy — redirige vers /heros (gardé pour bookmarks)
    REGLAGES:   '/reglages',
  };
  const DEFAULT_ROUTE = ROUTES.AUJOURDHUI;

  /* ==========================================================
     CATALOGUE STATIQUE — Mythologie (SPEC v3 §Niveau 2 + v4 patch)
     ========================================================== */
  // Blocks renommés (v4 patch — Lotophages en B1, pattern de drop documenté)
  const BLOCKS = [
    { id: 1, name: 'Les Lotophages', weeks: [1,  6]  },
    { id: 2, name: 'Le Cyclope',     weeks: [7,  12] },
    { id: 3, name: 'Circé',          weeks: [13, 16] },
    { id: 4, name: 'Ithaque',        weeks: [17, 20] },
  ];

  // Streak ranks Mortel → Olympien
  const STREAK_RANKS = [
    { min: 0,   name: 'Mortel',    token: 'var(--rank-mortel)'   },
    { min: 7,   name: 'Hoplite',   token: 'var(--rank-hoplite)'  },
    { min: 14,  name: 'Stratège',  token: 'var(--rank-stratege)' },
    { min: 30,  name: 'Héros',     token: 'var(--rank-heros)'    },
    { min: 60,  name: 'Demi-dieu', token: 'var(--rank-demidieu)' },
    { min: 100, name: 'Olympien',  token: 'var(--rank-olympien)' },
  ];

  /* ==========================================================
     ATHX STANDARDS (SPEC §11) — targets bodyweight-based pour les
     4 lifts principaux du programme. Phase 2 ajoute pull-ups / jumps
     / row 2K / 5K running quand l'app trackera ces formats.
     ========================================================== */
  const ATHX_STANDARDS = [
    {
      id: 'squat',
      name: 'Back Squat',
      pattern: /back squat|^squat$|zercher squat/i,
      kind: 'lift',
      startBW: 1.8,
      targetBW: 2.0,
      radarAxis: 'squat',
    },
    {
      id: 'deadlift',
      name: 'Deadlift',
      pattern: /deadlift|^dl$/i,
      kind: 'lift',
      startBW: 2.2,
      targetBW: 2.5,
      radarAxis: 'deadlift',
    },
    {
      id: 'bench',
      name: 'Bench Press',
      pattern: /bench press|pin bench|low incline press/i,
      kind: 'lift',
      startBW: 1.2,
      targetBW: 1.5,
      radarAxis: 'push',
    },
    {
      id: 'ohp',
      name: 'Overhead Press',
      pattern: /^ohp|overhead press|seated press/i,
      kind: 'lift',
      startBW: 0.8,
      targetBW: 1.0,
      radarAxis: 'push',
    },
    {
      id: 'row',
      name: 'Pendlay Row',
      pattern: /pendlay row|barbell row/i,
      kind: 'lift',
      startBW: 1.0,
      targetBW: 1.5,
      radarAxis: 'pull',
    },
  ];

  const RADAR_AXES = [
    { id: 'squat',     label: 'Squat'   },
    { id: 'deadlift',  label: 'DL'      },
    { id: 'push',      label: 'Push'    },
    { id: 'pull',      label: 'Pull'    },
    { id: 'cond',      label: 'Cond'    }, // conditioning, placeholder Phase 2+
  ];

  // BADGES (SPEC §7.3) — catalogue des achievements.
  // Chaque badge a un check() async qui peut lire ctx (passé par checkBadges).
  // Trigger : appelés après TERMINER (session_complete) ou VALIDER SET (set_validated).
  // Atlas/Achille requièrent un bodyweight stocké en prefs (saisi dans /reglages).
  const BADGES = [
    {
      id: 'first_step',
      name: 'Premier Pas',
      description: '1ère session complétée',
      glyph: 'Α',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt);
      },
    },
    {
      id: 'atlas',
      name: 'Atlas',
      description: 'Squat 2× BW soulevé',
      glyph: 'Β',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /squat/i.test(s.exerciseName || '') && s.weight >= 2 * ctx.bodyweight);
      },
    },
    {
      id: 'achille',
      name: 'Achille',
      description: 'Bench 1× BW soulevé',
      glyph: 'Γ',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /bench/i.test(s.exerciseName || '') && s.weight >= ctx.bodyweight);
      },
    },
    {
      id: 'sirenes',
      name: 'Sirènes',
      description: 'Reprise après break streak',
      glyph: 'Δ',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak > 0 && s.longestStreak > s.currentStreak;
      },
    },
    {
      id: 'heracles',
      name: 'Héraclès',
      description: '12 sessions consécutives',
      glyph: 'Ε',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak >= 12;
      },
    },
    {
      id: 'arc_ulysse',
      name: "L'Arc d'Ulysse",
      description: 'Bloc 4 démarré',
      glyph: 'Ζ',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt && s.week >= 17);
      },
    },
    {
      id: 'penelope',
      name: 'Pénélope',
      description: '100 sessions cumulées',
      glyph: 'Η',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.filter(s => s.completedAt).length >= 100;
      },
    },
    {
      id: 'ithaque',
      name: 'Ithaque',
      description: 'ATHX complété',
      glyph: 'Θ',
      check: async () => {
        const today = new Date();
        return today >= new Date(ATHX_DATE + 'T00:00:00');
      },
    },
  ];

  // Pool de mantras du jour (SPEC §11 Étape 9) — pool tournant à chaque
  // ouverture, mix homérique + stoïcien (Marc Aurèle, Épictète).
  // Affichage discret en haut de /aujourdhui en EB Garamond italique.
  const MANTRAS = [
    // Homère / Odyssée
    "Endure, mon cœur ; tu as enduré pis encore.",
    "L'homme qui se gouverne lui-même est invincible.",
    "L'arc d'Ulysse, nul ne le tend que celui qui doit le tendre.",
    "Mêtis vaut mieux que force.",
    "Le mât tient. Toi aussi.",
    "Pénélope tisse. Toi aussi.",
    "Ne crains ni Charybde ni Scylla. Choisis.",
    "Les vents te portent quand tu rames.",
    // Stoïciens
    "Tu as autorité sur ton esprit, pas sur les événements.",
    "L'obstacle au chemin devient le chemin.",
    "Confine-toi au présent.",
    "Tu deviens ce à quoi tu prêtes attention.",
    "Le corps est l'instrument de l'âme.",
    "Vis selon ta nature.",
    "Souviens-toi : ce qui dépend de toi, et rien d'autre.",
    "Les difficultés révèlent l'homme.",
    "Aime ce que tu fais. Fais ce que tu aimes.",
    "Ne sois pas en colère contre la pierre qui tombe.",
    // Pindare / lyrique grecque
    "Deviens ce que tu es.",
    "Brève est la vie. Sois magnanime.",
    // Aristote
    "Nous sommes ce que nous répétons.",
    "L'excellence est une habitude, pas un acte.",
    // Héraclite
    "Le caractère est destin.",
    "On ne se baigne pas deux fois dans le même fleuve.",
  ];

  function pickMantraOfDay() {
    // Déterministe par jour : même mantra entre 2 ouvertures du jour.
    const day = new Date().toISOString().slice(0, 10);
    let h = 0;
    for (const c of day) h = (h * 31 + c.charCodeAt(0)) | 0;
    return MANTRAS[Math.abs(h) % MANTRAS.length];
  }

  // Mood tracking (SPEC §11 Étape 9) — 4 emojis post-session.
  const MOOD_OPTIONS = [
    { id: 'fire',    emoji: '🔥', label: 'Galvanisé' },
    { id: 'happy',   emoji: '🙂', label: 'Bien'      },
    { id: 'neutral', emoji: '😐', label: 'Moyen'     },
    { id: 'drained', emoji: '😩', label: 'Vidé'      },
  ];

  // Pool de phrases fin de session (v4 patch §Microcopy variable)
  const SESSION_END_PHRASES = [
    "Endure, mon cœur.",
    "Mètis intacte.",
    "Thumos plein.",
    "Kléos accroît.",
    "Cyclope aveuglé.",
    "Sirènes ignorées.",
    "Lotophages dépassés.",
    "Calypso quittée.",
    "Le mât tenu.",
    "Athéna veille.",
    "Pénélope tisse.",
    "Argos se souvient.",
    "Cap sur Ithaque.",
    "L'arc se tend.",
  ];

  /* ==========================================================
     SESSION DAY LAYOUT — 7 jours de la semaine
     Mon/Wed/Fri/Sat = strength (sessionDay côté API)
     Tue/Thu/Sun = light/off (label uniquement, pas de programme API)
     ========================================================== */
  const PROGRAMME_START = '2026-05-11'; // Lundi 11 mai 2026 = J1 Block 1 Sem 1

  const WEEK_DAYS = [
    { idx: 1, fr: 'Lundi',    en: 'Monday',    sessionDay: 'Monday',    label: 'Strength 1',           strength: true  },
    { idx: 2, fr: 'Mardi',    en: 'Tuesday',   sessionDay: null,        label: 'Aérobie + bras + abs', strength: false },
    { idx: 3, fr: 'Mercredi', en: 'Wednesday', sessionDay: 'Wednesday', label: 'Strength 2',           strength: true  },
    { idx: 4, fr: 'Jeudi',    en: 'Thursday',  sessionDay: null,        label: 'Sprints + Anaérobie',  strength: false },
    { idx: 5, fr: 'Vendredi', en: 'Friday',    sessionDay: 'Friday',    label: 'Strength 3',           strength: true  },
    { idx: 6, fr: 'Samedi',   en: 'Saturday',  sessionDay: 'Saturday',  label: 'Upper Body',           strength: true  },
    { idx: 0, fr: 'Dimanche', en: 'Sunday',    sessionDay: null,        label: 'Off / Light',          strength: false },
  ];

  /* ==========================================================
     UTILS
     ========================================================== */
  const daysUntil = (isoDate) => {
    const target = new Date(isoDate + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.max(0, Math.round((target - now) / 86400000));
  };

  // Semaine courante (1..20). Pré-démarrage = 1, post-fin = 20.
  const getCurrentWeek = () => {
    const start = new Date(PROGRAMME_START + 'T00:00:00');
    const now = new Date();
    if (now < start) return 1;
    const days = Math.floor((now - start) / 86400000);
    return Math.max(1, Math.min(20, Math.floor(days / 7) + 1));
  };

  // Jour courant en idx 0..6 (dimanche..samedi convention JS).
  const getCurrentWeekDayIdx = () => new Date().getDay();

  const getCurrentBlock = (week) => {
    return BLOCKS.find(b => week >= b.weeks[0] && week <= b.weeks[1]) || BLOCKS[0];
  };

  const getRank = (streak) => {
    let current = STREAK_RANKS[0];
    for (const rank of STREAK_RANKS) {
      if (streak >= rank.min) current = rank;
    }
    return current;
  };

  /* ==========================================================
     CALCULS (SPEC v5 §10)
     ========================================================== */
  const epley = (weight, reps) => weight * (1 + 0.0333 * reps);

  // Stress Index : (weight/e1RM_known) × reps × f_rir.
  // Si pas d'e1RM_known, on utilise l'e1RM du set lui-même (fallback)
  // — donne une valeur "interne" au set, comparable entre sets de même exo.
  const stressIndex = (weight, reps, rir, e1RMKnown) => {
    const ref = e1RMKnown || epley(weight, reps);
    const fRir = 1 + 1 / ((rir || 0) + 1);
    return (weight / ref) * reps * fRir;
  };

  const volumeLoad = (sets) => sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);

  // Best e1RM parmi un tableau de sets (ignore null/undefined).
  const bestE1RM = (sets) => sets.reduce((m, s) => (s.e1RM > m ? s.e1RM : m), 0);

  // Round à 0.5 (utile pour les steppers fractionnaires).
  const round05 = (x) => Math.round(x * 2) / 2;

  /* ==========================================================
     DATA LAYER — Dexie / IndexedDB (SPEC v5 §9)
     Schéma complet anticipé pour Phase 2 et 3 (évite migrations lourdes).
     ========================================================== */
  const db = new Dexie('Odyssea');
  db.version(1).stores({
    sets:         '++id, [week+sessionDay+exerciseSlot+setNumber], week, sessionDay, exerciseSlot, completedAt, syncedAt',
    sessions:     '++id, [week+sessionDay], week, sessionDay, completedAt, syncedAt',
    programme:    '++id, [week+sessionDay+exerciseSlot], block, week, sessionDay',
    oneRMs:       '++id, exerciseName, computedAt',
    streak:       '++id',
    badges:       '++id, badgeId, unlockedAt',
    prefs:        'key',
    rewards:      '++id, milestoneId, unlockedAt, claimedAt',
    mantrasSeen:  '++id, mantraId, seenAt',
    moods:        '++id, sessionId, loggedAt',
  });

  // Singleton de protection contre les seeds concurrents au boot.
  let seedInFlight = null;

  // Seed du `programme` table depuis l'API si vide. Idempotent : no-op
  // si déjà rempli. En cas d'erreur réseau, on ne marque rien et on
  // retentera au prochain démarrage.
  async function seedIfEmpty() {
    if (seedInFlight) return seedInFlight;
    seedInFlight = (async () => {
      const count = await db.programme.count();
      if (count > 0) return { ok: true, skipped: true, count };
      try {
        // CRITIQUE : pas de Content-Type explicite. Apps Script fait du
        // 302 → script.googleusercontent.com sur les POST. application/json
        // déclenche un preflight CORS qu'Apps Script ne gère pas → fail.
        // text/plain (default fetch) = "simple request" → pas de preflight.
        // Apps Script lit `e.postData.contents` en raw, le JSON.parse marche.
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'readWeek', week: 1 }),
        });
        const data = await res.json();
        if (!data || !data.ok || !data.sessions) {
          throw new Error(data && data.error || 'Réponse API invalide');
        }
        const block = getCurrentBlock(1).id;
        const rows = [];
        for (const sess of data.sessions) {
          for (const ex of (sess.exercises || [])) {
            rows.push({
              block,
              week: data.week,
              sessionDay: sess.day,
              exerciseSlot: ex.slot,
              exerciseName: ex.name || '',
              prescription: ex.prescription || '',
            });
          }
        }
        await db.programme.bulkAdd(rows);
        await db.prefs.put({ key: 'lastSeedAt', value: new Date().toISOString() });
        return { ok: true, count: rows.length };
      } catch (e) {
        await db.prefs.put({ key: 'lastSeedError', value: { message: String(e), at: new Date().toISOString() } });
        return { ok: false, error: String(e) };
      }
    })();
    try { return await seedInFlight; } finally { seedInFlight = null; }
  }

  // Hook : lit le programme d'une semaine groupé par jour.
  // Reactif sur `week` ; rafraîchit aussi quand un seed se termine.
  const useWeekProgramme = (week, refreshKey = 0) => {
    const [byDay, setByDay] = useState(null);
    useEffect(() => {
      let alive = true;
      db.programme.where('week').equals(week).toArray().then(rows => {
        if (!alive) return;
        rows.sort((a, b) => a.exerciseSlot - b.exerciseSlot);
        const grouped = {};
        for (const r of rows) (grouped[r.sessionDay] ||= []).push(r);
        setByDay(grouped);
      });
      return () => { alive = false; };
    }, [week, refreshKey]);
    return byDay;
  };

  // Hook : lit tous les sets d'une session (week+sessionDay), groupés par
  // exerciseSlot, triés par setNumber. Renvoie [setsBySlot, refresh].
  const useSetsForDay = (week, sessionDay) => {
    const [bySlot, setBySlot] = useState(null);
    const [tick, setTick] = useState(0);
    const refresh = useCallback(() => setTick(t => t + 1), []);
    useEffect(() => {
      if (!sessionDay) { setBySlot({}); return; }
      let alive = true;
      db.sets.where('week').equals(week).toArray().then(all => {
        if (!alive) return;
        const filtered = all.filter(s => s.sessionDay === sessionDay);
        filtered.sort((a, b) => (a.exerciseSlot - b.exerciseSlot) || (a.setNumber - b.setNumber));
        const grouped = {};
        for (const s of filtered) (grouped[s.exerciseSlot] ||= []).push(s);
        setBySlot(grouped);
      });
      return () => { alive = false; };
    }, [week, sessionDay, tick]);
    return [bySlot, refresh];
  };

  /* ==========================================================
     SYNC LAYER — POST writeSet vers Apps Script
     ========================================================== */
  async function postWriteSet(set) {
    // CORS-safe : pas de Content-Type explicite (cf. seedIfEmpty).
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'writeSet',
        week: set.week,
        sessionDay: set.sessionDay,
        exerciseSlot: set.exerciseSlot,
        setNumber: set.setNumber,
        weight: set.weight,
        reps: set.reps,
        rir: set.rir,
      }),
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || 'writeSet failed');
    return data;
  }

  // Sync de tous les sets non-syncés. Retourne {success, fail}.
  // Appelé au boot (si online) et à chaque tap TERMINER.
  async function syncPendingSets() {
    if (!navigator.onLine) return { success: 0, fail: 0, skipped: 'offline' };
    const all = await db.sets.toArray();
    const unsynced = all.filter(s => !s.syncedAt);
    let success = 0, fail = 0;
    for (const set of unsynced) {
      try {
        await postWriteSet(set);
        await db.sets.update(set.id, { syncedAt: new Date().toISOString() });
        success++;
      } catch (e) {
        fail++;
      }
    }
    return { success, fail, total: unsynced.length };
  }

  /* ==========================================================
     STREAK SYSTEM (SPEC v5 §7.2)
     - Tolérance 4 jours : ≤ 4 j sans session = streak continue
     - > 4 j sans session = streak break, repart à 1
     - 1 incrément par jour max (multiples sessions/jour ne cumulent pas)
     ========================================================== */
  const STREAK_BREAK_THRESHOLD = 4; // jours
  const STREAK_WARN_THRESHOLD = 3;  // alerte Lotophages à J3

  async function getStreak() {
    let row = await db.streak.get(1);
    if (!row) {
      row = {
        id: 1,
        currentStreak: 0,
        longestStreak: 0,
        lastSessionDate: null,
        currentRank: STREAK_RANKS[0].name,
        pardonsAvailable: 0,
        pardonsUsed: 0,
      };
      await db.streak.put(row);
    }
    return row;
  }

  // Bump streak après une session validée. Retourne le nouveau streak.
  async function bumpStreak() {
    const todayIso = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    const row = await getStreak();
    if (row.lastSessionDate === todayIso) return row; // déjà bumpé aujourd'hui
    let next = 1;
    if (row.lastSessionDate) {
      const last = new Date(row.lastSessionDate);
      const today = new Date(todayIso);
      const days = Math.round((today - last) / 86400000);
      next = days > STREAK_BREAK_THRESHOLD ? 1 : (row.currentStreak + 1);
    }
    const updated = {
      ...row,
      currentStreak: next,
      longestStreak: Math.max(row.longestStreak, next),
      lastSessionDate: todayIso,
      currentRank: getRank(next).name,
    };
    await db.streak.put(updated);
    return updated;
  }

  /* ==========================================================
     Pardon hebdo (SPEC §11 Étape 8) — 1 pardon octroyé par mois.
     Permet de "sauter" une session manquée sans casser le streak.
     Stocké dans streak.pardonsAvailable / pardonsUsed + lastPardonMonth.
     ========================================================== */
  async function ensureMonthlyPardon() {
    const row = await getStreak();
    const monthKey = new Date().toISOString().slice(0, 7); // YYYY-MM
    if (row.lastPardonMonth === monthKey) return row;
    const updated = {
      ...row,
      pardonsAvailable: (row.pardonsAvailable || 0) + 1,
      lastPardonMonth: monthKey,
    };
    await db.streak.put(updated);
    return updated;
  }

  // Utilise un pardon : avance lastSessionDate à aujourd'hui sans bumper le
  // count. Le streak ne casse pas, mais ne progresse pas non plus.
  async function usePardon() {
    const row = await getStreak();
    if (!row.pardonsAvailable || row.pardonsAvailable < 1) return null;
    const todayIso = new Date().toISOString().slice(0, 10);
    const updated = {
      ...row,
      pardonsAvailable: row.pardonsAvailable - 1,
      pardonsUsed: (row.pardonsUsed || 0) + 1,
      lastSessionDate: todayIso, // sauve le streak du break
    };
    await db.streak.put(updated);
    return updated;
  }

  // À J3 sans session strength : warning "Ne sois pas Ulysse aux Lotophages"
  function daysSinceLastSession(streak) {
    if (!streak?.lastSessionDate) return null;
    const last = new Date(streak.lastSessionDate);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((today - last) / 86400000);
  }

  /* ==========================================================
     HERO STATS (SPEC §11 Avatar du Héros)
     ========================================================== */
  const clamp01 = (x) => Math.max(0, Math.min(1, x));

  // Match un set à un standard ATHX par regex sur exerciseName.
  const matchStandard = (exerciseName) =>
    ATHX_STANDARDS.find(s => s.pattern.test(exerciseName || ''));

  // Calcule pour chaque standard : best e1RM, ratio current/target.
  // Retourne array [{id, name, bestE1RM, ratioBW, progress, ...}]
  // - ratioBW : best e1RM / BW (null si pas de BW)
  // - progress : (ratioBW - startBW) / (targetBW - startBW), clampé 0..1
  function computeStandards(allSets, bodyweight) {
    return ATHX_STANDARDS.map(std => {
      const matches = allSets.filter(s => std.pattern.test(s.exerciseName || '') && s.e1RM);
      const bestE1RM = matches.length ? Math.max(...matches.map(s => s.e1RM)) : 0;
      const ratioBW = bodyweight > 0 ? bestE1RM / bodyweight : null;
      const progress = ratioBW != null
        ? clamp01((ratioBW - std.startBW) / (std.targetBW - std.startBW))
        : 0;
      return { ...std, bestE1RM, ratioBW, progress };
    });
  }

  // Agrège les standards par axe radar (push = avg de bench+ohp).
  function aggregateRadar(standards) {
    const byAxis = {};
    for (const std of standards) {
      const ax = std.radarAxis;
      (byAxis[ax] ||= []).push(std.progress);
    }
    return RADAR_AXES.map(ax => ({
      id: ax.id,
      label: ax.label,
      value: byAxis[ax.id] && byAxis[ax.id].length
        ? byAxis[ax.id].reduce((a, b) => a + b, 0) / byAxis[ax.id].length
        : 0,
    }));
  }

  // Compute les 5 attributs RPG depuis l'historique complet.
  // - Sthénos : moyenne des progress des 4 lifts principaux (Squat/DL/Bench/OHP)
  // - Bia     : DL progress (puissance brute) — TODO jumps en Phase 2+
  // - Pónos   : volume cumulé 4 sem glissantes, normalisé sur baseline
  // - Mètis   : ratio (sets PR) / (sessions completed)
  // - Areté   : moyenne des 4 ci-dessus
  async function computeHeroStats() {
    const [allSets, sessions, bwPref, currentWeek] = await Promise.all([
      db.sets.toArray(),
      db.sessions.toArray(),
      db.prefs.get('bodyweight'),
      Promise.resolve(getCurrentWeek()),
    ]);
    const bw = bwPref?.value || 0;
    const standards = computeStandards(allSets, bw);

    const sthenos = (() => {
      const main = standards.filter(s => ['squat', 'deadlift', 'bench', 'ohp'].includes(s.id));
      if (!main.length) return 0;
      return main.reduce((a, s) => a + s.progress, 0) / main.length;
    })();

    const bia = standards.find(s => s.id === 'deadlift')?.progress || 0;

    const ponos = (() => {
      const since = currentWeek - 3;
      const recent = allSets.filter(s => s.week >= since && s.completedAt);
      const vl = recent.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
      // Baseline arbitraire pour normaliser : 80 000 kg sur 4 sem = "haut"
      return clamp01(vl / 80000);
    })();

    const completedSessions = sessions.filter(s => s.completedAt);
    const prCount = allSets.filter(s => s.isPR).length;
    const metis = completedSessions.length > 0
      ? clamp01(prCount / completedSessions.length)
      : 0;

    const arete = (sthenos + bia + ponos + metis) / 4;

    return {
      sthenos, bia, ponos, metis, arete,
      standards,
      radar: aggregateRadar(standards),
      bodyweight: bw,
      sessionsCompleted: completedSessions.length,
      prCount,
    };
  }

  // Hook : compute les stats hero, refresh sur tick (post session/PR).
  const useHeroStats = (refreshKey = 0) => {
    const [stats, setStats] = useState(null);
    useEffect(() => {
      let alive = true;
      computeHeroStats().then(s => { if (alive) setStats(s); });
      return () => { alive = false; };
    }, [refreshKey]);
    return stats;
  };

  /* ==========================================================
     BADGES — DB helpers + checkBadges + lazy confetti loader
     ========================================================== */
  async function unlockedBadgeIds() {
    const rows = await db.badges.toArray();
    return new Set(rows.map(r => r.badgeId));
  }

  async function getBodyweight() {
    const row = await db.prefs.get('bodyweight');

  // Vérifie tous les badges non encore unlock. Renvoie les nouveaux.
  // À appeler après les events qui peuvent déclencher : session_complete, set_validated.
  async function checkBadges() {
    const unlocked = await unlockedBadgeIds();
    const ctx = { bodyweight: await getBodyweight() };
    const newly = [];
    for (const badge of BADGES) {
      if (unlocked.has(badge.id)) continue;
      try {
        if (await badge.check(ctx)) {
          await db.badges.add({ badgeId: badge.id, unlockedAt: new Date().toISOString() });
          newly.push(badge);
        }
      } catch {}
    }
    return newly;
  }

  // Confetti — lazy load CDN au 1er trigger pour ne pas alourdir le boot.
  let _confettiPromise = null;
  function loadConfetti() {
    if (_confettiPromise) return _confettiPromise;
    _confettiPromise = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js';
      s.onload = () => resolve(window.confetti);
      s.onerror = () => { _confettiPromise = null; reject(new Error('confetti load failed')); };
      document.head.appendChild(s);
    });
    return _confettiPromise;
  }

        spread: 75,
        origin: { y: 0.6 },

  async function pickEndPhrase() {
    const last = await db.prefs.get('lastEndPhrase');
    const lastValue = last?.value;
    const candidates = SESSION_END_PHRASES.filter(p => p !== lastValue);
    const phrase = candidates[Math.floor(Math.random() * candidates.length)];

  // Hook : meilleur set (par e1RM) de la semaine précédente pour un exo
  // donné. Sert au bandeau "Sem -1" sur ExoCard. Renvoie {none:true} si rien.
  const useLastWeekBest = (exerciseName, currentWeek) => {
    const [state, setState] = useState(null);
    useEffect(() => {
      if (currentWeek <= 1 || !exerciseName) { setState({ none: true }); return; }
      let alive = true;
      db.sets.where('week').equals(currentWeek - 1).toArray().then(rows => {
        if (!alive) return;
        const matches = rows.filter(s => s.exerciseName === exerciseName && s.e1RM);
        if (!matches.length) { setState({ none: true }); return; }
        setState(matches.reduce((m, s) => (s.e1RM > m.e1RM ? s : m), matches[0]));
      });
      return () => { alive = false; };
    }, [exerciseName, currentWeek]);
    return state;
  };

  const RouterContext = createContext({ path: DEFAULT_ROUTE, query: {}, navigate: () => {} });

  // les caches des hooks DB (useWeekProgramme & co).
  const SeedContext = createContext(0);

  const parseHash = () => {
    const raw = (window.location.hash || '').replace(/^#/, '');
    const [pathRaw, queryRaw = ''] = raw.split('?');
    const path = pathRaw || DEFAULT_ROUTE;
    const query = {};
    if (queryRaw) {
      queryRaw.split('&').forEach(pair => {
        if (!pair) return;
        const [k, v = ''] = pair.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v);
      });
    }
    return { path, query };
  };

  const HashRouter = ({ children }) => {
    const [state, setState] = useState(parseHash);
    useEffect(() => {
      const onHash = () => setState(parseHash());
      window.addEventListener('hashchange', onHash);
      if (!window.location.hash) {
        window.location.hash = '#' + DEFAULT_ROUTE;
      }
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const navigate = useCallback((to, opts = {}) => {
      const target = to.startsWith('#') ? to : '#' + to;
      if (opts.replace) {
        const newUrl = window.location.pathname + window.location.search + target;
        window.history.replaceState(null, '', newUrl);
        setState(parseHash());
      } else {
        window.location.hash = target;
      }
    }, []);

    return (
      <RouterContext.Provider value={{ ...state, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  };

    const { path } = useContext(RouterContext);
    const routes = React.Children.toArray(children);
    const exact = routes.find(r => r.props.path === path);

    const wildcard = routes.find(r => r.props.path === '*');
    return wildcard ? wildcard.props.element : null;

  /* ==========================================================

  const Card = ({ children, style }) => (

  // Stepper générique : boutons d'incrément/décrément autour d'une valeur
  // centrale. `steps` = liste de delta (ex: [-5, -2.5, +2.5, +5]).
  // Utilisé pour Weight et Reps (avec steps différents).
  const Stepper = ({ value, onChange, steps, unit = '', min = 0, max = 9999, fontSize = 30 }) => {
    const apply = (delta) => {
      const next = Math.max(min, Math.min(max, round05((value || 0) + delta)));
      onChange(next);
    };
    const halfPoint = Math.floor(steps.length / 2);
    const minus = steps.slice(0, halfPoint);
    const plus = steps.slice(halfPoint);
    const StepBtn = ({ delta }) => {
      const label = (delta > 0 ? '+' : '') + delta;
      return (
        <button
          type="button"
          onClick={() => apply(delta)}
          style={{
            flex: 1,
            background: 'var(--bg-primary)',
            border: '1px solid var(--border-strong)',
            borderRadius: 10,
            color: 'var(--text-primary)',
            fontSize: 13,
            fontWeight: 700,
            padding: '10px 0',
            cursor: 'pointer',
            minWidth: 44,
          }}
        >{label}</button>
      );
    };
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        {minus.map(d => <StepBtn key={d} delta={d} />)}
        <div style={{
          flex: '0 0 auto',
          minWidth: 80,
          textAlign: 'center',
          fontSize,
          fontWeight: 800,
          letterSpacing: '-0.5px',
          color: 'var(--text-primary)',
          padding: '0 6px',

  /* ==========================================================

  const ONBOARD_KEY = 'odyssea_onboarded';
  const ONBOARD_LIFTS = [
    { id: 'squat',    name: 'Back Squat',     step: 5 },
    { id: 'deadlift', name: 'Deadlift',       step: 5 },
    { id: 'bench',    name: 'Bench Press',    step: 2.5 },
    { id: 'ohp',      name: 'OHP',            step: 2.5 },
    { id: 'row',      name: 'Pendlay Row',    step: 2.5 },

  const Onboarding = ({ onComplete }) => {
    const [screen, setScreen] = useState(1);

    const [oneRMs, setOneRMs] = useState({}); // { lifId: weight }

                weight: w, reps: 1,
                e1RM: w,
                computedAt: new Date().toISOString(),

                background: 'transparent',
                border: '1px solid var(--border-strong)',
                borderRadius: 12,
                color: 'var(--text-secondary)',
                padding: '14px 18px',
                fontSize: 12,
                fontWeight: 700,
                letterSpacing: '1px',
                textTransform: 'uppercase',
                cursor: 'pointer',
              }}>{skipLabel}</button>
          )}
          <button type="button" onClick={onCta} disabled={ctaDisabled}
            style={{
              flex: 1,
              background: ctaDisabled ? 'var(--bg-surface-hover)' : 'var(--accent-olympus)',
              color: ctaDisabled ? 'var(--text-tertiary)' : '#0D0F0E',
              border: 'none',
              borderRadius: 12,
              padding: '14px 18px',
              fontSize: 13,
              fontWeight: 800,
              letterSpacing: '1.5px',
              textTransform: 'uppercase',
              cursor: ctaDisabled ? 'not-allowed' : 'pointer',
            }}>{ctaLabel}</button>
        </div>
      </div>
    );

    if (screen === 1) {
      return (
        <Screen
          ctaLabel="Suivant"
          ctaDisabled={!name.trim()}
          onCta={() => setScreen(2)}
        >
          <div className="greek" style={{ fontSize: 80, color: 'var(--accent-olympus)', textAlign: 'center', fontStyle: 'italic', lineHeight: 1, marginBottom: 24 }}>Ω</div>
          <div className="greek" style={{ fontSize: 24, fontStyle: 'italic', textAlign: 'center', color: 'var(--text-primary)', marginBottom: 32 }}>
            Saisis ton nom, voyageur.
          </div>
          <input
            type="text"
            value={name}
            onChange={e => setName(e.target.value)}
            placeholder="Ulysse"
            autoFocus
            style={{
              width: '100%',
              background: 'var(--bg-surface)',
              border: '1px solid var(--border-strong)',
              borderRadius: 12,
              color: 'var(--text-primary)',
              padding: '14px 16px',
              fontSize: 18,
              fontWeight: 700,
              outline: 'none',
              textAlign: 'center',
            }}
          />
        </Screen>
      );
    }

    if (screen === 2) {
      return (
        <Screen
          ctaLabel="Suivant"
          onCta={() => setScreen(3)}
          skipLabel="Skip"
          onSkip={() => setScreen(3)}
        >
          <div className="greek" style={{ fontSize: 22, fontStyle: 'italic', textAlign: 'center', color: 'var(--text-primary)', marginBottom: 6 }}>
            Quels sont tes 1RM actuels ?
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-secondary)', textAlign: 'center', marginBottom: 24 }}>
            Optionnel — saisis ce que tu connais, skip le reste.
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {ONBOARD_LIFTS.map(lift => {
              const v = oneRMs[lift.id] || 0;
              return (
                <div key={lift.id}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{lift.name}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: v > 0 ? 'var(--accent-laurel)' : 'var(--text-tertiary)' }}>
                      {v > 0 ? `${v} kg` : '—'}
                    </span>
                  </div>
                  <Stepper
                    value={v}
                    onChange={(nv) => setOneRMs(s => ({ ...s, [lift.id]: nv }))}
                    steps={lift.step === 5 ? [-10, -5, +5, +10] : [-5, -2.5, +2.5, +5]}
                    unit="kg"
                    fontSize={20}
                    max={500}
                  />

          </div>
        </Screen>

    }

    return (
      <Screen ctaLabel="Commence le voyage" onCta={finish}>
        <div className="greek" style={{ fontSize: 100, color: 'var(--accent-olympus)', textAlign: 'center', fontStyle: 'italic', lineHeight: 1, marginBottom: 24 }}>Ω</div>
        <div className="greek" style={{ fontSize: 28, fontStyle: 'italic', textAlign: 'center', color: 'var(--text-primary)', lineHeight: 1.4, marginBottom: 16 }}>
          Athéna te bénit{name ? `, ${name}` : ''}.
        </div>
        <div className="greek" style={{ fontSize: 18, fontStyle: 'italic', textAlign: 'center', color: 'var(--text-secondary)', lineHeight: 1.5 }}>
          Le voyage commence.

  // Compatibilité : ancien <Splash> renvoie maintenant directement <Onboarding>.
  const Splash = ({ onDismiss }) => <Onboarding onComplete={onDismiss} />;

  // Legacy fallback (n'est plus utilisé après cet étape).
  const _LegacySplash = ({ onDismiss }) => (
    <div
      role="button"
      tabIndex={0}
      onClick={onDismiss}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') onDismiss(); }}
      style={{
        position: 'fixed', inset: 0,
        zIndex: 200,
        background: 'var(--bg-primary)',
        display: 'flex',
        flexDirection: 'column',

      }}
    >
      <div className="greek" style={{
        fontSize: 120,
        color: 'var(--accent-olympus)',
        fontStyle: 'italic',
        lineHeight: 1,
        letterSpacing: '-3px',
      }}>Ω</div>
      <div className="greek" style={{
        fontSize: 28,
        color: 'var(--text-primary)',
        fontStyle: 'italic',
        textAlign: 'center',
        padding: '0 32px',
      }}>Le voyage commence.</div>
      <div style={{
        marginTop: 12,
        fontSize: 11,
        color: 'var(--text-tertiary)',
        textTransform: 'uppercase',
        letterSpacing: '2px',
        fontWeight: 700,
      }}>
        tap pour entrer
      </div>
    </div>
  );

  /* ==========================================================
     RadarChart — pentagon SVG 5 axes
     `axes` = [{id, label, value 0..1}, ...]
     ========================================================== */
  const RadarChart = ({ axes, size = 240, color = 'var(--accent-laurel)' }) => {
    const cx = size / 2, cy = size / 2;
    const r = (size / 2) - 28;
    const N = axes.length;
    const point = (i, value) => {
      const angle = (i * 2 * Math.PI) / N - Math.PI / 2;
      return [cx + r * value * Math.cos(angle), cy + r * value * Math.sin(angle)];
    };
    const labelPoint = (i) => {
      const angle = (i * 2 * Math.PI) / N - Math.PI / 2;
      const lr = r + 16;
      return [cx + lr * Math.cos(angle), cy + lr * Math.sin(angle)];
    };
    const grid = [0.25, 0.5, 0.75, 1];
    const polyAt = (value) => axes.map((_, i) => point(i, value).join(',')).join(' ');
    const valuePoly = axes.map((a, i) => point(i, a.value).join(',')).join(' ');

    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="Radar des performances">
        {/* Grille concentrique */}
        {grid.map((g, idx) => (
          <polygon key={idx} points={polyAt(g)}
                   fill="none"
                   stroke="var(--border-subtle)"
                   strokeWidth={idx === grid.length - 1 ? 1 : 0.6} />
        ))}
        {/* Axes */}
        {axes.map((_, i) => {
          const [x, y] = point(i, 1);
          return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border-subtle)" strokeWidth={0.6} />;
        })}
        {/* Polygone valeurs */}
        <polygon points={valuePoly}
                 fill={color} fillOpacity="0.15"
                 stroke={color} strokeWidth="1.5" />
        {/* Points sur les axes */}
        {axes.map((a, i) => {
          const [x, y] = point(i, a.value);
          return <circle key={`p${i}`} cx={x} cy={y} r={3} fill={color} />;
        })}
        {/* Labels */}
        {axes.map((a, i) => {
          const [x, y] = labelPoint(i);
          return (
            <text key={`l${i}`} x={x} y={y}
                  textAnchor="middle"
                  dominantBaseline="middle"
                  fontSize="11"
                  fontWeight="700"
                  fill="var(--text-secondary)"
                  style={{ letterSpacing: '0.5px', textTransform: 'uppercase' }}>
              {a.label}
            </text>
          );
        })}
      </svg>
    );
  };

  /* ==========================================================
     HeroAvatar — bloc identitaire : Ω + rang + streak.
     ========================================================== */
  const HeroAvatar = ({ streak }) => {
    const rank = streak ? getRank(streak.currentStreak) : STREAK_RANKS[0];
    const count = streak?.currentStreak ?? 0;
    return (
      <div style={{
        background: 'var(--bg-surface)',
        border: '1px solid var(--border-subtle)',
        borderRadius: 16,
        padding: '24px 16px',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',

          fontSize: 96,

          </div>
        </div>
      </div>

  /* ==========================================================
     StatChip — 1 attribut RPG (Sthénos / Bia / ...) avec valeur 0..1
     ========================================================== */
  const StatChip = ({ label, value, sub }) => {
    const pct = Math.round(value * 100);
    return (
      <div style={{
        background: 'var(--bg-surface)',
        border: '1px solid var(--border-subtle)',
        borderRadius: 12,

        display: 'flex',
        flexDirection: 'column',
        gap: 6,
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{
            fontSize: 11,
            color: 'var(--text-tertiary)',

            fontWeight: 700,
          }}>{label}</div>
          <div style={{
            fontSize: 16,
            fontWeight: 800,
            color: 'var(--text-primary)',
          }}>{pct}</div>
        </div>
        {/* barre de progression discrète */}

          height: 4,
          background: 'var(--bg-primary)',
          borderRadius: 2,
          overflow: 'hidden',
        }}>
          <div style={{

            height: '100%',

            transition: 'width var(--dur-normal) var(--ease-out)',
          }} />
        </div>
        {sub && <div style={{ fontSize: 10, color: 'var(--text-tertiary)' }}>{sub}</div>}
      </div>
    );
  };

  /* ==========================================================
     StandardBar — barre de progression couleur graduée
     blood (0%) → olympus (50%) → laurel (100%)
     ========================================================== */
  const StandardBar = ({ standard, bodyweight }) => {
    const pct = Math.round(standard.progress * 100);
    const color = standard.progress >= 1 ? 'var(--accent-laurel)'
                : standard.progress >= 0.5 ? 'var(--accent-olympus)'
                : 'var(--accent-blood)';
    return (
      <div style={{
        background: 'var(--bg-surface)',
        border: '1px solid var(--border-subtle)',
        borderRadius: 12,
        padding: '12px 14px',
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--text-primary)' }}>{standard.name}</div>
          <div style={{ fontSize: 13, fontWeight: 800, color }}>{pct}%</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8, fontSize: 11, color: 'var(--text-tertiary)' }}>
          {bodyweight > 0 && standard.bestE1RM > 0 ? (
            <>
              <span style={{ color: 'var(--text-secondary)', fontWeight: 700 }}>{standard.ratioBW.toFixed(2)}× BW</span>
              <span>·</span>
              <span>{standard.startBW}× → {standard.targetBW}× BW</span>
            </>
          ) : (
            <span>{standard.startBW}× → {standard.targetBW}× BW · {bodyweight > 0 ? 'pas de set tracké' : 'BW non défini'}</span>
          )}
        </div>
        <div style={{
          height: 6,
          background: 'var(--bg-primary)',
          borderRadius: 3,
          overflow: 'hidden',
        }}>
          <div style={{
            width: `${pct}%`,
            height: '100%',
            background: color,
            transition: 'width var(--dur-normal) var(--ease-out), background var(--dur-normal) var(--ease-out)',
          }} />
        </div>
      </div>
    );
  };

  /* ==========================================================
     BadgeIcon + BadgeToast + BadgeCard
     ========================================================== */
  // Cercle avec lettre grecque, état locked/unlocked.
  const BadgeIcon = ({ badge, unlocked, size = 48 }) => (
    <div style={{
      width: size, height: size,
      borderRadius: '50%',
      background: unlocked ? 'rgba(232,160,32,0.12)' : 'var(--bg-primary)',
      border: `1.5px solid ${unlocked ? 'var(--accent-olympus)' : 'var(--border-strong)'}`,
      display: 'grid',
      placeItems: 'center',
      fontFamily: 'var(--font-greek)',
      fontStyle: 'italic',
      fontSize: size * 0.5,
      fontWeight: 400,
      color: unlocked ? 'var(--accent-olympus)' : 'var(--text-tertiary)',
      flex: '0 0 auto',
    }}>{unlocked ? badge.glyph : '?'}</div>
  );

  // Toast en bas de l'écran : "Badge débloqué : {name}". Fade-out après ~3.5s.
  const BadgeToast = ({ badge, onDone }) => {
    useEffect(() => {
      const t = setTimeout(onDone, 3500);
      return () => clearTimeout(t);
    }, [badge.id]);
    return (
      <div style={{
        position: 'fixed',
        left: '50%',
        bottom: 'calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0px) + 16px)',
        transform: 'translateX(-50%)',
        zIndex: 180,
        display: 'flex',
        alignItems: 'center',
        gap: 12,
        padding: '12px 18px 12px 12px',
        background: 'var(--bg-surface)',
        border: '1px solid var(--accent-olympus)',
        borderRadius: 14,
        boxShadow: '0 6px 24px rgba(0,0,0,0.35)',
        animation: 'fade-in-up 400ms var(--ease-out)',
        maxWidth: 'calc(var(--max-app-width) - 32px)',
      }}>
        <BadgeIcon badge={badge} unlocked={true} size={40} />
        <div>
          <div style={{ fontSize: 10, color: 'var(--accent-olympus)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
            Badge débloqué
          </div>
          <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--text-primary)', marginTop: 2 }}>

  /* ==========================================================

  const SessionEndOverlay = ({ phrase, sessionId, onComplete }) => {

  /* ==========================================================
     Web Audio helpers — sons synthétiques discrets (lyre/cloche/beep).
     Pas de fichier audio, tout généré au tap.
     ========================================================== */
  let _audioCtx = null;
  function audio() {
    if (!_audioCtx) {
      try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
    }
    return _audioCtx;
  }
  function tone(freq, durMs, type = 'sine', vol = 0.08) {
    const ctx = audio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = type;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + durMs / 1000);
    osc.start(t);
    osc.stop(t + durMs / 1000);
  }
  // Lyre — pluck triangle 440Hz, durée 200ms
  function soundLyre()  { tone(440, 200, 'triangle', 0.06); }
  // Cloche bronze — sine 660Hz, durée 500ms
  function soundBell()  { tone(660, 500, 'sine', 0.05); }
  // Beep timer — tick rapide 880Hz, durée 80ms
  function soundTick()  { tone(880, 80,  'sine', 0.04); }

  // Toggle son global stocké en prefs.soundsEnabled (default true).
  let _soundsEnabledCache = true;
  async function loadSoundsPref() {
    const row = await db.prefs.get('soundsEnabled');
    _soundsEnabledCache = row?.value !== false;
    return _soundsEnabledCache;
  }
  function isSoundsEnabled() { return _soundsEnabledCache; }
  async function setSoundsEnabled(v) {
    _soundsEnabledCache = !!v;
    await db.prefs.put({ key: 'soundsEnabled', value: !!v });
  }
  function play(soundFn) { if (isSoundsEnabled()) soundFn(); }

  /* ==========================================================
     Timer intégré (SPEC §11) — count-down circulaire pour density
     sets (14 min Squat/Bench, 10-12 min jumps).
     Sons discrets aux milestones (5, 10, 13 min).
     ========================================================== */
  // Détection density-set / jump via prescription regex
  function defaultTimerMinutes(prescription = '') {
    if (/density set/i.test(prescription)) return 14;
    if (/jump for (\d+)/i.test(prescription)) {
      const m = prescription.match(/jump for (\d+)/i);
      return m ? parseInt(m[1], 10) : 10;
    }
    return null;
  }

  const Timer = ({ durationMin, onClose }) => {
    const totalSec = durationMin * 60;
    const [elapsed, setElapsed] = useState(0);
    const [running, setRunning] = useState(true);
    const milestones = useMemo(() => [5 * 60, 10 * 60, 13 * 60].filter(s => s < totalSec), [totalSec]);
    const lastTickRef = React.useRef(-1);

    useEffect(() => {
      if (!running) return;
      const start = Date.now() - elapsed * 1000;
      const id = setInterval(() => {
        const e = Math.min(totalSec, Math.floor((Date.now() - start) / 1000));
        setElapsed(e);
        // Sons milestone
        for (const ms of milestones) {
          if (e >= ms && lastTickRef.current < ms) {
            lastTickRef.current = ms;
            play(soundTick);
            try { navigator.vibrate && navigator.vibrate(40); } catch {}
          }
        }
        if (e >= totalSec) {
          clearInterval(id);
          setRunning(false);
          play(soundBell);
          try { navigator.vibrate && navigator.vibrate([60, 40, 80]); } catch {}
        }
      }, 250);
      return () => clearInterval(id);
    }, [running, totalSec, milestones]);

    const remaining = totalSec - elapsed;
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    const progress = elapsed / totalSec;
    const size = 200;
    const r = (size - 16) / 2;
    const C = 2 * Math.PI * r;
    const dashOffset = C * (1 - progress);

    return (
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: 14,
        padding: 16,
        background: 'var(--bg-primary)',
        border: '1px solid var(--accent-olympus)',
        borderRadius: 14,
        marginBottom: 12,
      }}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-subtle)" strokeWidth="6" />
          <circle cx={size/2} cy={size/2} r={r} fill="none"
                  stroke="var(--accent-olympus)" strokeWidth="6" strokeLinecap="round"
                  strokeDasharray={C} strokeDashoffset={dashOffset}
                  transform={`rotate(-90 ${size/2} ${size/2})`} />
          <text x={size/2} y={size/2 - 4} textAnchor="middle" fill="var(--text-primary)" fontSize="26" fontWeight="800">
            {String(min).padStart(2, '0')}:{String(sec).padStart(2, '0')}
          </text>
          <text x={size/2} y={size/2 + 28} textAnchor="middle" fill="var(--text-secondary)" fontSize="11" fontWeight="700" letterSpacing="2">
            {running ? 'EN COURS' : (remaining === 0 ? 'TERMINÉ' : 'PAUSE')}
          </text>
        </svg>
        <div style={{ display: 'flex', gap: 10 }}>
          <button type="button" onClick={() => setRunning(r => !r)}
            style={{
              background: 'transparent',
              border: '1px solid var(--border-strong)',
              borderRadius: 10,
              color: 'var(--text-primary)',
              padding: '10px 18px',
              fontSize: 12,
              fontWeight: 700,
              textTransform: 'uppercase',
              letterSpacing: '1px',
              cursor: 'pointer',
            }}>{running ? 'Pause' : 'Reprendre'}</button>
          <button type="button" onClick={onClose}
            style={{
              background: 'transparent',
              border: '1px solid var(--border-strong)',
              borderRadius: 10,
              color: 'var(--text-secondary)',
              padding: '10px 18px',
              fontSize: 12,
              fontWeight: 700,
              textTransform: 'uppercase',
              letterSpacing: '1px',
              cursor: 'pointer',
            }}>Fermer</button>
        </div>
      </div>
    );
  };

  // RIR toggle : 6 cercles 0..5. Le sélectionné est rempli en --accent-laurel.
  // Convention : 0 = à l'échec, 5 = très facile.
  const RirToggle = ({ value, onChange }) => (
    <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
      {[0, 1, 2, 3, 4, 5].map(n => {
        const selected = value === n;
        return (

            onClick={() => onChange(n)}
            aria-label={`RIR ${n}`}
            aria-pressed={selected}
            style={{
              flex: 1,
              minWidth: 44, minHeight: 44,
              aspectRatio: '1 / 1',
              borderRadius: '50%',
              background: selected ? 'var(--accent-laurel)' : 'transparent',
              border: `1.5px solid ${selected ? 'var(--accent-laurel)' : 'var(--border-strong)'}`,
              color: selected ? '#0D0F0E' : 'var(--text-secondary)',
              fontSize: 14,
              fontWeight: 800,
              cursor: 'pointer',

  /* ==========================================================
     PAGES — mocks Mardi.
     - /aujourdhui → Mer/Jeu : steppers, saisie set, calculs live
     - /semaine    → Mer : 7 cards jour, statuts
     - /stats      → Jeu/Ven : e1RM par exo + delta + (badges N3)

  // ExoCard : 1 carte par exo, accordéon, saisie set complète.
  const ExoCard = ({ ex, week, sessionDay, sets, isOpen, onToggle, onSetValidated, onBadgesUnlocked }) => {
    const lastSet = sets && sets.length ? sets[sets.length - 1] : null;
    // Pré-remplit weight/reps avec les valeurs du dernier set, ou défauts.
    const [weight, setWeight] = useState(() => lastSet?.weight ?? 0);
    const [reps, setReps] = useState(() => lastSet?.reps ?? 5);
    const [rir, setRir] = useState(() => lastSet?.rir ?? 2);

    // À l'ouverture après une validation, refléter le dernier set saisi.
    useEffect(() => {
      if (lastSet) {
        setWeight(lastSet.weight);
        setReps(lastSet.reps);
        setRir(lastSet.rir);

    // Bring active set entry into thumb reach when card expands.
    // Mains chalkées + iPhone sur banc 50cm = pas le temps de scroller.
    const setEntryRef = React.useRef(null);
    useEffect(() => {
      if (!isOpen) return;
      const id = requestAnimationFrame(() => {
        setEntryRef.current?.scrollIntoView({ behavior: 'auto', block: 'center' });

    const historicalBest = useBestE1RMFor(ex.exerciseName, sets?.length || 0);
    const lastWeekBest = useLastWeekBest(ex.exerciseName, week);
    const timerMinutes = defaultTimerMinutes(ex.prescription || '');
    const [timerOpen, setTimerOpen] = useState(false);
    const previewE1RM = weight > 0 && reps > 0 ? round05(epley(weight, reps)) : 0;
    const previewSI = weight > 0 && reps > 0 ? stressIndex(weight, reps, rir, historicalBest || previewE1RM) : 0;
    const sessionVL = volumeLoad(sets || []);
    const sessionBest = bestE1RM(sets || []);

    const nextSetNumber = (sets?.length || 0) + 1;
    // PR aperçu : preview > meilleur e1RM historique (TOUTES sessions confondues
    // pour cet exo). Premier set ever : pas de PR (historicalBest = 0).
    const isPreviewPR = historicalBest != null && historicalBest > 0 && previewE1RM > historicalBest;

    // Flash visuel sur le bouton (cross-platform, marche sur iOS contrairement
    // à navigator.vibrate qui n'existe pas sur Safari/iOS PWA).
    const [flash, setFlash] = useState(false);

    const validate = async () => {
      if (weight <= 0 || reps <= 0) return;
      const e1RM = round05(epley(weight, reps));
      const isPR = historicalBest != null && historicalBest > 0 && e1RM > historicalBest;
      await db.sets.add({
        week,
        sessionDay,
        exerciseSlot: ex.exerciseSlot,
        exerciseName: ex.exerciseName,
        setNumber: nextSetNumber,
        weight, reps, rir,
        e1RM,
        isPR,
        completedAt: new Date().toISOString(),
        syncedAt: null,
      });
      // Haptic Android (no-op silencieux sur iOS — la Web Vibration API n'y
      // est pas implémentée par Apple).
      try { navigator.vibrate && navigator.vibrate(isPR ? [30, 50, 60] : 20); } catch {}
      // PR e1RM (escalade Étape 10) : confetti + son lyre + toast (toast déjà
      // câblé via la liste des sets et le flag isPR).
      if (isPR) {
        fireConfetti();
        play(soundLyre);
      }
      // Check badges set-based (Atlas / Achille déclenchables ici)
      checkBadges().then(newly => { if (newly.length) onBadgesUnlocked(newly); });
      // Flash 250ms — feedback visuel garanti sur toute plateforme.
      setFlash(true);
      setTimeout(() => setFlash(false), 250);
      onSetValidated();
    };

    return (
      <Card style={{ marginTop: 12, padding: 0, overflow: 'hidden' }}>
        <button
          type="button"
          onClick={onToggle}
          style={{
            width: '100%',
            background: 'transparent',
            border: 'none',
            color: 'inherit',
            textAlign: 'left',
            padding: '14px 16px',
            cursor: 'pointer',
            display: 'flex',
            alignItems: 'baseline',
            justifyContent: 'space-between',
            gap: 12,
          }}
        >
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
              Slot {ex.exerciseSlot}{sets && sets.length > 0 && ` · ${sets.length} set${sets.length > 1 ? 's' : ''}`}
            </div>
            <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--text-primary)', marginTop: 2 }}>
              {ex.exerciseName}
            </div>
          </div>
          <span style={{ fontSize: 16, color: 'var(--text-secondary)', flex: '0 0 auto' }}>
            {isOpen ? '▾' : '▸'}
          </span>
        </button>

        {isOpen && (
          <div style={{ padding: '0 16px 16px' }}>
            {ex.prescription && (
              <div style={{
                fontSize: 12,
                color: 'var(--text-secondary)',
                whiteSpace: 'pre-line',
                lineHeight: 1.55,
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-subtle)',
                borderRadius: 10,
                padding: '10px 12px',
                marginBottom: 12,
              }}>{ex.prescription}</div>
            )}

            {/* Timer intégré — uniquement si l'exo matche density set / jump */}
            {timerMinutes !== null && (
              <div style={{ marginBottom: 12 }}>
                {!timerOpen ? (
                  <button type="button" onClick={() => setTimerOpen(true)}
                    style={{
                      width: '100%',
                      background: 'transparent',
                      border: '1px dashed var(--accent-olympus)',
                      borderRadius: 10,
                      color: 'var(--accent-olympus)',
                      padding: '10px 12px',
                      fontSize: 12,
                      fontWeight: 700,
                      letterSpacing: '1.2px',

            {lastWeekBest && !lastWeekBest.none && (
              <div style={{
                fontSize: 12,
                color: 'var(--text-secondary)',
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-subtle)',
                borderLeft: '3px solid var(--accent-royal)',
                borderRadius: 10,
                padding: '8px 12px',
                marginBottom: 12,
                display: 'flex',
                alignItems: 'baseline',
                gap: 8,
              }}>
                <span style={{ color: 'var(--accent-royal)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '1.2px', fontWeight: 700 }}>Sem −1</span>
                <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{lastWeekBest.weight} kg</span>
                <span>×{lastWeekBest.reps}</span>
                <span style={{ fontSize: 11 }}>RIR {lastWeekBest.rir}</span>

                <span style={{ color: 'var(--accent-laurel)', fontSize: 11, fontWeight: 700 }}>e1RM {lastWeekBest.e1RM}</span>
              </div>

            {/* Bandeau live e1RM + Volume Load (mis à jour à chaque set validé) */}
            {sets && sets.length > 0 && (
              <div style={{
                display: 'flex',
                gap: 12,
                fontSize: 12,
                color: 'var(--text-secondary)',
                marginBottom: 12,
                paddingBottom: 12,
                borderBottom: '1px solid var(--border-subtle)',
              }}>
                <div>
                  <span style={{ color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: 10, fontWeight: 700 }}>e1RM session </span>
                  <span style={{ color: 'var(--accent-laurel)', fontWeight: 800, fontSize: 14 }}>{sessionBest} kg</span>
                </div>
                <div>
                  <span style={{ color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: 10, fontWeight: 700 }}>VL </span>

                      <span style={{ color: s.isPR ? 'var(--accent-olympus)' : 'var(--accent-laurel)', fontSize: 11, fontWeight: 700 }}>e1RM {s.e1RM}</span>
                    </li>

            {/* Carte saisie du set en cours */}
            <div ref={setEntryRef}>

                style={{

                    ? 'var(--text-primary)'

              >Valider set</button>
            </div>
          </div>
        )}
      </Card>
    );
  };

  const AujourdhuiPage = () => {
    const { query } = useLocation();
    const navigate = useNavigate();
