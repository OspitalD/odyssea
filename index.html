        </div>
        <UdStepper label="Durée" value={dur} onChange={setDur} min={5} max={600} step={5} unit="s" />
        <button type="button" onClick={validateRound} className="ody-btn-primary"
          style={{ width: '100%', minHeight: 56, marginTop: 8 }}>VALIDER ROUND</button>
      </Card>
    );
  };

  const UdConditioningInput = ({ blk, blockIdx, sets, onValidated, format }) => {
    const existing = sets.find(s => s.exerciseSlot === blockIdx && s.format === format);
    const [dur, setDur] = useState(existing?.durationMinutes ?? blk.durationMinutesTarget);
    const [rpe, setRpe] = useState(existing?.rpe ?? blk.rpeTarget);
    const [done, setDone] = useState(!!existing);

    const validate = async () => {
      if (existing) await db.sets.delete(existing.id);
      await db.sets.add({
        week: getCurrentWeek(), sessionDay: blk._sessionDay, exerciseSlot: blockIdx,
        setNumber: 1, format, exerciseName: blk.exerciseName,
        durationMinutes: dur, rpe, completedAt: new Date().toISOString(), syncedAt: null,
      });
      setDone(true);
      onValidated();
    };
    const redo = async () => {
      if (existing) await db.sets.delete(existing.id);
      setDone(false);
      onValidated();
    };

    if (done) return (
      <Card style={{ padding: '16px' }}>
        <div style={{ fontSize: 11, color: 'var(--accent-laurel)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 8 }}>VALIDÉ</div>
        <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--text-primary)' }}>{dur} min · RPE {rpe}</div>
        <button type="button" onClick={redo} style={{
          marginTop: 12, width: '100%', minHeight: 48, fontSize: 12, fontWeight: 700,
          background: 'transparent', border: '1px solid var(--border-strong)',
          borderRadius: 10, color: 'var(--text-secondary)', cursor: 'pointer',
        }}>REFAIRE</button>
      </Card>
    );
    return (
      <Card style={{ padding: '16px' }}>
        <UdStepper label="Durée réelle" value={dur} onChange={setDur} min={1} max={180} step={1} unit="min" />
        <UdStepper label="RPE ressenti" value={rpe} onChange={setRpe} min={1} max={10} step={1} />
        <button type="button" onClick={validate} className="ody-btn-primary"
          style={{ width: '100%', minHeight: 56, marginTop: 8 }}>VALIDER</button>
      </Card>
    );
  };

  const UdPlyoInput = ({ blk, blockIdx, sets, onValidated }) => {
    const blockSets = sets.filter(s => s.exerciseSlot === blockIdx && s.format === 'plyo')
      .sort((a, b) => a.setNumber - b.setNumber);
    const [reps, setReps] = useState(blk.repsTarget);

    const validateSet = async () => {
      const setNumber = blockSets.length + 1;
      await db.sets.add({
        week: getCurrentWeek(), sessionDay: blk._sessionDay, exerciseSlot: blockIdx,
        setNumber, format: 'plyo', exerciseName: blk.exerciseName,
        reps, laterality: blk.laterality,
        completedAt: new Date().toISOString(), syncedAt: null,
      });
      onValidated();
    };
    const removeLastSet = async () => {
      const last = blockSets[blockSets.length - 1];
      if (!last) return;
      await db.sets.delete(last.id);
      onValidated();
    };

    return (
      <Card style={{ padding: '16px' }}>
        {blockSets.length > 0 && (
          <div style={{ marginBottom: 14, borderBottom: '1px solid var(--border-subtle)', paddingBottom: 10 }}>
            {blockSets.map(s => (
              <div key={s.id} style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4, display: 'flex', gap: 8 }}>
                <span style={{ color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>S{s.setNumber}</span>
                <span>{s.reps} reps</span>
              </div>
            ))}
          </div>
        )}
        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 8 }}>
          SET {blockSets.length + 1}{blockSets.length < blk.setsTarget ? ` / ${blk.setsTarget}` : ' (bonus)'}
        </div>
        <UdStepper label="Reps" value={reps} onChange={setReps} min={1} max={30} step={1} />
        <button type="button" onClick={validateSet} className="ody-btn-primary"
          style={{ width: '100%', minHeight: 56, marginTop: 8 }}>VALIDER SET</button>
        {blockSets.length > 0 && (
          <button type="button" onClick={removeLastSet} style={{
            width: '100%', minHeight: 44, marginTop: 8, fontSize: 12, fontWeight: 700,
            background: 'transparent', border: '1px solid var(--accent-blood)',
            borderRadius: 10, color: 'var(--accent-blood)', cursor: 'pointer',
          }}>RETIRER LE DERNIER SET</button>
        )}
      </Card>
    );
  };

  const UdSprintInput = ({ blk, blockIdx, sets, onValidated }) => {
    const blockSets = sets.filter(s => s.exerciseSlot === blockIdx && s.format === 'sprint')
      .sort((a, b) => a.setNumber - b.setNumber);

    const validateRep = async () => {
      const setNumber = blockSets.length + 1;
      await db.sets.add({
        week: getCurrentWeek(), sessionDay: blk._sessionDay, exerciseSlot: blockIdx,
        setNumber, format: 'sprint', exerciseName: blk.exerciseName,
        reps: 1, distanceYards: blk.distanceYards,
        completedAt: new Date().toISOString(), syncedAt: null,
      });
      onValidated();
    };
    const removeLastRep = async () => {
      const last = blockSets[blockSets.length - 1];
      if (!last) return;
      await db.sets.delete(last.id);
      onValidated();
    };

    return (
      <Card style={{ padding: '16px' }}>
        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 12 }}>
          {blockSets.length} / {blk.repsTarget} REPS · {blk.distanceYards}y · {blk.restSecondsTarget}s rest
        </div>
        {blockSets.length > 0 && (
          <div style={{ marginBottom: 14, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {blockSets.map(s => (
              <span key={s.id} style={{
                fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 700,
                color: 'var(--accent-laurel)', letterSpacing: '0.08em',
              }}>REP {s.setNumber} ✓</span>
            ))}
          </div>
        )}
        <button type="button" onClick={validateRep} className="ody-btn-primary"
          style={{ width: '100%', minHeight: 56, marginTop: 8 }}>VALIDER REP</button>
        {blockSets.length > 0 && (
          <button type="button" onClick={removeLastRep} style={{
            width: '100%', minHeight: 44, marginTop: 8, fontSize: 12, fontWeight: 700,
            background: 'transparent', border: '1px solid var(--accent-blood)',
            borderRadius: 10, color: 'var(--accent-blood)', cursor: 'pointer',
          }}>RETIRER LA DERNIÈRE REP</button>
        )}
      </Card>
    );
  };

  const UserDefinedSessionPage = ({ sessionDay, week, block }) => {
    const dayInfo = WEEK_DAYS.find(d => d.sessionDay === sessionDay);
    const navigate = useNavigate();
    const [state, setState] = useState('loading');
    const [savedConfig, setSavedConfig] = useState(null);
    const [editBlocks, setEditBlocks] = useState([]);
    const [showTypeSelector, setShowTypeSelector] = useState(false);

    // État C
    const [sessionActive, setSessionActive] = useState(false);
    const [sessionStartedAt, setSessionStartedAt] = useState(null);
    const [currentBlockIdx, setCurrentBlockIdx] = useState(0);
    const [sessionSets, setSessionSets] = useState([]);
    const [showQuitModal, setShowQuitModal] = useState(false);
    const [terminating, setTerminating] = useState(false);

    // État D
    const [endPhrase, setEndPhrase] = useState(null);
    const [endingSessionId, setEndingSessionId] = useState(null);
    const [recapStats, setRecapStats] = useState(null);

    const refreshSessionSets = useCallback(async () => {
      const all = await db.sets.where('week').equals(week).toArray();
      setSessionSets(all.filter(s => s.sessionDay === sessionDay));
    }, [week, sessionDay]);

    useEffect(() => {
      (async () => {
        const row = await db.userSessionConfigs.get(sessionDay).catch(() => null);
        if (row?.configuration?.blocks?.length) {
          setSavedConfig(row.configuration);
          // Check if session in progress
          const flag = await db.prefs.get('udSessionInProgress').catch(() => null);
          if (flag?.value?.sessionDay === sessionDay && flag?.value?.week === week) {
            const startedMs = new Date(flag.value.startedAt).getTime();
            const lastMs = flag.value.lastInputAt ? new Date(flag.value.lastInputAt).getTime() : null;
            const SIX_H = 6 * 3600 * 1000, TWO_H = 2 * 3600 * 1000;
            const expired = (Date.now() - startedMs > SIX_H) || (lastMs != null && Date.now() - lastMs > TWO_H);
            if (!expired) {
              setSessionStartedAt(flag.value.startedAt);
              setCurrentBlockIdx(flag.value.currentBlock || 0);
              setSessionActive(true);
              await refreshSessionSets();
              setState('session');
              return;
            }
            await db.prefs.delete('udSessionInProgress').catch(() => {});
          }
          // Check session already completed
          const existing = await db.sessions.where({ week, sessionDay }).first().catch(() => null);
          if (existing?.completedAt) {
            await refreshSessionSets();
            setState('recap');
          } else {
            setState('preview');
          }
        } else {
          setState('config');
        }
      })();
    }, [sessionDay]);

    useEffect(() => {
      const shell = document.querySelector('.app-shell');
      if (!shell) return;
      if (sessionActive) shell.classList.add('session-focus');
      else shell.classList.remove('session-focus');
      return () => shell.classList.remove('session-focus');
    }, [sessionActive]);

    const enterConfig = () => {
      const blocks = savedConfig?.blocks?.length
        ? savedConfig.blocks.map(b => ({ ...b, _id: nextUdBlockId() }))
        : [];
      setEditBlocks(blocks);
      setState('config');
    };

    const addBlock = (type) => {
      const dayDefaults = BLOCK_DEFAULTS_BY_DAY[sessionDay] || BLOCK_DEFAULTS_BY_DAY.Tuesday;
      const defaults = dayDefaults[type];
      setEditBlocks(prev => [...prev, { ...defaults, type, _id: nextUdBlockId() }]);
      setShowTypeSelector(false);
    };

    const updateBlock = (idx, updated) => {
      setEditBlocks(prev => prev.map((b, i) => i === idx ? updated : b));
    };

    const removeBlock = (idx) => {
      setEditBlocks(prev => prev.filter((_, i) => i !== idx));
    };

    const saveConfig = async () => {
      const blocks = editBlocks.map(({ _id, ...rest }) => rest);
      const configuration = { blocks };
      await db.userSessionConfigs.put({ sessionDay, configuration, updatedAt: new Date().toISOString() });
      setSavedConfig(configuration);
      setState('preview');
    };

    const cancelConfig = () => {
      if (savedConfig) setState('preview');
    };

    const startSession = async () => {
      try { navigator.vibrate && navigator.vibrate(10); } catch {}
      const startedAt = new Date().toISOString();
      await db.prefs.put({ key: 'udSessionInProgress', value: { week, sessionDay, currentBlock: 0, startedAt, lastInputAt: null } });
      setSessionStartedAt(startedAt);
      setCurrentBlockIdx(0);
      setSessionActive(true);
      await refreshSessionSets();
      setState('session');
      try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch {}
    };

    const navigateBlock = async (idx) => {
      setCurrentBlockIdx(idx);
      try {
        const flag = await db.prefs.get('udSessionInProgress');
        if (flag?.value) await db.prefs.put({ key: 'udSessionInProgress', value: { ...flag.value, currentBlock: idx } });
      } catch {}
      try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch {}
    };

    const handleInputValidated = async () => {
      await refreshSessionSets();
      try {
        const flag = await db.prefs.get('udSessionInProgress');
        if (flag?.value) await db.prefs.put({ key: 'udSessionInProgress', value: { ...flag.value, lastInputAt: new Date().toISOString() } });
      } catch {}
    };

    const quitSession = async () => {
      try { await db.prefs.delete('udSessionInProgress'); } catch {}
      setSessionActive(false);
      setSessionStartedAt(null);
      setShowQuitModal(false);
      setState('preview');
    };

    const canTerminate = savedConfig && savedConfig.blocks.length > 0 &&
      savedConfig.blocks.every((blk, idx) =>
        sessionSets.some(s => s.exerciseSlot === idx && s.format === blk.type)
      );

    const onTerminate = async () => {
      if (!canTerminate || terminating) return;
      setTerminating(true);
      try { navigator.vibrate && navigator.vibrate(10); } catch {}
      const completedAt = new Date().toISOString();

      let sessionRowId = null;
      try {
        const existing = await db.sessions.where({ week, sessionDay }).first();
        if (existing) {
          await db.sessions.update(existing.id, { completedAt, syncedAt: null });
          sessionRowId = existing.id;
        } else {
          sessionRowId = await db.sessions.add({
            week, sessionDay,
            startedAt: sessionStartedAt || completedAt,
            completedAt, syncedAt: null,
          });
        }
      } catch {}

      try { await db.prefs.delete('udSessionInProgress'); } catch {}

      // Sync via writeUserSession
      const setsToSync = await db.sets.where('week').equals(week).toArray()
        .then(all => all.filter(s => s.sessionDay === sessionDay));
      try {
        await postWriteUserSession(week, sessionDay, savedConfig, setsToSync, completedAt);
        const now = new Date().toISOString();
        for (const s of setsToSync) await db.sets.update(s.id, { syncedAt: now });
      } catch {}

      try { await bumpStreak(); } catch {}

      // Compute recap stats
      const strengthSets = setsToSync.filter(s => s.format === 'strength');
      const volKg = strengthSets.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
      const conditioningMin = setsToSync.filter(s => s.format === 'aerobic' || s.format === 'anaerobic').reduce((a, s) => a + (s.durationMinutes || 0), 0);
      const isoSec = setsToSync.filter(s => s.format === 'iso').reduce((a, s) => a + (s.durationSeconds || 0), 0);
      const plyoReps = setsToSync.filter(s => s.format === 'plyo').reduce((a, s) => a + (s.reps || 0), 0);
      const sprintReps = setsToSync.filter(s => s.format === 'sprint').length;
      const rpes = setsToSync.filter(s => s.rpe != null).map(s => s.rpe);
      const avgRpe = rpes.length ? Math.round(rpes.reduce((a, r) => a + r, 0) / rpes.length * 10) / 10 : null;
      setRecapStats({ volKg, conditioningMin, isoSec, plyoReps, sprintReps, strengthSets: strengthSets.length, avgRpe, totalSets: setsToSync.length });

      setEndingSessionId(sessionRowId);
      const phrase = await pickEndPhrase();
      setEndPhrase(phrase);

      setSessionActive(false);
      setState('recap');
      setTerminating(false);
    };

    const handleEndComplete = useCallback(() => {
      setEndPhrase(null);
      setEndingSessionId(null);
      navigate(ROUTES.SEMAINE);
    }, [navigate]);

    if (state === 'loading') return null;

    // ÉTAT A — Configuration
    if (state === 'config') {
      return (
        <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
          <div style={{ padding: 'var(--sp-5) 0 var(--sp-3)' }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
              color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              CONFIG · {dayInfo?.fr?.toUpperCase() || sessionDay.toUpperCase()} · S{week}
            </div>
            <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Inscription size="md">{dayInfo?.label || sessionDay}</Inscription>
            </div>
          </div>

          {editBlocks.map((block, idx) => (
            <UdBlockEditor
              key={block._id}
              block={block}
              onChange={(updated) => updateBlock(idx, updated)}
              onRemove={() => removeBlock(idx)}
            />
          ))}

          {showTypeSelector && (
            <Card style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 10 }}>
                TYPE DE BLOC
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {BLOCK_TYPES.filter(bt => (BLOCK_TYPES_BY_DAY[sessionDay] || BLOCK_TYPES_BY_DAY.Tuesday).includes(bt.type)).map(bt => (
                  <button key={bt.type} type="button" onClick={() => addBlock(bt.type)}
                    style={{
                      width: '100%', minHeight: 56, fontSize: 14, fontWeight: 800,
                      background: 'var(--bg-primary)', border: `1px solid ${bt.accent}`,
                      borderRadius: 10, color: 'var(--text-primary)', cursor: 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                    }}>
                    <span style={{ color: bt.accent, fontSize: 10, fontWeight: 700, fontFamily: 'var(--font-mono)', letterSpacing: '0.08em' }}>{bt.label.toUpperCase()}</span>
                  </button>
                ))}
              </div>
              <button type="button" onClick={() => setShowTypeSelector(false)}
                style={{
                  width: '100%', marginTop: 8, minHeight: 44, fontSize: 12, fontWeight: 700,
                  background: 'transparent', border: '1px solid var(--border-strong)',
                  borderRadius: 10, color: 'var(--text-tertiary)', cursor: 'pointer',
                }}>ANNULER</button>
            </Card>
          )}

          {!showTypeSelector && (
            <button type="button" onClick={() => setShowTypeSelector(true)}
              style={{
                width: '100%', minHeight: 56, marginBottom: 16,
                fontSize: 13, fontWeight: 800, letterSpacing: '0.08em',
                background: 'transparent', border: '2px dashed var(--border-strong)',
                borderRadius: 10, color: 'var(--text-secondary)', cursor: 'pointer',
              }}>+ AJOUTER UN BLOC</button>
          )}

          <button type="button" onClick={saveConfig} disabled={editBlocks.length === 0}
            className="ody-btn-primary"
            style={{
              width: '100%', minHeight: 56, marginBottom: 10,
              opacity: editBlocks.length === 0 ? 0.4 : 1,
              cursor: editBlocks.length === 0 ? 'not-allowed' : 'pointer',
            }}>
            ENREGISTRER LA CONFIG
          </button>
          {savedConfig && (
            <button type="button" onClick={cancelConfig}
              style={{
                width: '100%', minHeight: 56,
                fontSize: 13, fontWeight: 700,
                background: 'transparent', border: '1px solid var(--border-strong)',
                borderRadius: 10, color: 'var(--text-secondary)', cursor: 'pointer',
              }}>ANNULER</button>
          )}
        </div>
      );
    }

    // ÉTAT B — Preview
    if (state === 'preview' && savedConfig) {
      return (
        <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
          <div style={{ padding: 'var(--sp-5) 0 var(--sp-3)' }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
              color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              {"AUJOURD'HUI"} · {dayInfo?.fr?.toUpperCase() || sessionDay.toUpperCase()} · S{week}
            </div>
            <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Inscription size="md">{block.name}</Inscription>
              <BlockBeads total={block.weeks[1] - block.weeks[0] + 1} current={week - block.weeks[0] + 1} />
            </div>
          </div>

          <div className="ody-tablet" style={{
            padding: 'var(--sp-4) var(--sp-5)', marginBottom: 'var(--sp-4)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div>
              <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>SÉANCE PERSO</Inscription>
              <div style={{
                fontFamily: 'var(--font-sans)', fontSize: 22, fontWeight: 800,
                color: 'var(--text-primary)', marginTop: 2,
              }}>{dayInfo?.label || sessionDay}</div>
            </div>
            <span style={{
              fontSize: 9, fontWeight: 700, fontFamily: 'var(--font-mono)',
              color: 'var(--accent-olympus)', letterSpacing: '0.1em',
              border: '1px solid rgba(232,160,32,0.3)', borderRadius: 4, padding: '2px 6px',
            }}>PERSO</span>
          </div>

          <Inscription size="xs" style={{ color: 'var(--text-tertiary)', marginBottom: 'var(--sp-3)', display: 'block' }}>
            AU PROGRAMME · {savedConfig.blocks.length} BLOC{savedConfig.blocks.length > 1 ? 'S' : ''}
          </Inscription>
          {savedConfig.blocks.map((blk, idx) => {
            const meta = BLOCK_TYPES.find(bt => bt.type === blk.type) || BLOCK_TYPES[0];
            return (
              <Card key={idx} style={{ marginBottom: 10, padding: '14px 16px' }}>
                <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 10, marginBottom: 6 }}>
                  <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
                    Bloc {idx + 1}
                  </div>
                  <span style={{
                    fontSize: 8, fontWeight: 700, fontFamily: 'var(--font-mono)',
                    color: meta.accent, letterSpacing: '0.08em',
                  }}>{meta.label.toUpperCase()}</span>
                </div>
                <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 4 }}>
                  {blk.exerciseName}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.5 }}>
                  {udBlockSummary(blk)}
                </div>
              </Card>
            );
          })}

          <button type="button" onClick={startSession}
            className="ody-btn-primary"
            style={{ width: '100%', minHeight: 56, marginTop: 'var(--sp-3)', marginBottom: 10 }}>
            DÉMARRER LA SÉANCE
          </button>

          <button type="button" onClick={enterConfig}
            style={{
              width: '100%', minHeight: 56,
              fontSize: 13, fontWeight: 700,
              background: 'transparent', border: '1px solid var(--border-strong)',
              borderRadius: 10, color: 'var(--text-secondary)', cursor: 'pointer',
            }}>MODIFIER LA CONFIG</button>
        </div>
      );
    }

    // ÉTAT C — Séance plein écran
    if (state === 'session' && savedConfig) {
      const blocks = savedConfig.blocks;
      const blk = blocks[currentBlockIdx] || blocks[0];
      const meta = BLOCK_TYPES.find(bt => bt.type === blk.type) || BLOCK_TYPES[0];
      const blkWithDay = { ...blk, _sessionDay: sessionDay };

      return (
        <>
          <div style={{ padding: '0 16px 24px' }}>
            <SessionFocusHeader
              title={`${dayInfo?.label || sessionDay} · ${currentBlockIdx + 1}/${blocks.length}`}
              startedAt={sessionStartedAt}
              onQuit={() => setShowQuitModal(true)}
            />
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
            }}>
              <span style={{
                fontSize: 9, fontWeight: 700, fontFamily: 'var(--font-mono)',
                color: meta.accent, letterSpacing: '0.1em', textTransform: 'uppercase',
                border: `1px solid ${meta.accent}`, borderRadius: 4, padding: '2px 6px',
              }}>{meta.label.toUpperCase()}</span>
              <span style={{ fontSize: 18, fontWeight: 800, color: 'var(--text-primary)' }}>{blk.exerciseName}</span>
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginBottom: 16 }}>{udBlockSummary(blk)}</div>

            {blk.type === 'aerobic' && <UdConditioningInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} format="aerobic" />}
            {blk.type === 'anaerobic' && <UdConditioningInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} format="anaerobic" />}
            {blk.type === 'strength' && <UdStrengthInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} />}
            {blk.type === 'iso' && <UdIsoInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} />}
            {blk.type === 'plyo' && <UdPlyoInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} />}
            {blk.type === 'sprint' && <UdSprintInput blk={blkWithDay} blockIdx={currentBlockIdx} sets={sessionSets} onValidated={handleInputValidated} />}

            <div style={{ height: 200 }} />
          </div>
          <SlotNav
            currentSlot={currentBlockIdx}
            exos={blocks.map((_, i) => ({ exerciseSlot: i }))}
            onPrev={() => currentBlockIdx > 0 && navigateBlock(currentBlockIdx - 1)}
            onNext={() => currentBlockIdx < blocks.length - 1 && navigateBlock(currentBlockIdx + 1)}
            onTerminate={onTerminate}
            canTerminate={canTerminate}
            terminating={terminating}
          />
          {showQuitModal && <QuitConfirmModal onContinue={() => setShowQuitModal(false)} onQuit={quitSession} />}
          {endPhrase && <SessionEndOverlay phrase={endPhrase} sessionId={endingSessionId} onComplete={handleEndComplete} />}
        </>
      );
    }

    // ÉTAT D — Récap
    if (state === 'recap') {
      return (
        <>
          <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
            <div style={{ padding: 'var(--sp-5) 0 var(--sp-3)' }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
                color: 'var(--accent-laurel)', letterSpacing: '0.12em', textTransform: 'uppercase',
              }}>
                SÉANCE TERMINÉE · {dayInfo?.fr?.toUpperCase()} · S{week}
              </div>
              <div style={{ marginTop: 6 }}>
                <Inscription size="md">{dayInfo?.label || sessionDay}</Inscription>
              </div>
            </div>

            {recapStats && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--sp-2)', marginBottom: 'var(--sp-4)' }}>
                {recapStats.volKg > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent-laurel)' }}>
                      {recapStats.volKg >= 1000 ? `${(recapStats.volKg / 1000).toFixed(1)}k` : recapStats.volKg}
                    </div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>VOLUME KG</Inscription>
                  </div>
                )}
                {recapStats.conditioningMin > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{recapStats.conditioningMin}</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>MIN CARDIO</Inscription>
                  </div>
                )}
                {recapStats.isoSec > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{recapStats.isoSec}s</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>ISO TOTAL</Inscription>
                  </div>
                )}
                {recapStats.plyoReps > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{recapStats.plyoReps}</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>REPS PLYO</Inscription>
                  </div>
                )}
                {recapStats.sprintReps > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{recapStats.sprintReps}</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>SPRINTS</Inscription>
                  </div>
                )}
                {recapStats.totalSets > 0 && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{recapStats.totalSets}</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>SAISIES</Inscription>
                  </div>
                )}
                {recapStats.avgRpe != null && (
                  <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                    <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent-olympus)' }}>{recapStats.avgRpe}</div>
                    <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>RPE MOY</Inscription>
                  </div>
                )}
              </div>
            )}

            <button type="button" onClick={enterConfig}
              style={{
                width: '100%', minHeight: 56, marginBottom: 10,
                fontSize: 13, fontWeight: 700,
                background: 'transparent', border: '1px solid var(--border-strong)',
                borderRadius: 10, color: 'var(--text-secondary)', cursor: 'pointer',
              }}>MODIFIER LA CONFIG</button>
            <button type="button" onClick={() => navigate(ROUTES.SEMAINE)}
              className="ody-btn-primary"
              style={{ width: '100%', minHeight: 56 }}>RETOUR</button>
          </div>
          {endPhrase && <SessionEndOverlay phrase={endPhrase} sessionId={endingSessionId} onComplete={handleEndComplete} />}
        </>
      );
    }

    return null;
  };

  const AujourdhuiPage = () => {
    const { query } = useLocation();
    const navigate = useNavigate();
    const [weekOverride, clearWeekOverride] = useWeekOverride();
    const week = weekOverride ? weekOverride.week : getCurrentWeek();
    const block = getCurrentBlock(week);
    const todayDay = WEEK_DAYS.find(d => d.idx === getCurrentWeekDayIdx());
    const requestedDay = query.day || ((todayDay?.strength || todayDay?.userDefined) ? todayDay.sessionDay : null);
    const day = WEEK_DAYS.find(d => d.sessionDay === requestedDay) || WEEK_DAYS[0];
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const exos = (programmeByDay && day.sessionDay) ? (programmeByDay[day.sessionDay] || []) : null;

    const [setsBySlot, refreshSets] = useSetsForDay(week, day.sessionDay);

    const [streakTick, setStreakTick] = useState(0);
    const streak = useStreak(streakTick);
    const liveKPIs = useWeekKPIs(week, streak);

    const [expandedSlot, setExpandedSlot] = useState(null);
    const [endPhrase, setEndPhrase] = useState(null);
    const [endingSessionId, setEndingSessionId] = useState(null);
    const [terminating, setTerminating] = useState(false);
    const [recentBadges, setRecentBadges] = useState([]); // queue de badges fraîchement débloqués
    const onBadgesUnlocked = useCallback((newly) => {
      if (newly && newly.length) setRecentBadges(b => [...b, ...newly]);
    }, []);
    const [completedBlock, setCompletedBlock] = useState(null);
    const [council, setCouncil] = useState(null);

    // Vérif Conseil des Dieux : à chaque mount de la page (= ouverture app),
    // si dimanche et pas encore vu aujourd'hui → afficher.
    useEffect(() => {
      (async () => {
        if (await shouldShowCouncil()) {
          const recap = await computeWeeklyRecap();
          setCouncil(recap);
        }
      })();
    }, []);

    const closeCouncil = async () => {
      await markCouncilSeen();
      setCouncil(null);
    };

    // Les Sirènes — détection idle 20 min
    const [sirensVisible, dismissSirens] = useSirensWarning(setsBySlot, day.sessionDay);

    // Le Souffle — bouton optionnel pour DL/Squat lourds
    const [showBreath, setShowBreath] = useState(false);
    const dayHasHeavyLift = exos && exos.some(ex =>
      /deadlift|back squat|zercher squat/i.test(ex.exerciseName || '')
    );

    // Mode Séance (P0-B) — État 1 (preview) / État 2 (focus plein écran).
    // sessionActive=true : bottom nav masquée, une seule card, chrono visible.
    const [sessionActive, setSessionActive] = useState(false);
    const [sessionStartedAt, setSessionStartedAt] = useState(null);
    const [currentSlot, setCurrentSlot] = useState(1);
    const [showQuitModal, setShowQuitModal] = useState(false);
    // Détection : session déjà terminée par le passé sur ce jour ?
    const [sessionCompleted, setSessionCompleted] = useState(false);
    const [strengthRecap, setStrengthRecap] = useState(null);

    useEffect(() => {
      const shell = document.querySelector('.app-shell');
      if (!shell) return;
      if (sessionActive) shell.classList.add('session-focus');
      else shell.classList.remove('session-focus');
      return () => shell.classList.remove('session-focus');
    }, [sessionActive]);

    // Restauration du flag sessionInProgress au mount, ET détection
    // session-déjà-complétée pour ce day. L'auto-clear par expiration est géré
    // au boot dans App. Ici on restaure uniquement si le flag pointe vers le
    // jour affiché. Sinon : preview seul, mais on garde le flag intact.
    useEffect(() => {
      if (!day.sessionDay) { setSessionCompleted(false); return; }
      let alive = true;
      (async () => {
        try {
          const existing = await db.sessions.where({ week, sessionDay: day.sessionDay }).first();
          if (alive) setSessionCompleted(!!existing?.completedAt);
        } catch { if (alive) setSessionCompleted(false); }
        try {
          const flag = await db.prefs.get('sessionInProgress');
          if (!alive) return;
          if (flag?.value?.startedAt) {
            // Re-check expiration ici (defense in depth — l'auto-clear côté App
            // est async et peut ne pas avoir fini avant ce read).
            const startedMs = new Date(flag.value.startedAt).getTime();
            const lastSetMs = flag.value.lastSetAt ? new Date(flag.value.lastSetAt).getTime() : null;
            const SIX_H = 6 * 3600 * 1000;
            const TWO_H = 2 * 3600 * 1000;
            const expired =
              (Date.now() - startedMs > SIX_H) ||
              (lastSetMs != null && Date.now() - lastSetMs > TWO_H);
            if (expired) {
              try { await db.prefs.delete('sessionInProgress'); } catch {}
            } else if (flag.value.week === week && flag.value.sessionDay === day.sessionDay) {
              setSessionStartedAt(flag.value.startedAt);
              setCurrentSlot(flag.value.currentSlot || 1);
              setSessionActive(true);
            }
          }
        } catch {}
      })();
      return () => { alive = false; };
    }, [week, day.sessionDay]);

    // Si exos arrive après restauration, garde-fou : si currentSlot pointe vers
    // un slot qui n'existe plus dans le programme (rare : reseed entre deux
    // ouvertures), retomber sur le 1er exo.
    useEffect(() => {
      if (!sessionActive || !exos || exos.length === 0) return;
      if (!exos.find(ex => ex.exerciseSlot === currentSlot)) {
        setCurrentSlot(exos[0].exerciseSlot);
      }
    }, [sessionActive, exos, currentSlot]);

    // Activation TERMINER : ≥1 set validé sur CHAQUE exo.
    const canTerminate = exos && exos.length > 0 && setsBySlot &&
      exos.every(ex => (setsBySlot[ex.exerciseSlot] || []).length > 0);

    const startSession = async () => {
      try { navigator.vibrate && navigator.vibrate(10); } catch {}
      const startedAt = new Date().toISOString();
      const firstSlot = (exos && exos[0]?.exerciseSlot) || 1;
      try {
        await db.prefs.put({
          key: 'sessionInProgress',
          value: { week, sessionDay: day.sessionDay, currentSlot: firstSlot, startedAt, lastSetAt: null },
        });
      } catch {}
      setSessionStartedAt(startedAt);
      setCurrentSlot(firstSlot);
      setSessionActive(true);
      try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch {}
    };

    const navigateSlot = async (newSlot) => {
      setCurrentSlot(newSlot);
      try {
        const flag = await db.prefs.get('sessionInProgress');
        if (flag?.value) {
          await db.prefs.put({ key: 'sessionInProgress', value: { ...flag.value, currentSlot: newSlot } });
        }
      } catch {}
      try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch {}
    };

    const handleSetValidated = async () => {
      refreshSets();
      try {
        const flag = await db.prefs.get('sessionInProgress');
        if (flag?.value) {
          await db.prefs.put({ key: 'sessionInProgress', value: { ...flag.value, lastSetAt: new Date().toISOString() } });
        }
      } catch {}
    };

    const quitSession = async () => {
      try { await db.prefs.delete('sessionInProgress'); } catch {}
      setSessionActive(false);
      setSessionStartedAt(null);
      setShowQuitModal(false);
    };

    const onTerminate = async () => {
      if (!canTerminate || terminating) return;
      setTerminating(true);
      try { navigator.vibrate && navigator.vibrate(10); } catch {}
      // Marquer la session comme complétée + récupérer son id pour le mood
      let sessionRowId = null;
      try {
        const existing = await db.sessions.where({ week, sessionDay: day.sessionDay }).first();
        if (existing) {
          await db.sessions.update(existing.id, { completedAt: new Date().toISOString(), syncedAt: null });
          sessionRowId = existing.id;
        } else {
          sessionRowId = await db.sessions.add({
            week, sessionDay: day.sessionDay,
            startedAt: sessionStartedAt || new Date().toISOString(),
            completedAt: new Date().toISOString(),
            syncedAt: null,
          });
        }
      } catch {}
      // Effacer le flag sessionInProgress. On reste en État 2 jusqu'à ce que
      // SessionEndOverlay → handleEndComplete navigue vers /semaine (unmount =
      // cleanup automatique de la className .session-focus). Sinon flicker
      // d'État 1 entre delete-flag et setEndPhrase.
      try { await db.prefs.delete('sessionInProgress'); } catch {}
      setEndingSessionId(sessionRowId);
      // Bump streak (1× par jour max — multiples sessions le même jour ne cumulent pas)
      try { await bumpStreak(); } catch {}
      setStreakTick(t => t + 1);
      // Check badges après bumpStreak (Premier Pas, Sirènes, Héraclès…)
      try {
        const newly = await checkBadges();
        if (newly.length) setRecentBadges(b => [...b, ...newly]);
      } catch {}
      // Check transition de bloc (cycliquement : on a complété le bloc précédent)
      try {
        const finishedBlock = await checkBlockTransition(week);
        if (finishedBlock) setCompletedBlock(finishedBlock);
      } catch {}
      // Compute recap stats + suggestions S+1
      try {
        const allSessionSets = await db.sets.where('week').equals(week).toArray()
          .then(all => all.filter(s => s.sessionDay === day.sessionDay));
        const volKg = allSessionSets.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
        const totalSets = allSessionSets.length;
        const prCount = allSessionSets.filter(s => s.isPR).length;
        const durationMin = sessionStartedAt
          ? Math.round((Date.now() - new Date(sessionStartedAt).getTime()) / 60000)
          : null;

        const suggestions = [];
        if (exos && week < 20) {
          for (const ex of exos) {
            const slotSets = allSessionSets.filter(s => s.exerciseSlot === ex.exerciseSlot);
            const slotFormat = slotSets[0]?.format || detectFormat(ex.prescription, ex.exerciseName);
            const result = computeSuggestions(week, day.sessionDay, ex.exerciseSlot, ex.exerciseName, slotFormat, ex.prescription, slotSets);
            if (result) {
              const row = {
                week: week + 1, sessionDay: day.sessionDay, exerciseSlot: ex.exerciseSlot,
                exerciseName: ex.exerciseName, format: slotFormat,
                ...result, computedAt: new Date().toISOString(), sourceWeek: week,
              };
              try { await db.weekSuggestions.put(row); } catch {}
              suggestions.push(row);
            } else {
              suggestions.push({ exerciseName: ex.exerciseName, format: slotFormat, exerciseSlot: ex.exerciseSlot, suggestedWeight: null });
            }
          }
        }
        const sessionPRs = await db.prs.toArray().then(all => {
          const start = sessionStartedAt || new Date().toISOString();
          return all.filter(p => p.validatedAt >= start);
        }).catch(() => []);
        setStrengthRecap({ volKg, totalSets, prCount, durationMin, suggestions, sessionPRs });
      } catch {}

      // Pioche phrase et l'affiche
      const phrase = await pickEndPhrase();
      setEndPhrase(phrase);
      // Sync en arrière-plan pendant le sas de décompression
      syncPendingSets().catch(() => {});
    };

    const handleEndComplete = useCallback(() => {
      setEndPhrase(null);
      setEndingSessionId(null);
      setTerminating(false);
      setSessionActive(false);
    }, []);

    const dismissRecap = useCallback(() => {
      setStrengthRecap(null);
      navigate(ROUTES.SEMAINE);
    }, [navigate]);

    // User-defined day (Tuesday / Thursday) — délégation complète.
    if (day.userDefined) {
      return <UserDefinedSessionPage sessionDay={day.sessionDay} week={week} block={block} />;
    }

    // ÉTAT D — Récap strength post-TERMINER
    if (strengthRecap && !sessionActive) {
      const fmtLabel = (f) => (FORMAT_META[f] || FORMAT_META.traditional).label;
      const fmtColor = (f) => (FORMAT_META[f] || FORMAT_META.traditional).color;
      return (
        <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
          <div style={{ padding: 'var(--sp-5) 0 var(--sp-3)' }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
              color: 'var(--accent-laurel)', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              SÉANCE TERMINÉE · {day.fr?.toUpperCase()} · S{week}
            </div>
            <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Inscription size="md">{block.name}</Inscription>
              <BlockBeads total={block.weeks[1] - block.weeks[0] + 1} current={week - block.weeks[0] + 1} />
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--sp-2)', marginBottom: 'var(--sp-4)' }}>
            {strengthRecap.volKg > 0 && (
              <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent-laurel)' }}>
                  {strengthRecap.volKg >= 1000 ? `${(strengthRecap.volKg / 1000).toFixed(1)}k` : strengthRecap.volKg}
                </div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>VOLUME KG</Inscription>
              </div>
            )}
            {strengthRecap.totalSets > 0 && (
              <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{strengthRecap.totalSets}</div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>SETS</Inscription>
              </div>
            )}
            {strengthRecap.prCount > 0 && (
              <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent-olympus)' }}>{strengthRecap.prCount}</div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>PR BATTUS</Inscription>
              </div>
            )}
            {strengthRecap.durationMin != null && (
              <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
                <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>{strengthRecap.durationMin}</div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>MIN</Inscription>
              </div>
            )}
          </div>

          {strengthRecap.sessionPRs && strengthRecap.sessionPRs.length > 0 && (
            <div style={{ marginBottom: 'var(--sp-4)' }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700,
                color: 'var(--accent-olympus)', letterSpacing: '0.12em',
                marginBottom: 'var(--sp-3)', textTransform: 'uppercase',
              }}>PR DE LA SÉANCE</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--sp-2)' }}>
                {strengthRecap.sessionPRs.map((pr, i) => (
                  <div key={i} className="ody-tablet" style={{
                    padding: '12px 14px',
                    display: 'flex', alignItems: 'center', gap: 10,
                    borderColor: 'rgba(232,160,32,0.3)',
                  }}>
                    <VerginaStar size={20} color="var(--accent-olympus)" />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{pr.exerciseName}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{pr.weight} kg · e1RM {pr.e1RM} kg</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {strengthRecap.suggestions && strengthRecap.suggestions.length > 0 && (
            <div style={{ marginBottom: 'var(--sp-4)' }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700,
                color: 'var(--accent-olympus)', letterSpacing: '0.12em',
                marginBottom: 'var(--sp-3)', textTransform: 'uppercase',
              }}>SEMAINE PROCHAINE · S{week + 1}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--sp-2)' }}>
                {strengthRecap.suggestions.map((s, i) => (
                  <div key={i} className="ody-tablet" style={{
                    padding: '12px 14px',
                    display: 'flex', alignItems: 'center', gap: 10,
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{s.exerciseName}</div>
                      <span style={{
                        fontSize: 9, fontWeight: 700, fontFamily: 'var(--font-mono)',
                        color: fmtColor(s.format), letterSpacing: '0.08em', textTransform: 'uppercase',
                      }}>{fmtLabel(s.format)}</span>
                    </div>
                    {s.suggestedWeight != null ? (
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--accent-laurel)' }}>{s.suggestedWeight} kg</div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: s.delta === 'même charge' ? 'var(--text-tertiary)' : 'var(--accent-olympus)' }}>{s.delta}</div>
                      </div>
                    ) : (
                      <div style={{ fontSize: 13, color: 'var(--text-tertiary)', fontWeight: 700 }}>—</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          <button type="button" onClick={dismissRecap}
            className="ody-btn-primary"
            style={{ width: '100%', minHeight: 56 }}>RETOUR</button>
        </div>
      );
    }

    // ÉTAT 2 — séance plein écran focus
    if (sessionActive && exos && exos.length > 0) {
      const currentExo = exos.find(ex => ex.exerciseSlot === currentSlot) || exos[0];
      const idx = exos.findIndex(ex => ex.exerciseSlot === currentExo.exerciseSlot);
      return (
        <>
          <div style={{ padding: '0 16px 24px' }}>
            <SessionFocusHeader
              title={day.label}
              startedAt={sessionStartedAt}
              onQuit={() => setShowQuitModal(true)}
            />
            <ExoCard
              key={currentExo.id}
              ex={currentExo}
              week={week}
              sessionDay={day.sessionDay}
              sets={setsBySlot ? (setsBySlot[currentExo.exerciseSlot] || []) : null}
              isOpen={true}
              onToggle={() => {}}
              onSetValidated={handleSetValidated}
              onBadgesUnlocked={onBadgesUnlocked}
            />
            {/* Espace réservé pour la SlotNav fixe en bas. */}
            <div style={{ height: 200 }} />
          </div>
          <SlotNav
            currentSlot={currentExo.exerciseSlot}
            exos={exos}
            onPrev={() => !((idx) <= 0) && navigateSlot(exos[idx - 1].exerciseSlot)}
            onNext={() => !((idx) >= exos.length - 1) && navigateSlot(exos[idx + 1].exerciseSlot)}
            onTerminate={onTerminate}
            canTerminate={canTerminate}
            terminating={terminating}
          />
          {showQuitModal && (
            <QuitConfirmModal
              onContinue={() => setShowQuitModal(false)}
              onQuit={quitSession}
            />
          )}
          {endPhrase && (
            <SessionEndOverlay
              phrase={endPhrase}
              sessionId={endingSessionId}
              onComplete={handleEndComplete}
            />
          )}
          {recentBadges.length > 0 && (
            <BadgeToast
              badge={recentBadges[0]}
              onDone={() => setRecentBadges(b => b.slice(1))}
            />
          )}
          {completedBlock && (
            <BlockCompleteModal
              block={completedBlock}
              onClose={() => { setCompletedBlock(null); play(soundBell); }}
            />
          )}
        </>
      );
    }

    // ÉTAT 1 — preview brutaliste
    const todayLabel = day.label ? day.label.replace(/Strength (\d)/,'STR $1').replace(/Upper Body/,'UPR').split(/\s+/).slice(0, 2).join(' ').toUpperCase() : '';
    const todayKind = day.label || '';
    return (
      <>
        <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
          {/* Header tactique mono */}
          <div style={{
            padding: 'var(--sp-5) 0 var(--sp-3)',
            display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          }}>
            <div>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
                color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
              }}>
                {"AUJOURD'HUI"} · {day.fr?.toUpperCase() || 'VEN'} · S{week}
              </div>
              <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 10 }}>
                <Inscription size="md">{block.name}</Inscription>
                <BlockBeads total={block.weeks[1] - block.weeks[0] + 1} current={week - block.weeks[0] + 1} />
              </div>
            </div>
            <span style={{
              fontFamily: 'var(--font-greek)', fontStyle: 'italic',
              fontSize: 48, color: 'var(--accent-olympus)', opacity: 0.10,
              lineHeight: 1, marginTop: -4,
            }}>{block.glyph}</span>
          </div>

          {weekOverride && (
            <div style={{
              background: 'rgba(185,144,224,0.08)',
              borderBottom: '1px solid var(--accent-laurel)',
              padding: '8px 16px',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              marginBottom: 'var(--sp-2)',
              borderRadius: 'var(--r-sm)',
            }}>
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
                color: 'var(--accent-royal)', letterSpacing: '0.15em', textTransform: 'uppercase',
              }}>MODE REPRISE · SEM {weekOverride.week}</span>
              <button type="button" onClick={clearWeekOverride} style={{
                background: 'transparent', border: '1px solid var(--border-strong)',
                borderRadius: 6, color: 'var(--text-secondary)', padding: '4px 10px',
                fontSize: 10, fontWeight: 700, letterSpacing: '0.8px', textTransform: 'uppercase',
                cursor: 'pointer',
              }}>Annuler</button>
            </div>
          )}

          {/* Inscription séance type */}
          {(day.strength || day.userDefined) && (
          <div className="ody-tablet" style={{
            padding: 'var(--sp-4) var(--sp-5)', marginBottom: 'var(--sp-4)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div>
              <Inscription size="xs" style={{color:'var(--text-tertiary)'}}>SÉANCE</Inscription>
              <div style={{
                fontFamily: 'var(--font-sans)', fontSize: 22, fontWeight: 800,
                color: 'var(--text-primary)', marginTop: 2,
              }}>{todayKind}</div>
            </div>
            <span className="ody-tactical" style={{ fontSize: 13 }}>{todayLabel}</span>
          </div>
          )}

          {/* KPI 2×2 grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--sp-2)', marginBottom: 'var(--sp-4)' }}>
            {(liveKPIs || []).map(kpi => (
              <KPITile key={kpi.label} label={kpi.label} value={kpi.value} unit={kpi.unit} delta={kpi.delta} caption={kpi.ref} accent={kpi.accent} />
            ))}
          </div>

          {/* Slot list — tap to expand consignes */}
          {(() => {
            const slots = (exos && exos.length > 0)
              ? exos.map(ex => {
                  const fmt = detectFormat(ex.prescription, ex.exerciseName);
                  const meta = FORMAT_META[fmt] || FORMAT_META.traditional;
                  return { idx: ex.exerciseSlot, name: ex.exerciseName, formatLabel: meta.label, formatColor: meta.color, prescription: ex.prescription || '' };
                })
              : [];

            if (!day.strength) return (
              <div style={{ padding: 'var(--sp-5)', textAlign: 'center', color: 'var(--text-tertiary)', border: '1px dashed var(--border-subtle)', borderRadius: 'var(--r-md)' }}>
                REPOS · JOUR LIBRE
              </div>
            );
            if (slots.length === 0) return null;

            return (
              <div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)', marginBottom: 'var(--sp-3)', display: 'block' }}>
                  AU PROGRAMME · {slots.length} SLOTS
                </Inscription>
                <div style={{ borderTop: '1px solid var(--border-subtle)' }}>
                  {slots.map(slot => {
                    const isOpen = expandedSlot === slot.idx;
                    const fmtColor = slot.formatColor;
                    return (
                      <div key={slot.idx}>
                        <button type="button" onClick={() => setExpandedSlot(isOpen ? null : slot.idx)}
                          style={{
                            width: '100%', background: 'transparent', border: 'none', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', gap: 'var(--sp-3)',
                            padding: 'var(--sp-4) 0',
                            borderBottom: '1px solid var(--border-subtle)',
                          }}>
                          <span className="ody-tactical" style={{ fontSize: 12, color: 'var(--text-tertiary)', minWidth: 24 }}>
                            {String(slot.idx).padStart(2, '0')}
                          </span>
                          <span style={{ flex: 1, textAlign: 'left', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'var(--font-sans)' }}>
                            {slot.name}
                          </span>
                          {slot.formatLabel && (
                            <span style={{
                              padding: '3px 10px', border: `1px solid ${fmtColor}`, borderRadius: 'var(--r-sm)',
                              fontSize: 10, fontWeight: 700, fontFamily: 'var(--font-mono)',
                              color: fmtColor, letterSpacing: '0.08em', textTransform: 'uppercase',
                            }}>{slot.formatLabel}</span>
                          )}
                        </button>
                        {isOpen && slot.prescription && (
                          <div style={{
                            padding: '0 0 var(--sp-4) 36px',
                            borderBottom: '1px solid var(--border-subtle)',
                            animation: 'fade-in var(--d-fast)',
                          }}>
                            <div style={{
                              fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.55,
                              fontFamily: 'var(--font-sans)',
                            }}>{slot.prescription}</div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Mantra */}
          <div style={{
            marginTop: 'var(--sp-6)', marginBottom: 'var(--sp-5)',
            textAlign: 'center',
          }}>
            <span style={{
              fontFamily: 'var(--font-greek)', fontStyle: 'italic',
              fontSize: 14, color: 'var(--text-tertiary)', lineHeight: 1.5,
            }}>
              « {pickMantraOfDay()} »
            </span>
          </div>

          {/* DÉMARRER LA SÉANCE — ody-btn-primary, no border-radius per spec */}
          {day.strength && (
            <button
              type="button"
              className="ody-btn-primary"
              onClick={startSession}
              disabled={sessionCompleted}
              style={{
                width: '100%', minHeight: 56, marginBottom: 'var(--sp-4)',
                opacity: sessionCompleted ? 0.4 : 1,
                cursor: sessionCompleted ? 'not-allowed' : 'pointer',
              }}
            >
              {sessionCompleted ? 'SESSION TERMINÉE' : 'DÉMARRER LA SÉANCE'}
            </button>
          )}
          {sessionCompleted && (
            <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 'var(--sp-4)' }}>
              Session terminée pour aujourd'hui.
            </div>
          )}

          {/* Legacy features preserved */}
          {sirensVisible && <SirensWarning onDismiss={dismissSirens} />}
          <LotophagesWarning streak={streak} onPardonUsed={() => setStreakTick(t => t + 1)} />
        </div>
        {endPhrase && (
          <SessionEndOverlay
            phrase={endPhrase}
            sessionId={endingSessionId}
            onComplete={handleEndComplete}
          />
        )}
        {recentBadges.length > 0 && (
          <BadgeToast
            badge={recentBadges[0]}
            onDone={() => setRecentBadges(b => b.slice(1))}
          />
        )}
        {completedBlock && (
          <BlockCompleteModal
            block={completedBlock}
            onClose={() => { setCompletedBlock(null); play(soundBell); }}
          />
        )}
        {council && (
          <CouncilOverlay recap={council} onClose={closeCouncil} />
        )}
        {showBreath && (
          <BreathOverlay onClose={() => setShowBreath(false)} />
        )}
      </>
    );
  };

  const DayCard = ({ day, programme, isToday, onTap }) => {
    const exos = programme || [];
    const isClickable = day.strength && exos.length > 0;
    const accentColor = isToday ? 'var(--accent-laurel)' : day.strength ? 'var(--text-primary)' : 'var(--text-secondary)';
    return (
      <button
        type="button"
        onClick={isClickable ? onTap : undefined}
        disabled={!isClickable}
        style={{
          width: '100%',
          textAlign: 'left',
          background: 'var(--bg-surface)',
          border: `1px solid ${isToday ? 'var(--accent-laurel)' : 'var(--border-subtle)'}`,
          borderRadius: 14,
          padding: 14,
          marginTop: 10,
          color: 'inherit',
          cursor: isClickable ? 'pointer' : 'default',
          opacity: day.strength ? 1 : 0.6,
          transition: 'border-color var(--dur-fast) var(--ease-out)',
        }}
      >
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12, marginBottom: exos.length ? 10 : 0 }}>
          <div>
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
              {day.fr}
            </div>
            <div style={{ fontSize: 16, fontWeight: 800, color: accentColor, marginTop: 2 }}>
              {day.label}
            </div>
          </div>
          <div style={{ fontSize: 18, color: accentColor }} aria-label={isToday ? 'aujourd’hui' : ''}>
            {isToday ? '⏰' : day.strength ? '⏳' : '·'}
          </div>
        </div>
        {exos.length > 0 && (
          <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
            {exos.map(ex => (
              <li key={ex.id} style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                <span style={{ color: 'var(--text-tertiary)', marginRight: 6 }}>{ex.exerciseSlot}.</span>
                {ex.exerciseName}
              </li>
            ))}
          </ul>
        )}
      </button>
    );
  };

  const SemainePage = () => {
    const week = getCurrentWeek();
    const block = getCurrentBlock(week);
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const todayIdx = getCurrentWeekDayIdx();
    const navigate = useNavigate();
    const weekStats = useWeekStats(week);
    const semaineAttrs = useAttributes(0);

    // Build training days from WEEK_DAYS + real programme data
    const trainingDays = WEEK_DAYS.filter(d => (d.strength || d.userDefined) && d.sessionDay).map(d => {
      const exos = d.userDefined ? [] : ((programmeByDay && programmeByDay[d.sessionDay]) || []);
      const isToday = d.idx === todayIdx;
      const isPast = todayIdx === 0 ? d.idx < 7 : d.idx < todayIdx;
      return { ...d, exos, isToday, isPast };
    });

    // Progression opportunities — lifts present this week that have ATHX targets
    const weekExoNames = trainingDays.flatMap(d => d.exos.map(ex => ex.exerciseName));
    const liveStandards = useStandardsDisplay(0);
    const [bwSemaine, setBwSemaine] = useState(0);
    useEffect(() => { db.prefs.get('bodyweight').then(r => setBwSemaine(r?.value || 0)); }, []);
    const progressionOpps = SEED_ATHX_STANDARDS.map(std => {
      const athx = ATHX_STANDARDS.find(a => a.id === std.lift);
      if (!athx) return null;
      const hasLift = weekExoNames.some(n => athx.pattern.test(n));
      if (!hasLift) return null;
      const live = liveStandards ? liveStandards.find(s => s.id === std.lift) : null;
      const current = live ? live.bestE1RM : 0;
      const target = bwSemaine ? Math.round(bwSemaine * std.targetRatio * 10) / 10 : 0;
      const ratio = bwSemaine && current ? current / bwSemaine : 0;
      const gap = target - current;
      const weekTarget = Math.min(2.5, Math.max(0, gap));
      return { ...std, current, target, ratio, gap, weekTarget, liftName: athx.name };
    }).filter(Boolean);

    const totalVol = weekStats.volume;
    const totalPR = weekStats.prCount;
    const doneSessions = { length: weekStats.doneDays };
    const totalSessions = weekStats.totalDays;

    return (
      <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
        {/* Header tactique */}
        <div style={{ padding: 'var(--sp-5) 0 var(--sp-3)' }}>
          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
            color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
          }}>
            SEMAINE {week} · BLOC {block.id} · {block.name.toUpperCase()}
          </div>
          <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 10 }}>
            <BlockBeads total={block.weeks[1] - block.weeks[0] + 1} current={week - block.weeks[0] + 1} />
          </div>
        </div>

        {/* Stats highlights row */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 'var(--sp-3)', marginBottom: 'var(--sp-4)' }}>
          <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
            <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent-laurel)' }}>
              {totalVol ? `${(totalVol / 1000).toFixed(1)}k` : '—'}
            </div>
            <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>VOLUME</Inscription>
          </div>
          <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
            <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800 }}>
              {doneSessions.length}/{totalSessions}
            </div>
            <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>SESSIONS</Inscription>
          </div>
          <div className="ody-tablet" style={{ padding: 'var(--sp-3)', textAlign: 'center' }}>
            <div className="ody-tactical" style={{ fontSize: 20, fontWeight: 800, color: totalPR > 0 ? 'var(--accent-olympus)' : 'var(--text-primary)' }}>
              {totalPR > 0 ? `${totalPR} ★` : '—'}
            </div>
            <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>PR</Inscription>
          </div>
        </div>

        {/* Programme — each training day card */}
        <Inscription size="xs" style={{ color: 'var(--text-tertiary)', marginBottom: 'var(--sp-3)', display: 'block' }}>
          PROGRAMME · {trainingDays.length} SESSIONS
        </Inscription>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--sp-3)', marginBottom: 'var(--sp-4)' }}>
          {trainingDays.map(d => {
            const accent = d.isToday ? 'var(--accent-olympus)' : d.isPast ? 'var(--accent-laurel)' : 'var(--text-secondary)';
            return (
              <button key={d.idx} type="button"
                onClick={() => navigate(`${ROUTES.AUJOURDHUI}?day=${d.sessionDay}`)}
                className="ody-tablet" style={{
                  padding: 'var(--sp-3) var(--sp-4)', cursor: 'pointer', textAlign: 'left',
                  background: 'transparent', width: '100%',
                  borderColor: d.isToday ? 'rgba(232,160,32,0.3)' : d.isPast ? 'rgba(62,207,160,0.15)' : d.userDefined ? 'rgba(232,160,32,0.12)' : 'var(--border-subtle)',
                }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: d.exos.length ? 8 : 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--sp-3)' }}>
                    <span style={{
                      fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700,
                      color: accent, letterSpacing: '0.1em', minWidth: 28,
                    }}>{DAY_LABELS[d.idx]}</span>
                    <span style={{ fontSize: 14, fontWeight: 800, color: 'var(--text-primary)' }}>{d.label}</span>
                    {d.userDefined && (
                      <span style={{
                        fontSize: 8, fontWeight: 700, fontFamily: 'var(--font-mono)',
                        color: 'var(--accent-olympus)', letterSpacing: '0.1em',
                        border: '1px solid rgba(232,160,32,0.3)', borderRadius: 4,
                        padding: '1px 5px',
                      }}>PERSO</span>
                    )}
                  </div>
                  {d.isToday && <span style={{ fontSize: 9, fontWeight: 700, color: 'var(--accent-olympus)', textTransform: 'uppercase', letterSpacing: '0.1em' }}>Aujourd'hui</span>}
                  {d.isPast && !d.userDefined && <span style={{ fontSize: 9, fontWeight: 700, color: 'var(--accent-laurel)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Done</span>}
                </div>
                {d.exos.length > 0 && (
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px 10px', paddingLeft: 40 }}>
                    {d.exos.map(ex => {
                      const fmtId = detectFormat(ex.prescription, ex.exerciseName);
                      const fmtInfo = FORMAT_META[fmtId] || FORMAT_META.traditional;
                      return (
                        <span key={ex.id || ex.exerciseSlot} style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                          {ex.exerciseName}
                          {fmtInfo.label && <span style={{
                            fontSize: 8, fontWeight: 700, fontFamily: 'var(--font-mono)',
                            color: fmtInfo.color, opacity: 0.7, letterSpacing: '0.05em',
                          }}>{fmtInfo.label}</span>}
                        </span>
                      );
                    })}
                  </div>
                )}
              </button>
            );
          })}
        </div>

        {/* Objectifs — progression opportunities */}
        {progressionOpps.length > 0 && (
          <>
            <Inscription size="xs" style={{ color: 'var(--text-tertiary)', marginBottom: 'var(--sp-3)', display: 'block' }}>
              OBJECTIFS · PROGRESSION
            </Inscription>
            <div className="ody-tablet" style={{ padding: 'var(--sp-4)', marginBottom: 'var(--sp-4)' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--sp-4)' }}>
                {progressionOpps.map(opp => {
                  const pct = opp.target > 0 ? Math.min(1, opp.current / opp.target) : 0;
                  const isClose = pct >= 0.9;
                  return (
                    <div key={opp.lift}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{opp.liftName}</span>
                        <span className="ody-tactical" style={{
                          fontSize: 11, fontWeight: 700,
                          color: isClose ? 'var(--accent-olympus)' : 'var(--accent-laurel)',
                        }}>
                          {opp.current ? Math.round(opp.current) : '—'} → {opp.target ? Math.round(opp.target) : '—'}kg
                        </span>
                      </div>
                      <div style={{ height: 4, background: 'var(--bg-surface)', borderRadius: 2, overflow: 'hidden', marginBottom: 4 }}>
                        <div style={{
                          width: `${pct * 100}%`, height: '100%', borderRadius: 2,
                          background: isClose ? 'var(--accent-olympus)' : 'var(--accent-laurel)',
                        }} />
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>
                        {isClose
                          ? `A ${Math.round(opp.gap)}kg du standard ATHX — vise +${opp.weekTarget}kg`

     ========================================================== */
  const BreathOverlay = ({ onClose }) => {
    const PHASES = [
      { label: 'Inspire', dur: 4000, scale: 1.4 },
      { label: 'Tiens',   dur: 4000, scale: 1.4 },
      { label: 'Expire',  dur: 4000, scale: 0.8 },

    const TOTAL_CYCLES = 5;
    const [cycle, setCycle] = useState(0);
    const [phaseIdx, setPhaseIdx] = useState(0);

    useEffect(() => {
      if (cycle >= TOTAL_CYCLES) return;
      const phase = PHASES[phaseIdx];
      const t = setTimeout(() => {
        const next = (phaseIdx + 1) % PHASES.length;
        if (next === 0) setCycle(c => c + 1);
        setPhaseIdx(next);
      }, phase.dur);
      return () => clearTimeout(t);
    }, [phaseIdx, cycle]);

    const phase = PHASES[phaseIdx];
    const finished = cycle >= TOTAL_CYCLES;

    return (
      <div style={{
        position: 'fixed', inset: 0, zIndex: 240,
        background: 'rgba(8,10,9,0.97)',
        display: 'flex',
        flexDirection: 'column',

            <div className="greek" style={{
              fontSize: 22,

        <button type="button" onClick={onClose}

  /* ==========================================================
     Les Sirènes (SPEC §11 Étape 13) — anti-distraction
     Si une session est démarrée et quittée sans rien logger pendant
     20 min, notif in-app subtile : "Les Sirènes t'appellent. Reviens
     au mât." Bienveillant, mythologique, recadre.
     ========================================================== */
  const SIRENS_IDLE_MS = 20 * 60 * 1000;

  // Hook : surveille le temps écoulé depuis le dernier set validé sur la
  // session du jour (avec sets[] dispo). Si > 20 min ET dernier set < 60 min
  // ET on est revenu sur l'app (visibilitychange), affiche le warning.
  const useSirensWarning = (setsBySlot, sessionDay) => {
    const [show, setShow] = useState(false);
    useEffect(() => {
      if (!setsBySlot) return;
      // Le set le plus récent
      const allSetsForDay = Object.values(setsBySlot).flat();
      if (allSetsForDay.length === 0) return; // session pas démarrée

      const latest = allSetsForDay.reduce((m, s) =>
        (new Date(s.completedAt) > new Date(m.completedAt)) ? s : m,
        allSetsForDay[0]);
      if (!latest?.completedAt) return;

      const checkIdle = () => {
        const ms = Date.now() - new Date(latest.completedAt).getTime();
        if (ms > SIRENS_IDLE_MS && ms < 4 * SIRENS_IDLE_MS) {
          setShow(true);
        }
      };

      // Check au focus / visibilitychange (l'utilisateur revient sur l'app)
      const onVis = () => { if (!document.hidden) checkIdle(); };
      document.addEventListener('visibilitychange', onVis);
      window.addEventListener('focus', onVis);
      // Check une fois immédiatement
      checkIdle();
      return () => {
        document.removeEventListener('visibilitychange', onVis);
        window.removeEventListener('focus', onVis);
      };
    }, [setsBySlot, sessionDay]);
    return [show, () => setShow(false)];
  };

  const SirensWarning = ({ onDismiss }) => (
    <div style={{
      marginTop: 10,
      padding: '14px 16px',

  const REWARD_MILESTONES = [

    { id: 'block_2_done', label: 'Bloc 2 — Cyclope vaincu' },

  const useRewards = (refreshKey = 0) => {

    useEffect(() => {
      let alive = true;
      db.rewards.toArray().then(rows => {

        const map = {};
        for (const r of rows) map[r.milestoneId] = r;
        setByMilestone(map);
      });
      return () => { alive = false; };
    }, [refreshKey]);
    return byMilestone;
  };

  async function saveReward(milestoneId, description) {
    const existing = await db.rewards.where('milestoneId').equals(milestoneId).first();
    if (existing) {
      await db.rewards.update(existing.id, { description });
    } else {
      await db.rewards.add({ milestoneId, description, unlockedAt: null, claimedAt: null });

  /* ==========================================================

     Tous les dimanches, écran spécial à l'ouverture : récap visuel de la

     ========================================================== */
  async function shouldShowCouncil() {
    if (new Date().getDay() !== 0) return false; // dimanche uniquement
    const today = new Date().toISOString().slice(0, 10);
    const last = await db.prefs.get('lastCouncilSeen');
    return last?.value !== today;
