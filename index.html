<head>

  <!-- Fonts : Plus Jakarta Sans (texte) + EB Garamond italic (grec ancien) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />

  <style>
    /* ==========================================================
       Design tokens — Odyssea (SPEC v3 §Niveau 1)
       Tokens renommés mythologiquement, mêmes hex que mobility-dashboard.
       ========================================================== */
    :root {
      /* Backgrounds */
      --bg-primary: #0D0F0E;
      --bg-surface: #111412;
      --bg-surface-hover: #141815;

      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.10);
      --border-active: #1A1E1C;

      /* Accents — mythologie */
      --accent-laurel:  #3ECFA0;  /* succès, set validé, victoire mortelle */
      --accent-olympus: #E8A020;  /* divin, PR battu, rang supérieur */
      --accent-royal:   #B990E0;  /* noble, info, achievement */
      --accent-blood:   #E05A4A;  /* sacrifice, recul, danger */

      /* Text */
      --text-primary:   #F5F5F3;
      --text-secondary: #7A7C7A;
      --text-tertiary:  #4A4D4B;

      /* Streak ranks (Mortel→Olympien) */
      --rank-mortel:    #7A7C7A;
      --rank-hoplite:   #CD8032;
      --rank-stratege:  #A8A8BE;
      --rank-heros:     #DAA520;
      --rank-demidieu:  #B8E0F8;
      --rank-olympien:  #C39BD3;

      /* Typography */
      --font-sans:  'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-greek: 'EB Garamond', 'Times New Roman', Georgia, serif;

      /* Layout */
      --bottom-nav-h: 72px;
      --max-app-width: 430px;

      /* Motion */
      --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
      --dur-fast: 0.15s;
      --dur-normal: 0.25s;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: none;
    }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input, textarea, select { font-family: inherit; color: inherit; }

    .greek { font-family: var(--font-greek); font-style: italic; }

    .app-shell {
      min-height: 100%;
      max-width: var(--max-app-width);
      margin: 0 auto;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: env(safe-area-inset-top, 0px);
      box-sizing: border-box;
    }
    .app-main {
      flex: 1 1 auto;
      padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0px));
      min-height: 0;
    }
    .app-main--no-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    button, [role="button"] { min-height: 44px; }
    .tap-area { min-width: 44px; min-height: 44px; }

    #boot-loader {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--bg-primary);
      color: var(--accent-olympus);
      font-family: var(--font-greek);
      font-style: italic;
      font-size: 48px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- ============================================================
       VENDOR (CDN) — React 18 + Babel standalone + Dexie (IndexedDB)
       ============================================================ -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://unpkg.com/dexie@4.0.10/dist/dexie.min.js"></script>

  <!-- ============================================================
       APPLICATION
       ============================================================ -->
  <script type="text/babel" data-presets="react">
  const { useState, useEffect, useMemo, useContext, createContext, useCallback } = React;

  /* ==========================================================
     CONST API (SPEC v3 §API)
     ========================================================== */
  const API_URL = 'https://script.google.com/macros/s/AKfycbxsOdnNAEmyONDJYYkCWwQjK5bX6HunFQ3auV_pInSTzoz-GE5rEfdHr9SeZ2Gvwei7oQ/exec';
  const ATHX_DATE = '2026-09-19';

  const ROUTES = {
    AUJOURDHUI: '/aujourdhui',
    SEMAINE:    '/semaine',
    STATS:      '/stats',
    REGLAGES:   '/reglages',
  };
  const DEFAULT_ROUTE = ROUTES.AUJOURDHUI;

  /* ==========================================================
     CATALOGUE STATIQUE — Mythologie (SPEC v3 §Niveau 2 + v4 patch)
     ========================================================== */
  // Blocks renommés (v4 patch — Lotophages en B1, pattern de drop documenté)
  const BLOCKS = [
    { id: 1, name: 'Les Lotophages', weeks: [1,  6]  },
    { id: 2, name: 'Le Cyclope',     weeks: [7,  12] },
    { id: 3, name: 'Circé',          weeks: [13, 16] },
    { id: 4, name: 'Ithaque',        weeks: [17, 20] },
  ];

  // Streak ranks Mortel → Olympien
  const STREAK_RANKS = [
    { min: 0,   name: 'Mortel',    token: 'var(--rank-mortel)'   },
    { min: 7,   name: 'Hoplite',   token: 'var(--rank-hoplite)'  },
    { min: 14,  name: 'Stratège',  token: 'var(--rank-stratege)' },
    { min: 30,  name: 'Héros',     token: 'var(--rank-heros)'    },
    { min: 60,  name: 'Demi-dieu', token: 'var(--rank-demidieu)' },
    { min: 100, name: 'Olympien',  token: 'var(--rank-olympien)' },
  ];

  // BADGES (SPEC §7.3) — catalogue des achievements.
  // Chaque badge a un check() async qui peut lire ctx (passé par checkBadges).
  // Trigger : appelés après TERMINER (session_complete) ou VALIDER SET (set_validated).
  // Atlas/Achille requièrent un bodyweight stocké en prefs (saisi dans /reglages).
  const BADGES = [
    {
      id: 'first_step',
      name: 'Premier Pas',
      description: '1ère session complétée',
      glyph: 'Α',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt);
      },
    },
    {
      id: 'atlas',
      name: 'Atlas',
      description: 'Squat 2× BW soulevé',
      glyph: 'Β',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /squat/i.test(s.exerciseName || '') && s.weight >= 2 * ctx.bodyweight);
      },
    },
    {
      id: 'achille',
      name: 'Achille',
      description: 'Bench 1× BW soulevé',
      glyph: 'Γ',
      check: async (ctx) => {
        if (!ctx.bodyweight) return false;
        const sets = await db.sets.toArray();
        return sets.some(s => /bench/i.test(s.exerciseName || '') && s.weight >= ctx.bodyweight);
      },
    },
    {
      id: 'sirenes',
      name: 'Sirènes',
      description: 'Reprise après break streak',
      glyph: 'Δ',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak > 0 && s.longestStreak > s.currentStreak;
      },
    },
    {
      id: 'heracles',
      name: 'Héraclès',
      description: '12 sessions consécutives',
      glyph: 'Ε',
      check: async () => {
        const s = await getStreak();
        return s.currentStreak >= 12;
      },
    },
    {
      id: 'arc_ulysse',
      name: "L'Arc d'Ulysse",
      description: 'Bloc 4 démarré',
      glyph: 'Ζ',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.some(s => s.completedAt && s.week >= 17);
      },
    },
    {
      id: 'penelope',
      name: 'Pénélope',
      description: '100 sessions cumulées',
      glyph: 'Η',
      check: async () => {
        const sessions = await db.sessions.toArray();
        return sessions.filter(s => s.completedAt).length >= 100;
      },
    },
    {
      id: 'ithaque',
      name: 'Ithaque',
      description: 'ATHX complété',
      glyph: 'Θ',
      check: async () => {
        const today = new Date();
        return today >= new Date(ATHX_DATE + 'T00:00:00');
      },
    },
  ];

  // Pool de phrases fin de session (v4 patch §Microcopy variable)
  const SESSION_END_PHRASES = [
    "Endure, mon cœur.",
    "Mètis intacte.",
    "Thumos plein.",
    "Kléos accroît.",
    "Cyclope aveuglé.",
    "Sirènes ignorées.",
    "Lotophages dépassés.",
    "Calypso quittée.",
    "Le mât tenu.",
    "Athéna veille.",
    "Pénélope tisse.",
    "Argos se souvient.",
    "Cap sur Ithaque.",
    "L'arc se tend.",
  ];

  /* ==========================================================
     SESSION DAY LAYOUT — 7 jours de la semaine
     Mon/Wed/Fri/Sat = strength (sessionDay côté API)
     Tue/Thu/Sun = light/off (label uniquement, pas de programme API)
     ========================================================== */
  const PROGRAMME_START = '2026-05-11'; // Lundi 11 mai 2026 = J1 Block 1 Sem 1

  const WEEK_DAYS = [
    { idx: 1, fr: 'Lundi',    en: 'Monday',    sessionDay: 'Monday',    label: 'Strength 1',           strength: true  },
    { idx: 2, fr: 'Mardi',    en: 'Tuesday',   sessionDay: null,        label: 'Aérobie + bras + abs', strength: false },
    { idx: 3, fr: 'Mercredi', en: 'Wednesday', sessionDay: 'Wednesday', label: 'Strength 2',           strength: true  },
    { idx: 4, fr: 'Jeudi',    en: 'Thursday',  sessionDay: null,        label: 'Sprints + Anaérobie',  strength: false },
    { idx: 5, fr: 'Vendredi', en: 'Friday',    sessionDay: 'Friday',    label: 'Strength 3',           strength: true  },
    { idx: 6, fr: 'Samedi',   en: 'Saturday',  sessionDay: 'Saturday',  label: 'Upper Body',           strength: true  },
    { idx: 0, fr: 'Dimanche', en: 'Sunday',    sessionDay: null,        label: 'Off / Light',          strength: false },
  ];

  /* ==========================================================
     UTILS
     ========================================================== */
  const daysUntil = (isoDate) => {
    const target = new Date(isoDate + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.max(0, Math.round((target - now) / 86400000));
  };

  // Semaine courante (1..20). Pré-démarrage = 1, post-fin = 20.
  const getCurrentWeek = () => {
    const start = new Date(PROGRAMME_START + 'T00:00:00');
    const now = new Date();
    if (now < start) return 1;
    const days = Math.floor((now - start) / 86400000);
    return Math.max(1, Math.min(20, Math.floor(days / 7) + 1));
  };

  // Jour courant en idx 0..6 (dimanche..samedi convention JS).
  const getCurrentWeekDayIdx = () => new Date().getDay();

  const getCurrentBlock = (week) => {
    return BLOCKS.find(b => week >= b.weeks[0] && week <= b.weeks[1]) || BLOCKS[0];
  };

  const getRank = (streak) => {
    let current = STREAK_RANKS[0];
    for (const rank of STREAK_RANKS) {
      if (streak >= rank.min) current = rank;
    }
    return current;
  };

  /* ==========================================================
     CALCULS (SPEC v5 §10)
     ========================================================== */
  const epley = (weight, reps) => weight * (1 + 0.0333 * reps);

  // Stress Index : (weight/e1RM_known) × reps × f_rir.
  // Si pas d'e1RM_known, on utilise l'e1RM du set lui-même (fallback)
  // — donne une valeur "interne" au set, comparable entre sets de même exo.
  const stressIndex = (weight, reps, rir, e1RMKnown) => {
    const ref = e1RMKnown || epley(weight, reps);
    const fRir = 1 + 1 / ((rir || 0) + 1);
    return (weight / ref) * reps * fRir;
  };

  const volumeLoad = (sets) => sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);

  // Best e1RM parmi un tableau de sets (ignore null/undefined).
  const bestE1RM = (sets) => sets.reduce((m, s) => (s.e1RM > m ? s.e1RM : m), 0);

  // Round à 0.5 (utile pour les steppers fractionnaires).
  const round05 = (x) => Math.round(x * 2) / 2;

  /* ==========================================================
     DATA LAYER — Dexie / IndexedDB (SPEC v5 §9)
     Schéma complet anticipé pour Phase 2 et 3 (évite migrations lourdes).
     ========================================================== */
  const db = new Dexie('Odyssea');
  db.version(1).stores({
    sets:         '++id, [week+sessionDay+exerciseSlot+setNumber], week, sessionDay, exerciseSlot, completedAt, syncedAt',
    sessions:     '++id, [week+sessionDay], week, sessionDay, completedAt, syncedAt',
    programme:    '++id, [week+sessionDay+exerciseSlot], block, week, sessionDay',
    oneRMs:       '++id, exerciseName, computedAt',
    streak:       '++id',
    badges:       '++id, badgeId, unlockedAt',
    prefs:        'key',
    rewards:      '++id, milestoneId, unlockedAt, claimedAt',
    mantrasSeen:  '++id, mantraId, seenAt',
    moods:        '++id, sessionId, loggedAt',
  });

  // Singleton de protection contre les seeds concurrents au boot.
  let seedInFlight = null;

  // Seed du `programme` table depuis l'API si vide. Idempotent : no-op
  // si déjà rempli. En cas d'erreur réseau, on ne marque rien et on
  // retentera au prochain démarrage.
  async function seedIfEmpty() {
    if (seedInFlight) return seedInFlight;
    seedInFlight = (async () => {
      const count = await db.programme.count();
      if (count > 0) return { ok: true, skipped: true, count };
      try {
        // CRITIQUE : pas de Content-Type explicite. Apps Script fait du
        // 302 → script.googleusercontent.com sur les POST. application/json
        // déclenche un preflight CORS qu'Apps Script ne gère pas → fail.
        // text/plain (default fetch) = "simple request" → pas de preflight.
        // Apps Script lit `e.postData.contents` en raw, le JSON.parse marche.
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'readWeek', week: 1 }),
        });
        const data = await res.json();
        if (!data || !data.ok || !data.sessions) {
          throw new Error(data && data.error || 'Réponse API invalide');
        }
        const block = getCurrentBlock(1).id;
        const rows = [];
        for (const sess of data.sessions) {
          for (const ex of (sess.exercises || [])) {
            rows.push({
              block,
              week: data.week,
              sessionDay: sess.day,
              exerciseSlot: ex.slot,
              exerciseName: ex.name || '',
              prescription: ex.prescription || '',
            });
          }
        }
        await db.programme.bulkAdd(rows);
        await db.prefs.put({ key: 'lastSeedAt', value: new Date().toISOString() });
        return { ok: true, count: rows.length };
      } catch (e) {
        await db.prefs.put({ key: 'lastSeedError', value: { message: String(e), at: new Date().toISOString() } });
        return { ok: false, error: String(e) };
      }
    })();
    try { return await seedInFlight; } finally { seedInFlight = null; }
  }

  // Hook : lit le programme d'une semaine groupé par jour.
  // Reactif sur `week` ; rafraîchit aussi quand un seed se termine.
  const useWeekProgramme = (week, refreshKey = 0) => {
    const [byDay, setByDay] = useState(null);
    useEffect(() => {
      let alive = true;
      db.programme.where('week').equals(week).toArray().then(rows => {
        if (!alive) return;
        rows.sort((a, b) => a.exerciseSlot - b.exerciseSlot);
        const grouped = {};
        for (const r of rows) (grouped[r.sessionDay] ||= []).push(r);
        setByDay(grouped);
      });
      return () => { alive = false; };
    }, [week, refreshKey]);
    return byDay;
  };

  // Hook : lit tous les sets d'une session (week+sessionDay), groupés par
  // exerciseSlot, triés par setNumber. Renvoie [setsBySlot, refresh].
  const useSetsForDay = (week, sessionDay) => {
    const [bySlot, setBySlot] = useState(null);
    const [tick, setTick] = useState(0);
    const refresh = useCallback(() => setTick(t => t + 1), []);
    useEffect(() => {
      if (!sessionDay) { setBySlot({}); return; }
      let alive = true;
      db.sets.where('week').equals(week).toArray().then(all => {
        if (!alive) return;
        const filtered = all.filter(s => s.sessionDay === sessionDay);
        filtered.sort((a, b) => (a.exerciseSlot - b.exerciseSlot) || (a.setNumber - b.setNumber));
        const grouped = {};
        for (const s of filtered) (grouped[s.exerciseSlot] ||= []).push(s);
        setBySlot(grouped);
      });
      return () => { alive = false; };
    }, [week, sessionDay, tick]);
    return [bySlot, refresh];
  };

  /* ==========================================================
     SYNC LAYER — POST writeSet vers Apps Script
     ========================================================== */
  async function postWriteSet(set) {
    // CORS-safe : pas de Content-Type explicite (cf. seedIfEmpty).
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'writeSet',
        week: set.week,
        sessionDay: set.sessionDay,
        exerciseSlot: set.exerciseSlot,
        setNumber: set.setNumber,
        weight: set.weight,
        reps: set.reps,
        rir: set.rir,
      }),
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || 'writeSet failed');
    return data;
  }

  // Sync de tous les sets non-syncés. Retourne {success, fail}.
  // Appelé au boot (si online) et à chaque tap TERMINER.
  async function syncPendingSets() {
    if (!navigator.onLine) return { success: 0, fail: 0, skipped: 'offline' };
    const all = await db.sets.toArray();
    const unsynced = all.filter(s => !s.syncedAt);
    let success = 0, fail = 0;
    for (const set of unsynced) {
      try {
        await postWriteSet(set);
        await db.sets.update(set.id, { syncedAt: new Date().toISOString() });
        success++;
      } catch (e) {
        fail++;
      }
    }
    return { success, fail, total: unsynced.length };
  }

  /* ==========================================================
     STREAK SYSTEM (SPEC v5 §7.2)
     - Tolérance 4 jours : ≤ 4 j sans session = streak continue
     - > 4 j sans session = streak break, repart à 1
     - 1 incrément par jour max (multiples sessions/jour ne cumulent pas)
     ========================================================== */
  const STREAK_BREAK_THRESHOLD = 4; // jours
  const STREAK_WARN_THRESHOLD = 3;  // alerte Lotophages à J3

  async function getStreak() {
    let row = await db.streak.get(1);
    if (!row) {
      row = {
        id: 1,
        currentStreak: 0,
        longestStreak: 0,
        lastSessionDate: null,
        currentRank: STREAK_RANKS[0].name,
        pardonsAvailable: 0,
        pardonsUsed: 0,
      };
      await db.streak.put(row);
    }
    return row;
  }

  // Bump streak après une session validée. Retourne le nouveau streak.
  async function bumpStreak() {
    const todayIso = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    const row = await getStreak();
    if (row.lastSessionDate === todayIso) return row; // déjà bumpé aujourd'hui
    let next = 1;
    if (row.lastSessionDate) {
      const last = new Date(row.lastSessionDate);
      const today = new Date(todayIso);
      const days = Math.round((today - last) / 86400000);
      next = days > STREAK_BREAK_THRESHOLD ? 1 : (row.currentStreak + 1);
    }
    const updated = {
      ...row,
      currentStreak: next,
      longestStreak: Math.max(row.longestStreak, next),
      lastSessionDate: todayIso,
      currentRank: getRank(next).name,
    };
    await db.streak.put(updated);
    return updated;
  }

  // À J3 sans session strength : warning "Ne sois pas Ulysse aux Lotophages"
  function daysSinceLastSession(streak) {
    if (!streak?.lastSessionDate) return null;
    const last = new Date(streak.lastSessionDate);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((today - last) / 86400000);
  }

  /* ==========================================================
     BADGES — DB helpers + checkBadges + lazy confetti loader
     ========================================================== */
  async function unlockedBadgeIds() {
    const rows = await db.badges.toArray();
    return new Set(rows.map(r => r.badgeId));
  }

  async function getBodyweight() {
    const row = await db.prefs.get('bodyweight');
    return row?.value || null;
  }

  // Vérifie tous les badges non encore unlock. Renvoie les nouveaux.
  // À appeler après les events qui peuvent déclencher : session_complete, set_validated.
  async function checkBadges() {
    const unlocked = await unlockedBadgeIds();
    const ctx = { bodyweight: await getBodyweight() };
    const newly = [];
    for (const badge of BADGES) {
      if (unlocked.has(badge.id)) continue;
      try {
        if (await badge.check(ctx)) {
          await db.badges.add({ badgeId: badge.id, unlockedAt: new Date().toISOString() });
          newly.push(badge);
        }
      } catch {}
    }
    return newly;

  // Confetti — lazy load CDN au 1er trigger pour ne pas alourdir le boot.
  let _confettiPromise = null;
  function loadConfetti() {
    if (_confettiPromise) return _confettiPromise;
    _confettiPromise = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js';
      s.onload = () => resolve(window.confetti);
      s.onerror = () => { _confettiPromise = null; reject(new Error('confetti load failed')); };
      document.head.appendChild(s);
    });
    return _confettiPromise;
  }

  async function fireConfetti() {
    try {
      const confetti = await loadConfetti();
      confetti({
        particleCount: 70,
        spread: 75,
        origin: { y: 0.6 },
        colors: ['#E8A020', '#3ECFA0', '#F5F5F3', '#B990E0'],

     ========================================================== */
  async function pickEndPhrase() {
    const last = await db.prefs.get('lastEndPhrase');
    const lastValue = last?.value;
    const candidates = SESSION_END_PHRASES.filter(p => p !== lastValue);
    const phrase = candidates[Math.floor(Math.random() * candidates.length)];
    await db.prefs.put({ key: 'lastEndPhrase', value: phrase });
    return phrase;

  // Hook : meilleur set (par e1RM) de la semaine précédente pour un exo
  // donné. Sert au bandeau "Sem -1" sur ExoCard. Renvoie {none:true} si rien.
  const useLastWeekBest = (exerciseName, currentWeek) => {
    const [state, setState] = useState(null);
    useEffect(() => {
      if (currentWeek <= 1 || !exerciseName) { setState({ none: true }); return; }
      let alive = true;
      db.sets.where('week').equals(currentWeek - 1).toArray().then(rows => {
        if (!alive) return;
        const matches = rows.filter(s => s.exerciseName === exerciseName && s.e1RM);
        if (!matches.length) { setState({ none: true }); return; }
        setState(matches.reduce((m, s) => (s.e1RM > m.e1RM ? s : m), matches[0]));
      });
      return () => { alive = false; };
    }, [exerciseName, currentWeek]);
    return state;
  };

  // Hook : tous les badges unlocked (pour /stats).
  const useUnlockedBadges = (refreshKey = 0) => {
    const [unlocked, setUnlocked] = useState(null);
    useEffect(() => {
      let alive = true;
      db.badges.toArray().then(rows => {
        if (!alive) return;
        const map = {};
        for (const r of rows) map[r.badgeId] = r;
        setUnlocked(map);
      });
      return () => { alive = false; };
    }, [refreshKey]);
    return unlocked;
  };

  // Pour le Wall of PRs sur /stats.
  const useAllPRs = (refreshKey = 0) => {
    const [prs, setPRs] = useState(null);
    useEffect(() => {
      let alive = true;
      db.sets.toArray().then(rows => {
        if (!alive) return;
        const filtered = rows.filter(s => s.isPR && s.completedAt);
        filtered.sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
        setPRs(filtered);

      return () => { alive = false; };

    useEffect(() => {
      if (!exerciseName) return;
      let alive = true;
      db.sets.toArray().then(all => {

  const parseHash = () => {
    const raw = (window.location.hash || '').replace(/^#/, '');
    const [pathRaw, queryRaw = ''] = raw.split('?');
    const path = pathRaw || DEFAULT_ROUTE;
    const query = {};
    if (queryRaw) {
      queryRaw.split('&').forEach(pair => {
        if (!pair) return;
        const [k, v = ''] = pair.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v);
      });
    }
    return { path, query };
  };

  const HashRouter = ({ children }) => {
    const [state, setState] = useState(parseHash);
    useEffect(() => {
      const onHash = () => setState(parseHash());
      window.addEventListener('hashchange', onHash);
      if (!window.location.hash) {
        window.location.hash = '#' + DEFAULT_ROUTE;
      }
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const navigate = useCallback((to, opts = {}) => {
      const target = to.startsWith('#') ? to : '#' + to;
      if (opts.replace) {
        const newUrl = window.location.pathname + window.location.search + target;
        window.history.replaceState(null, '', newUrl);
        setState(parseHash());
      } else {
        window.location.hash = target;
      }
    }, []);

    return (
      <RouterContext.Provider value={{ ...state, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  };

    const wildcard = routes.find(r => r.props.path === '*');
    return wildcard ? wildcard.props.element : null;

              border: `1.5px solid ${selected ? 'var(--accent-laurel)' : 'var(--border-strong)'}`,
              color: selected ? '#0D0F0E' : 'var(--text-secondary)',
              fontSize: 14,
              fontWeight: 800,
              cursor: 'pointer',
              transition: 'all var(--dur-fast) var(--ease-out)',
            }}
          >{n}</button>
        );
      })}
    </div>
  );

  /* ==========================================================
     PAGES — mocks Mardi.
     - /aujourdhui → Mer/Jeu : steppers, saisie set, calculs live
     - /semaine    → Mer : 7 cards jour, statuts
     - /stats      → Jeu/Ven : e1RM par exo + delta + (badges N3)
     - /reglages   → Ven : ATHX date, sons, reset, export
     ========================================================== */
  // ExoCard : 1 carte par exo, accordéon, saisie set complète.
  const ExoCard = ({ ex, week, sessionDay, sets, isOpen, onToggle, onSetValidated, onBadgesUnlocked }) => {
    const lastSet = sets && sets.length ? sets[sets.length - 1] : null;
    // Pré-remplit weight/reps avec les valeurs du dernier set, ou défauts.
    const [weight, setWeight] = useState(() => lastSet?.weight ?? 0);
    const [reps, setReps] = useState(() => lastSet?.reps ?? 5);
    const [rir, setRir] = useState(() => lastSet?.rir ?? 2);

    // À l'ouverture après une validation, refléter le dernier set saisi.
    useEffect(() => {
      if (lastSet) {
        setWeight(lastSet.weight);
        setReps(lastSet.reps);
        setRir(lastSet.rir);
      }
    }, [lastSet?.id]);

    const historicalBest = useBestE1RMFor(ex.exerciseName, sets?.length || 0);
    const lastWeekBest = useLastWeekBest(ex.exerciseName, week);
    const previewE1RM = weight > 0 && reps > 0 ? round05(epley(weight, reps)) : 0;
    const previewSI = weight > 0 && reps > 0 ? stressIndex(weight, reps, rir, historicalBest || previewE1RM) : 0;
    const sessionVL = volumeLoad(sets || []);
    const sessionBest = bestE1RM(sets || []);

    const nextSetNumber = (sets?.length || 0) + 1;
    // PR aperçu : preview > meilleur e1RM historique (TOUTES sessions confondues
    // pour cet exo). Premier set ever : pas de PR (historicalBest = 0).
    const isPreviewPR = historicalBest != null && historicalBest > 0 && previewE1RM > historicalBest;

    // Flash visuel sur le bouton (cross-platform, marche sur iOS contrairement
    // à navigator.vibrate qui n'existe pas sur Safari/iOS PWA).
    const [flash, setFlash] = useState(false);

    const validate = async () => {
      if (weight <= 0 || reps <= 0) return;
      const e1RM = round05(epley(weight, reps));
      const isPR = historicalBest != null && historicalBest > 0 && e1RM > historicalBest;
      await db.sets.add({
        week,
        sessionDay,
        exerciseSlot: ex.exerciseSlot,
        exerciseName: ex.exerciseName,
        setNumber: nextSetNumber,
        weight, reps, rir,
        e1RM,
        isPR,
        completedAt: new Date().toISOString(),
        syncedAt: null,
      });
      // Haptic Android (no-op silencieux sur iOS — la Web Vibration API n'y
      // est pas implémentée par Apple).
      try { navigator.vibrate && navigator.vibrate(isPR ? [30, 50, 60] : 20); } catch {}
      // Confetti sur PR — lazy load la lib la 1ère fois.
      if (isPR) fireConfetti();
      // Check badges set-based (Atlas / Achille déclenchables ici)
      checkBadges().then(newly => { if (newly.length) onBadgesUnlocked(newly); });
      // Flash 250ms — feedback visuel garanti sur toute plateforme.
      setFlash(true);
      setTimeout(() => setFlash(false), 250);
      onSetValidated();
    };

    return (
      <Card style={{ marginTop: 12, padding: 0, overflow: 'hidden' }}>
        <button
          type="button"
          onClick={onToggle}
          style={{
            width: '100%',
            background: 'transparent',
            border: 'none',
            color: 'inherit',
            textAlign: 'left',
            padding: '14px 16px',
            cursor: 'pointer',
            display: 'flex',
            alignItems: 'baseline',
            justifyContent: 'space-between',
            gap: 12,
          }}
        >
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
              Slot {ex.exerciseSlot}{sets && sets.length > 0 && ` · ${sets.length} set${sets.length > 1 ? 's' : ''}`}
            </div>
            <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--text-primary)', marginTop: 2 }}>
              {ex.exerciseName}
            </div>
          </div>
          <span style={{ fontSize: 16, color: 'var(--text-secondary)', flex: '0 0 auto' }}>
            {isOpen ? '▾' : '▸'}
          </span>
        </button>

        {isOpen && (
          <div style={{ padding: '0 16px 16px' }}>
            {ex.prescription && (
              <div style={{
                fontSize: 12,
                color: 'var(--text-secondary)',
                whiteSpace: 'pre-line',
                lineHeight: 1.55,
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-subtle)',
                borderRadius: 10,
                padding: '10px 12px',
                marginBottom: 12,
              }}>{ex.prescription}</div>
            )}

            {/* Bandeau Sem -1 — apparaît dès la S2 si historique dispo */}
            {lastWeekBest && !lastWeekBest.none && (
              <div style={{
                fontSize: 12,
                color: 'var(--text-secondary)',
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-subtle)',
                borderLeft: '3px solid var(--accent-royal)',
                borderRadius: 10,
                padding: '8px 12px',
                marginBottom: 12,
                display: 'flex',
                alignItems: 'baseline',
                gap: 8,
              }}>
                <span style={{ color: 'var(--accent-royal)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '1.2px', fontWeight: 700 }}>Sem −1</span>
                <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{lastWeekBest.weight} kg</span>
                <span>×{lastWeekBest.reps}</span>
                <span style={{ fontSize: 11 }}>RIR {lastWeekBest.rir}</span>
                <span style={{ flex: 1 }} />
                <span style={{ color: 'var(--accent-laurel)', fontSize: 11, fontWeight: 700 }}>e1RM {lastWeekBest.e1RM}</span>
              </div>
            )}

            {/* Bandeau live e1RM + Volume Load (mis à jour à chaque set validé) */}
            {sets && sets.length > 0 && (
              <div style={{
                display: 'flex',
                gap: 12,
                fontSize: 12,
                color: 'var(--text-secondary)',
                marginBottom: 12,
                paddingBottom: 12,
                borderBottom: '1px solid var(--border-subtle)',
              }}>
                <div>
                  <span style={{ color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: 10, fontWeight: 700 }}>e1RM session </span>
                  <span style={{ color: 'var(--accent-laurel)', fontWeight: 800, fontSize: 14 }}>{sessionBest} kg</span>
                </div>
                <div>
                  <span style={{ color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: 10, fontWeight: 700 }}>VL </span>
                  <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{Math.round(sessionVL)} kg</span>
                </div>
              </div>
            )}

            {/* Liste des sets validés (badges) */}
            {sets && sets.length > 0 && (
              <ul style={{ margin: '0 0 14px', padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 6 }}>
                {sets.map(s => {
                  return (
                    <li key={s.id} style={{
                      display: 'flex', alignItems: 'center', gap: 10,
                      fontSize: 13,
                      padding: '8px 12px',
                      background: s.isPR ? 'rgba(232,160,32,0.08)' : 'var(--bg-primary)',
                      border: `1px solid ${s.isPR ? 'rgba(232,160,32,0.4)' : 'var(--border-subtle)'}`,
                      borderRadius: 10,
                    }}>
                      <span style={{ color: 'var(--text-tertiary)', fontSize: 11, fontWeight: 700, minWidth: 24 }}>#{s.setNumber}</span>
                      <span style={{ color: 'var(--text-primary)', fontWeight: 700 }}>{s.weight} kg</span>
                      <span style={{ color: 'var(--text-secondary)' }}>×{s.reps}</span>
                      <span style={{ color: 'var(--text-secondary)', fontSize: 11 }}>RIR {s.rir}</span>
                      <span style={{ flex: 1 }} />
                      {s.isPR && (
                        <span style={{ color: 'var(--accent-olympus)', fontSize: 13, fontWeight: 800 }} title="PR — nouvel e1RM record">★</span>
                      )}
                      <span style={{ color: s.isPR ? 'var(--accent-olympus)' : 'var(--accent-laurel)', fontSize: 11, fontWeight: 700 }}>e1RM {s.e1RM}</span>
                    </li>
                  );
                })}
              </ul>
            )}

            {/* Carte saisie du set en cours */}
            <div>
              <div style={{
                display: 'flex',
                alignItems: 'baseline',
                justifyContent: 'space-between',
                marginBottom: 10,
              }}>
                <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
                  Set {nextSetNumber}
                </div>
                {previewE1RM > 0 && (
                  <div style={{ fontSize: 11, color: isPreviewPR ? 'var(--accent-olympus)' : 'var(--text-secondary)', fontWeight: 700 }}>
                    {isPreviewPR && '★ '}e1RM {previewE1RM} · SI {previewSI.toFixed(2)}
                  </div>
                )}
              </div>

              {/* Stepper Weight */}
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 4 }}>
                  Weight
                </div>
                <Stepper value={weight} onChange={setWeight} steps={[-5, -2.5, +2.5, +5]} unit="kg" />
              </div>

              {/* Stepper Reps */}
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 4 }}>
                  Reps
                </div>
                <Stepper value={reps} onChange={setReps} steps={[-1, +1]} unit="" max={99} fontSize={26} />
              </div>

              {/* RIR */}
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>
                  RIR · reps en réserve
                </div>
                <RirToggle value={rir} onChange={setRir} />
              </div>

              {/* Bouton validation. Flash 250ms après tap = feedback cross-plateforme
                  (la vibration ne marche que sur Android). */}
              <button
                type="button"
                onClick={validate}
                disabled={weight <= 0 || reps <= 0}
                style={{
                  width: '100%',
                  background: flash
                    ? '#FFFFFF'
                    : (weight > 0 && reps > 0 ? 'var(--accent-laurel)' : 'var(--bg-surface-hover)'),
                  color: flash
                    ? '#0D0F0E'
                    : (weight > 0 && reps > 0 ? '#0D0F0E' : 'var(--text-tertiary)'),
                  border: 'none',
                  borderRadius: 12,
                  padding: '14px 0',
                  fontSize: 13,
                  fontWeight: 800,
                  letterSpacing: '1.5px',
                  textTransform: 'uppercase',
                  cursor: weight > 0 && reps > 0 ? 'pointer' : 'not-allowed',
                  transform: flash ? 'scale(0.98)' : 'scale(1)',
                  transition: flash
                    ? 'background var(--dur-fast), color var(--dur-fast), transform var(--dur-fast)'
                    : 'background var(--dur-normal) var(--ease-out), color var(--dur-normal) var(--ease-out), transform var(--dur-normal) var(--ease-out)',
                }}
              >Valider set</button>
            </div>
          </div>
        )}
      </Card>
    );
  };

  const AujourdhuiPage = () => {
    const { query } = useLocation();
    const navigate = useNavigate();
    const week = getCurrentWeek();
    const block = getCurrentBlock(week);
    const todayDay = WEEK_DAYS.find(d => d.idx === getCurrentWeekDayIdx());
    const requestedDay = query.day || (todayDay?.strength ? todayDay.sessionDay : null);
    const day = WEEK_DAYS.find(d => d.sessionDay === requestedDay) || WEEK_DAYS[0];
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const exos = (programmeByDay && day.sessionDay) ? (programmeByDay[day.sessionDay] || []) : null;

    const [setsBySlot, refreshSets] = useSetsForDay(week, day.sessionDay);
    const [openSlot, setOpenSlot] = useState(1);

    const [streakTick, setStreakTick] = useState(0);
    const streak = useStreak(streakTick);

    const [endPhrase, setEndPhrase] = useState(null);
    const [terminating, setTerminating] = useState(false);
    const [recentBadges, setRecentBadges] = useState([]); // queue de badges fraîchement débloqués
    const onBadgesUnlocked = useCallback((newly) => {
      if (newly && newly.length) setRecentBadges(b => [...b, ...newly]);
    }, []);

    // Activation TERMINER : ≥1 set validé sur CHAQUE exo.
    const canTerminate = exos && exos.length > 0 && setsBySlot &&
      exos.every(ex => (setsBySlot[ex.exerciseSlot] || []).length > 0);

    const onTerminate = async () => {
      if (!canTerminate || terminating) return;
      setTerminating(true);
      // Marquer la session comme complétée
      try {
        const existing = await db.sessions.where({ week, sessionDay: day.sessionDay }).first();
        if (existing) {
          await db.sessions.update(existing.id, { completedAt: new Date().toISOString(), syncedAt: null });
        } else {
          await db.sessions.add({
            week, sessionDay: day.sessionDay,
            startedAt: new Date().toISOString(),
            completedAt: new Date().toISOString(),
            syncedAt: null,
          });
        }
      } catch {}
      // Bump streak (1× par jour max — multiples sessions le même jour ne cumulent pas)
      try { await bumpStreak(); } catch {}
      setStreakTick(t => t + 1);
      // Check badges après bumpStreak (Premier Pas, Sirènes, Héraclès…)
      try {
        const newly = await checkBadges();
        if (newly.length) setRecentBadges(b => [...b, ...newly]);
      } catch {}
      // Pioche phrase et l'affiche
      const phrase = await pickEndPhrase();
      setEndPhrase(phrase);
      // Sync en arrière-plan pendant les 2s d'overlay
      syncPendingSets().catch(() => {});
      // Navigation auto vers /semaine après 2.2s
      setTimeout(() => {
        setEndPhrase(null);
        setTerminating(false);
        navigate(ROUTES.SEMAINE);
      }, 2200);
    };

    return (
      <>
        <PageWrap title={day.label} subtitle={`${day.fr} · Bloc ${block.id} · ${block.name} · Sem ${week}/${block.weeks[1]}`}>
          <div style={{ display: 'flex', gap: 10 }}>
            <AthxCountdown />
            {streak && <StreakBadge streak={streak} />}
          </div>
          <LotophagesWarning streak={streak} />
          {!day.strength ? (
            <Card style={{ marginTop: 12 }}>
              <div style={{ color: 'var(--text-secondary)' }}>
                Pas de session strength aujourd'hui. {day.label}.
              </div>
            </Card>
          ) : exos === null ? (
            <Card style={{ marginTop: 12 }}><div style={{ color: 'var(--text-secondary)' }}>Chargement du programme…</div></Card>
          ) : exos.length === 0 ? (
            <Card style={{ marginTop: 12 }}>
              <div style={{ color: 'var(--accent-blood)', fontSize: 12, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>
                Programme non chargé
              </div>
              <div style={{ color: 'var(--text-secondary)' }}>Reconnecte-toi pour charger la session.</div>
            </Card>
          ) : (
            <>
              {exos.map(ex => (
                <ExoCard
                  key={ex.id}
                  ex={ex}
                  week={week}
                  sessionDay={day.sessionDay}
                  sets={setsBySlot ? (setsBySlot[ex.exerciseSlot] || []) : null}
                  isOpen={openSlot === ex.exerciseSlot}
                  onToggle={() => setOpenSlot(openSlot === ex.exerciseSlot ? null : ex.exerciseSlot)}
                  onSetValidated={refreshSets}
                  onBadgesUnlocked={onBadgesUnlocked}
                />
              ))}

              {/* Bouton TERMINER — large, fond olympus or, fixe en bas du flow.
                  Actif uniquement quand chaque exo a ≥1 set validé. */}
              <button
                type="button"
                onClick={onTerminate}
                disabled={!canTerminate || terminating}
                style={{
                  width: '100%',
                  marginTop: 20,
                  background: canTerminate ? 'var(--accent-olympus)' : 'var(--bg-surface-hover)',
                  color: canTerminate ? '#0D0F0E' : 'var(--text-tertiary)',
                  border: 'none',
                  borderRadius: 14,
                  padding: '16px 0',
                  fontSize: 14,
                  fontWeight: 800,
                  letterSpacing: '2px',
                  textTransform: 'uppercase',
                  cursor: canTerminate ? 'pointer' : 'not-allowed',
                  transition: 'all var(--dur-normal) var(--ease-out)',
                  opacity: terminating ? 0.6 : 1,
                }}
              >
                {terminating ? '…' : 'Terminer'}
              </button>

              {!canTerminate && (
                <div style={{
                  marginTop: 8,
                  textAlign: 'center',
                  fontSize: 11,
                  color: 'var(--text-tertiary)',
                  letterSpacing: '0.5px',
                }}>
                  Au moins 1 set validé sur chaque exo pour terminer.
                </div>
              )}
            </>
          )}
        </PageWrap>
        {endPhrase && <SessionEndOverlay phrase={endPhrase} />}
        {recentBadges.length > 0 && (
          <BadgeToast
            badge={recentBadges[0]}
            onDone={() => setRecentBadges(b => b.slice(1))}
          />
        )}
      </>
    );
  };

  const DayCard = ({ day, programme, isToday, onTap }) => {
    const exos = programme || [];
    const isClickable = day.strength && exos.length > 0;
    const accentColor = isToday ? 'var(--accent-laurel)' : day.strength ? 'var(--text-primary)' : 'var(--text-secondary)';
    return (
      <button
        type="button"
        onClick={isClickable ? onTap : undefined}
        disabled={!isClickable}
        style={{
          width: '100%',
          textAlign: 'left',
          background: 'var(--bg-surface)',
          border: `1px solid ${isToday ? 'var(--accent-laurel)' : 'var(--border-subtle)'}`,
          borderRadius: 14,
          padding: 14,
          marginTop: 10,
          color: 'inherit',
          cursor: isClickable ? 'pointer' : 'default',
          opacity: day.strength ? 1 : 0.6,
          transition: 'border-color var(--dur-fast) var(--ease-out)',
        }}
      >
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12, marginBottom: exos.length ? 10 : 0 }}>
          <div>
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700 }}>
              {day.fr}
            </div>
            <div style={{ fontSize: 16, fontWeight: 800, color: accentColor, marginTop: 2 }}>
              {day.label}
            </div>
          </div>
          <div style={{ fontSize: 18, color: accentColor }} aria-label={isToday ? 'aujourd’hui' : ''}>
            {isToday ? '⏰' : day.strength ? '⏳' : '·'}
          </div>
        </div>
        {exos.length > 0 && (
          <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
            {exos.map(ex => (
              <li key={ex.id} style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                <span style={{ color: 'var(--text-tertiary)', marginRight: 6 }}>{ex.exerciseSlot}.</span>
                {ex.exerciseName}
              </li>
            ))}
          </ul>
        )}
      </button>
    );
  };

  const SemainePage = () => {
    const week = getCurrentWeek();
    const block = getCurrentBlock(week);
    const programmeByDay = useWeekProgramme(week, useSeedTick());
    const todayIdx = getCurrentWeekDayIdx();
    const navigate = useNavigate();

    const empty = programmeByDay && Object.keys(programmeByDay).length === 0;

    return (
      <PageWrap title="Semaine" subtitle={`Bloc ${block.id} · ${block.name} · Sem ${week}/${block.weeks[1]}`}>
        {programmeByDay === null && (
          <Card>
            <div style={{ color: 'var(--text-secondary)' }}>Chargement…</div>
          </Card>
        )}
        {empty && (
          <Card>
            <div style={{ color: 'var(--accent-blood)', fontSize: 12, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 6 }}>
              Programme non chargé
            </div>
            <div style={{ color: 'var(--text-secondary)' }}>
              Reconnecte-toi à internet et rouvre l'app : le programme se chargera au prochain démarrage.
            </div>
          </Card>
        )}
        {programmeByDay && !empty && WEEK_DAYS.map(day => (
          <DayCard
            key={day.idx}
            day={day}
            programme={day.sessionDay ? programmeByDay[day.sessionDay] : null}
            isToday={day.idx === todayIdx}
            onTap={() => navigate(`${ROUTES.AUJOURDHUI}?day=${day.sessionDay}`)}
          />
        ))}
      </PageWrap>
    );
  };

  const StatsPage = () => {
    const [refresh, setRefresh] = useState(0);
    const unlocked = useUnlockedBadges(refresh);
    const prs = useAllPRs(refresh);

    // Reload à chaque visite (au cas où on vient de unlocker un badge)
    useEffect(() => { setRefresh(r => r + 1); }, []);

    return (
      <PageWrap title="Stats" subtitle="Badges débloqués · Wall of PRs">
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 10 }}>
            Achievements
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(2, 1fr)',
            gap: 10,
          }}>
            {BADGES.map(badge => {
              const isUnlocked = unlocked && !!unlocked[badge.id];
              return (
                <div
                  key={badge.id}
                  style={{
                    background: 'var(--bg-surface)',
                    border: `1px solid ${isUnlocked ? 'rgba(232,160,32,0.4)' : 'var(--border-subtle)'}`,
                    borderRadius: 14,
                    padding: 12,
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: 8,
                    textAlign: 'center',
                    opacity: isUnlocked ? 1 : 0.55,
                    transition: 'opacity var(--dur-normal) var(--ease-out)',
                  }}
                >
                  <BadgeIcon badge={badge} unlocked={isUnlocked} size={48} />
                  <div style={{
                    fontSize: 13,
                    fontWeight: 800,
                    color: isUnlocked ? 'var(--text-primary)' : 'var(--text-secondary)',
                  }}>
                    {badge.name}
                  </div>
                  <div style={{
                    fontSize: 11,
                    color: 'var(--text-tertiary)',
                    lineHeight: 1.3,
                  }}>
                    {isUnlocked ? badge.description : '?'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 10 }}>
            Wall of PRs
          </div>
          {prs === null ? (
            <Card><div style={{ color: 'var(--text-secondary)' }}>Chargement…</div></Card>
          ) : prs.length === 0 ? (
            <Card>
              <div style={{ color: 'var(--text-secondary)', fontSize: 13 }}>
                Aucun PR pour l'instant. Bats un e1RM pour voir le mur s'allumer.
              </div>
            </Card>
          ) : (
            <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 8 }}>
              {prs.map(pr => (
                <li key={pr.id} style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: 12,
                  padding: '10px 14px',
                  background: 'rgba(232,160,32,0.06)',
                  border: '1px solid rgba(232,160,32,0.3)',
                  borderRadius: 12,
                }}>
                  <span style={{
                    color: 'var(--accent-olympus)',
                    fontSize: 16,
                    fontWeight: 800,
                  }}>★</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>
                      {pr.exerciseName}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>
                      Sem {pr.week} · {pr.weight} kg × {pr.reps} RIR {pr.rir}
                    </div>
                  </div>
                  <div style={{
                    fontSize: 14,
                    fontWeight: 800,
                    color: 'var(--accent-olympus)',
                  }}>
                    {pr.e1RM}
                  </div>
                </li>
              ))}
            </ul>
          )}
        </div>
      </PageWrap>
    );
  };

  const ReglagesPage = () => {
    const [pingState, setPingState] = useState({ status: 'idle', msg: '' });
    const [bodyweight, setBodyweight] = useState('');
    const [bwSaved, setBwSaved] = useState(false);

    useEffect(() => {
      db.prefs.get('bodyweight').then(row => {
        if (row?.value) setBodyweight(String(row.value));
      });
    }, []);

    const saveBodyweight = async () => {
      const v = parseFloat(bodyweight);
      if (!Number.isFinite(v) || v <= 0) return;
      await db.prefs.put({ key: 'bodyweight', value: v });
      setBwSaved(true);
      setTimeout(() => setBwSaved(false), 1500);
      // Revalide les badges set-based qui dépendent du BW
      checkBadges().catch(() => {});
    };

    const ping = async () => {
      setPingState({ status: 'loading', msg: 'Test en cours…' });
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.ok) setPingState({ status: 'ok', msg: json.message || 'API alive' });
        else setPingState({ status: 'err', msg: json.error || 'Réponse inattendue' });
      } catch (e) {
        setPingState({ status: 'err', msg: e.message || 'Erreur réseau' });
      }
    };
    const pingColor = {
      idle:    'var(--text-tertiary)',
      loading: 'var(--accent-royal)',
      ok:      'var(--accent-laurel)',
      err:     'var(--accent-blood)',
    }[pingState.status];
    return (
      <PageWrap title="Réglages" subtitle="API · ATHX · sons · reset">
        <Card>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            API Apps Script
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)', wordBreak: 'break-all', marginBottom: 10 }}>
            {API_URL}
          </div>
          <button
            type="button"
            onClick={ping}
            style={{
              background: 'transparent',
              border: '1px solid var(--border-strong)',
              borderRadius: 10,
              color: 'var(--text-primary)',
              padding: '8px 14px',
              fontSize: 12,
              fontWeight: 700,
              letterSpacing: '0.4px',
              textTransform: 'uppercase',
              cursor: 'pointer',
            }}
          >Test connexion</button>
          {pingState.status !== 'idle' && (
            <div style={{ marginTop: 10, fontSize: 13, color: pingColor }}>{pingState.msg}</div>
          )}
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Bodyweight (kg)
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 8 }}>
            Pour les badges Atlas (squat 2× BW) et Achille (bench 1× BW).
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="number"
              inputMode="decimal"
              step="0.1"
              value={bodyweight}
              onChange={e => setBodyweight(e.target.value)}
              placeholder="ex: 78"
              style={{
                flex: 1,
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: 'var(--text-primary)',
                padding: '10px 12px',
                fontSize: 14,
                outline: 'none',
              }}
            />
            <button
              type="button"
              onClick={saveBodyweight}
              style={{
                background: bwSaved ? 'var(--accent-laurel)' : 'transparent',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: bwSaved ? '#0D0F0E' : 'var(--text-primary)',
                padding: '8px 18px',
                fontSize: 12,
                fontWeight: 700,
                letterSpacing: '0.4px',
                textTransform: 'uppercase',
                cursor: 'pointer',
                transition: 'all var(--dur-fast) var(--ease-out)',
              }}
            >{bwSaved ? '✓' : 'OK'}</button>
          </div>
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Date Ithaque
          </div>
          <div>{ATHX_DATE} · ATHX Marseille</div>
        </Card>
      </PageWrap>
    );
  };

  /* ==========================================================
     APP SHELL — header avec logo Ω
     ========================================================== */
  const AppHeader = () => (
    <header style={{
      padding: '20px 16px 8px',
      display: 'flex',
      justifyContent: 'center',
    }}>
      <Logo size="sm" />
    </header>
  );

  /* ==========================================================
     Service worker registration
     ========================================================== */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  /* ==========================================================
     APP — boot :
     1. Splash si 1ère ouverture (flag localStorage)
     2. seedIfEmpty() pour le programme
     3. syncPendingSets() pour pousser les sets stockés offline
     ========================================================== */
  const App = () => {
    const [seedTick, setSeedTick] = useState(0);
    const [showSplash, setShowSplash] = useState(() => {
      try { return !localStorage.getItem(ONBOARD_KEY); } catch { return false; }
    });

    useEffect(() => {
      seedIfEmpty().then(r => {
        if (r.ok && !r.skipped) setSeedTick(t => t + 1);
      });
      // Sync les sets stockés offline au lancement (no-op si online et tout déjà sync).
      syncPendingSets().catch(() => {});
    }, []);

    const dismissSplash = () => {
      try { localStorage.setItem(ONBOARD_KEY, '1'); } catch {}
      setShowSplash(false);
    };

    return (
      <SeedContext.Provider value={seedTick}>
        <HashRouter>
          <div className="app-shell">
            <AppHeader />
            <main className="app-main">
              <Routes>
                <Route path={ROUTES.AUJOURDHUI} element={<AujourdhuiPage />} />
                <Route path={ROUTES.SEMAINE}    element={<SemainePage />} />
                <Route path={ROUTES.STATS}      element={<StatsPage />} />
                <Route path={ROUTES.REGLAGES}   element={<ReglagesPage />} />
                <Route path="*" element={<AujourdhuiPage />} />
              </Routes>
            </main>
            <BottomNav />
          </div>
          {showSplash && <Splash onDismiss={dismissSplash} />}
        </HashRouter>
      </SeedContext.Provider>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
