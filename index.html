  // Calcule le récap de la semaine courante (lundi → dimanche).
  async function computeWeeklyRecap() {
    const week = getCurrentWeek();
    const allSets = await db.sets.toArray();
    const allSessions = await db.sessions.toArray();

    const weekSets = allSets.filter(s => s.week === week);
    const weekSessions = allSessions.filter(s => s.week === week && s.completedAt);
    const prCount = weekSets.filter(s => s.isPR).length;
    const totalVL = volumeLoad(weekSets);

    // Compare au volume sem-1
    const prevWeekSets = allSets.filter(s => s.week === week - 1);
    const prevVL = volumeLoad(prevWeekSets);
    const deltaVL = prevVL > 0 ? ((totalVL - prevVL) / prevVL) * 100 : null;

    // Génération suggestion : zone qui a le moins reçu d'attention.
    // Compte sets par axe radar.
    const counts = { squat: 0, deadlift: 0, push: 0, pull: 0 };
    for (const s of weekSets) {
      const std = matchStandard(s.exerciseName);
      if (std) counts[std.radarAxis] = (counts[std.radarAxis] || 0) + 1;
    }
    const minAxis = Object.entries(counts).reduce((m, [k, v]) =>
      v < m.v ? { k, v } : m, { k: null, v: Infinity });

    let suggestion = "";
    if (minAxis.k && minAxis.v < 2) {
      const labelMap = { squat: 'squat', deadlift: 'deadlift', push: 'pushing', pull: 'pulling' };
      suggestion = `Athéna te dit : ton ${labelMap[minAxis.k]} a peu vu d'attention. Prochaine épreuve : 2 sessions ${labelMap[minAxis.k]} solides.`;
    } else if (prCount > 0) {
      suggestion = `Athéna te dit : ${prCount} PR cette semaine. La progression est nette. Continue avec discipline.`;
    } else {
      suggestion = `Athéna te dit : la régularité est plus précieuse que l'éclat. Tu tiens le cap.`;
    }

    return {
      week,
      sessionsCompleted: weekSessions.length,
      prCount,
      totalVL,
      deltaVL,
      suggestion,
    };
  }

     Hiérarchie stricte d'animations selon importance.
     - Set validé : haptic + flash (déjà fait Étape 3)
     - PR e1RM : confetti + son lyre + toast (déjà fait Étape 5, on ajoute son ici)
     - Bloc complété : modal célébration (BlockCompleteModal ci-dessous)
     - Programme complété : full-screen takeover (ProgrammeCompleteModal)
     ========================================================== */
  const BlockCompleteModal = ({ block, onClose }) => (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 220,
      background: 'rgba(8,10,9,0.95)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 32,
      animation: 'fade-in 600ms var(--ease-out)',
    }}
    onClick={onClose}>
      <div style={{
        background: 'var(--bg-surface)',
        border: '1.5px solid var(--accent-olympus)',
        borderRadius: 18,
        padding: '32px 24px',
        textAlign: 'center',
        maxWidth: 360,
      }}>
        {/* Étoile Vergina (16 branches simplifiées en 8 rays) */}
        <svg width="80" height="80" viewBox="-50 -50 100 100" style={{ margin: '0 auto 16px', display: 'block' }}>
          {[0, 45, 90, 135, 180, 225, 270, 315].map(a => (
            <polygon key={a}
              points="0,-40 4,-8 0,0 -4,-8"
              fill="var(--accent-olympus)"
              transform={`rotate(${a})`} />
          ))}
          <circle cx="0" cy="0" r="6" fill="var(--accent-olympus)" />
        </svg>
        <div style={{
          fontSize: 11,
          color: 'var(--accent-olympus)',
          textTransform: 'uppercase',
          letterSpacing: '2px',
          fontWeight: 800,
          marginBottom: 6,
        }}>Bloc complété</div>
        <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 12 }}>
          {block.name}
        </div>
        <div className="greek" style={{ fontSize: 15, fontStyle: 'italic', color: 'var(--text-secondary)', lineHeight: 1.5, marginBottom: 20 }}>
          {NARRATIVE_BY_BLOCK[block.id]}
        </div>
        <button type="button" onClick={onClose}
          style={{
            background: 'var(--accent-olympus)',
            border: 'none',
            borderRadius: 10,
            color: '#0D0F0E',
            padding: '12px 24px',
            fontSize: 12,
            fontWeight: 800,
            letterSpacing: '1.5px',
            textTransform: 'uppercase',
            cursor: 'pointer',
          }}>Continuer</button>
      </div>
    </div>
  );

  // Détection passage de bloc : check si le précédent block a été franchi
  // entre 2 sessions. Stocké en prefs.lastSeenBlock.
  async function checkBlockTransition(currentWeek) {
    const lastSeenRow = await db.prefs.get('lastSeenBlock');
    const lastSeen = lastSeenRow?.value || 0;
    const currentBlock = getCurrentBlock(currentWeek).id;
    if (currentBlock > lastSeen) {
      await db.prefs.put({ key: 'lastSeenBlock', value: currentBlock });
      // Renvoie le bloc précédent (le bloc qu'on vient de COMPLÉTER)
      if (lastSeen >= 1) return BLOCKS.find(b => b.id === lastSeen);
    }
    return null;
  }

  const AthxSteleColumn = ({ liftKey, bodyweight }) => {
    const standing = useAthxStanding(liftKey, bodyweight);
    const liftRef = SEED_LIFTS.find(l => l.key === liftKey);
    const ratio = standing?.ratio || 0;
    const targetRatio = standing?.targetRatio || 1;
    const current = standing?.current || 0;
    const pct = Math.min(1, ratio / targetRatio);
    const reached = pct >= 1;
    return (
      <div style={{ flex: 1, textAlign: 'center', maxWidth: 60 }}>
        <div style={{
          fontSize: 9, fontFamily: 'var(--font-mono)', fontWeight: 700,
          color: 'var(--accent-olympus)', marginBottom: 4,
        }}>×{targetRatio}</div>
        <div style={{
          height: 120, background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)',
          borderRadius: 'var(--r-sm)', position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0,
            height: 2, background: 'var(--accent-olympus)',
          }} />
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: `${pct * 100}%`,
            background: reached ? 'var(--accent-olympus)' : 'var(--accent-laurel)',
            opacity: 0.3,
          }} />
          <div style={{
            position: 'absolute', bottom: `${pct * 100}%`, left: 0, right: 0,
            transform: 'translateY(50%)',
            textAlign: 'center', fontFamily: 'var(--font-mono)',
            fontSize: 11, fontWeight: 700, color: 'var(--text-primary)',
          }}>×{ratio ? ratio.toFixed(1) : '—'}</div>
        </div>
        <div style={{ marginTop: 6 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase' }}>
            {liftRef ? liftRef.name.split(' ')[0] : liftKey}
          </div>
          <div className="ody-tactical" style={{ fontSize: 11, marginTop: 2 }}>
            {current ? `${current}kg` : '—'}
          </div>
        </div>
      </div>
    );
  };

  /* ==========================================================
     STATS DASHBOARD — P0-polish/D
     Bloomberg Terminal de l'athlète : 7 sections analytiques
     ========================================================== */

  const LIFT_COLORS = {
    squat:    'var(--accent-laurel)',
    deadlift: 'var(--accent-olympus)',
    bench:    'var(--accent-royal)',
    ohp:      'var(--text-secondary)',
    row:      '#7AAEB7',
  };
  const LIFT_SHORT = { squat: 'Squat', deadlift: 'Deadlift', bench: 'Bench', ohp: 'OHP', row: 'Row' };

  const FORMAT_COLORS = {
    density:   'rgba(62, 207, 160, 0.7)',
    emom:      'rgba(232, 160, 32, 0.7)',
    softAmrap: 'rgba(185, 144, 224, 0.7)',
    aerobic:   'rgba(122, 174, 183, 0.7)',
    anaerobic: 'rgba(224, 90, 74, 0.5)',
    iso:       'rgba(122, 124, 122, 0.5)',
  };

  const STRENGTH_DAYS = ['Monday', 'Wednesday', 'Friday', 'Saturday'];
  const STRENGTH_DAY_FR = { Monday: 'Lundi', Wednesday: 'Mercredi', Friday: 'Vendredi', Saturday: 'Samedi' };
  const HEATMAP_ROWS = ['Monday', 'Wednesday', 'Friday', 'Saturday'];
  const HEATMAP_ROW_LABELS = ['LUN', 'MER', 'VEN', 'SAM'];

  function useDashboardData() {
    const [data, setData] = useState(null);
    useEffect(() => {
      let alive = true;
      (async () => {
        const [allSets, allPrs, allOneRMs, bwPref, streakRow, allProgramme, allAttrs] = await Promise.all([
          db.sets.toArray(),
          db.prs.toArray(),
          db.oneRMs.toArray(),
          db.prefs.get('bodyweight'),
          getStreak(),
          db.programme.toArray(),
          db.attributes.toArray(),
        ]);
        if (!alive) return;
        const bodyweight = bwPref?.value || 0;
        const currentWeek = getCurrentWeek();
        const currentBlock = getCurrentBlock(currentWeek);

        // ── Heatmap data ──
        const sessionVolumes = {};
        for (const s of allSets) {
          const key = `${s.week}_${s.sessionDay}`;
          sessionVolumes[key] = (sessionVolumes[key] || 0) + (s.weight || 0) * (s.reps || 0);
        }
        const allVolumes = Object.values(sessionVolumes).filter(v => v > 0);
        const medianVol = allVolumes.length ? allVolumes.sort((a, b) => a - b)[Math.floor(allVolumes.length / 2)] : 0;

        const heatmapCells = [];
        for (let w = 1; w <= 20; w++) {
          for (const day of HEATMAP_ROWS) {
            const key = `${w}_${day}`;
            const vol = sessionVolumes[key] || 0;
            let intensity = 0;
            if (vol > 0) {
              if (vol < medianVol * 0.7) intensity = 1;
              else if (vol <= medianVol * 1.3) intensity = 2;
              else intensity = 3;
            }
            const daySets = allSets.filter(s => s.week === w && s.sessionDay === day);
            const dayPrs = allPrs.filter(p => p.week === w && p.sessionDay === day);
            heatmapCells.push({ week: w, day, vol, intensity, sets: daySets, prs: dayPrs });
          }
        }

        // ── Block completion ring ──
        const blockWeeks = currentBlock.weeks;
        const blockSessions = new Set();
        for (const s of allSets) {
          if (s.week >= blockWeeks[0] && s.week <= blockWeeks[1] && STRENGTH_DAYS.includes(s.sessionDay)) {
            blockSessions.add(`${s.week}_${s.sessionDay}`);
          }
        }
        const blockSessionCount = blockSessions.size;
        const blockTotalSessions = (blockWeeks[1] - blockWeeks[0] + 1) * 4;
        const blockCompletion = blockTotalSessions > 0 ? blockSessionCount / blockTotalSessions : 0;

        // ── Counters ──
        const blockVolume = allSets
          .filter(s => s.week >= blockWeeks[0] && s.week <= blockWeeks[1])
          .reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0);
        const blockPRCount = allPrs.filter(p => p.block === currentBlock.id).length;

        // ── Weekly e1RMs per lift ──
        const weeklyE1RMs = computeWeeklyE1RMs(allSets);

        // ── Declared 1RMs (baselines) ──
        const declaredByLift = {};
        for (const std of ATHX_STANDARDS) {
          const matches = allOneRMs.filter(o => std.pattern.test(o.exerciseName || ''));
          declaredByLift[std.id] = matches.length ? Math.max(...matches.map(o => o.weight || o.e1RM || 0)) : 0;
        }

        // ── ATHX targets ──
        const athxTargets = {};
        for (const std of ATHX_STANDARDS) {
          athxTargets[std.id] = bodyweight > 0 ? Math.round(bodyweight * std.targetBW * 10) / 10 : 0;
        }

        // ── Top 5 PRs by delta ──
        const prsWithDelta = allPrs.map(p => {
          const declared = declaredByLift[p.liftKey] || 0;
          return { ...p, delta: (p.e1RM || 0) - declared };
        }).sort((a, b) => b.delta - a.delta);
        const topPRs = prsWithDelta.slice(0, 5);

        // ── PR timeline ──
        const prsByWeek = {};
        for (const p of allPrs) {
          (prsByWeek[p.week] ||= []).push(p);
        }

        // ── Weekly volume ──
        const weeklyVolume = [];
        for (let w = 1; w <= 20; w++) {
          const vol = allSets.filter(s => s.week === w).reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0);
          weeklyVolume.push({ week: w, volume: vol });
        }
        const volumeValues = weeklyVolume.map(w => w.volume).filter(v => v > 0);
        const volumeMedian = volumeValues.length ? volumeValues.sort((a, b) => a - b)[Math.floor(volumeValues.length / 2)] : 0;

        // ── Attributes snapshot (current only, no history) ──
        const currentAttrs = allAttrs.find(a => a.type === 'current');
        const baselineAttrs = allAttrs.find(a => a.type === 'baseline');

        // ── Format duration per week ──
        const formatMinByWeek = [];
        for (let w = 1; w <= 20; w++) {
          const weekSets = allSets.filter(s => s.week === w);
          const byFormat = {};
          for (const fmt of Object.keys(FORMAT_COLORS)) {
            byFormat[fmt] = weekSets.filter(s => s.format === fmt).reduce((sum, s) => sum + (s.durationMinutes || 0), 0);
          }
          formatMinByWeek.push({ week: w, ...byFormat });
        }

        // ── Recovery delta ──
        const curWeekVol = allSets.filter(s => s.week === currentWeek).reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0);
        const prevWeekVol = currentWeek > 1 ? allSets.filter(s => s.week === currentWeek - 1).reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0) : 0;
        const recoveryDelta = prevWeekVol > 0 ? ((curWeekVol - prevWeekVol) / prevWeekVol) * 100 : null;

        // ── Mètis weekly ──
        const programmeBySlot = {};
        for (const p of allProgramme) {
          programmeBySlot[`${p.week}_${p.sessionDay}_${p.exerciseSlot}`] = p;
        }
        const metisWeekly = [];
        for (let w = 1; w <= 20; w++) {
          const weekSets = allSets.filter(s => s.week === w);
          const eligible = weekSets.filter(s => {
            if (s.rir === null || s.rir === undefined) return false;
            const key = `${s.week}_${s.sessionDay}_${s.exerciseSlot}`;
            return getPrescribedRir(programmeBySlot[key]) !== null;
          });
          const inWindow = eligible.filter(s => {
            const key = `${s.week}_${s.sessionDay}_${s.exerciseSlot}`;
            const prescribed = getPrescribedRir(programmeBySlot[key]);
            return Math.abs(s.rir - prescribed) <= 1;
          });
          const pct = eligible.length > 0 ? (inWindow.length / eligible.length) * 100 : null;
          metisWeekly.push({ week: w, pct, eligible: eligible.length });
        }

        // ── RPE weekly ──
        const rpeWeekly = [];
        for (let w = 1; w <= 20; w++) {
          const weekSets = allSets.filter(s => s.week === w && s.rir !== null && s.rir !== undefined);
          if (weekSets.length > 0) {
            const avgRpe = weekSets.reduce((sum, s) => sum + (10 - s.rir), 0) / weekSets.length;
            rpeWeekly.push({ week: w, rpe: avgRpe });
          }
        }

        // ── Missed sessions (block) ──
        const plannedByWeekDay = new Set();
        for (const p of allProgramme) {
          if (p.week >= blockWeeks[0] && p.week <= blockWeeks[1]) {
            plannedByWeekDay.add(`${p.week}_${p.sessionDay}`);
          }
        }
        const doneByWeekDay = new Set();
        for (const s of allSets) {
          if (s.week >= blockWeeks[0] && s.week <= blockWeeks[1]) {
            doneByWeekDay.add(`${s.week}_${s.sessionDay}`);
          }
        }
        const missedSessions = [...plannedByWeekDay].filter(k => {
          const [w] = k.split('_').map(Number);
          return w < currentWeek && !doneByWeekDay.has(k);
        });

        // ── Volume by day of week ──
        const volByDay = {};
        const countByDay = {};
        for (const day of STRENGTH_DAYS) {
          volByDay[day] = 0;
          countByDay[day] = 0;
        }
        for (const s of allSets.filter(s => s.week >= blockWeeks[0] && s.week <= blockWeeks[1] && STRENGTH_DAYS.includes(s.sessionDay))) {
          volByDay[s.sessionDay] += (s.weight || 0) * (s.reps || 0);
          const key = `${s.week}_${s.sessionDay}`;
          if (!countByDay[`seen_${key}`]) {
            countByDay[`seen_${key}`] = true;
            countByDay[s.sessionDay]++;
          }
        }
        const avgVolByDay = STRENGTH_DAYS.map(d => ({
          day: d,
          dayFr: STRENGTH_DAY_FR[d],
          avgVol: countByDay[d] > 0 ? Math.round(volByDay[d] / countByDay[d]) : 0,
        })).sort((a, b) => b.avgVol - a.avgVol);

        // ── PR by day ──
        const prByDay = STRENGTH_DAYS.map(d => {
          const dayPrs = allPrs.filter(p => p.sessionDay === d && p.block === currentBlock.id);
          const best = dayPrs.length ? dayPrs.reduce((m, p) => p.e1RM > m.e1RM ? p : m, dayPrs[0]) : null;
          return { day: d, dayFr: STRENGTH_DAY_FR[d], count: dayPrs.length, best };
        });

        // ── ETA projection (linear regression on last 4 weeks of e1RM) ──
        const projections = {};
        for (const std of ATHX_STANDARDS) {
          const pts = weeklyE1RMs[std.id] || [];
          const target = athxTargets[std.id];
          const current = pts.length ? pts[pts.length - 1].e1RM : declaredByLift[std.id];
          if (pts.length >= 4 && target > 0 && current < target) {
            const last4 = pts.slice(-4);
            const n = last4.length;
            const sumX = last4.reduce((s, p) => s + p.week, 0);
            const sumY = last4.reduce((s, p) => s + p.e1RM, 0);
            const sumXY = last4.reduce((s, p) => s + p.week * p.e1RM, 0);
            const sumX2 = last4.reduce((s, p) => s + p.week * p.week, 0);
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            if (slope > 0) {
              const weeksToTarget = Math.ceil((target - current) / slope);
              projections[std.id] = { eta: weeksToTarget, current, target, slope };
            } else {
              projections[std.id] = { eta: null, current, target };
            }
          } else {
            projections[std.id] = { eta: null, current: current || 0, target };
          }
        }

        // ── Goals tracker ──
        const goals = ATHX_STANDARDS.map(std => {
          const pts = weeklyE1RMs[std.id] || [];
          const current = pts.length ? pts[pts.length - 1].e1RM : declaredByLift[std.id];
          const target = athxTargets[std.id];
          const ratioBW = bodyweight > 0 && current > 0 ? current / bodyweight : 0;
          const progress = target > 0 ? current / target : 0;
          const status = progress >= 0.95 ? 'green' : progress >= 0.80 ? 'yellow' : 'red';
          return { ...std, current, target, ratioBW, progress, status, projection: projections[std.id] };
        });

        // ── Insights ──
        const insights = [];
        // 1. Jour fort
        const avgVols = avgVolByDay.filter(d => d.avgVol > 0);
        if (avgVols.length >= 2) {
          const totalAvg = avgVols.reduce((s, d) => s + d.avgVol, 0) / avgVols.length;
          const best = avgVols[0];
          if (best.avgVol > totalAvg * 1.15) {
            const pct = Math.round(((best.avgVol - totalAvg) / totalAvg) * 100);
            insights.push(`Ton ${best.dayFr} est ton jour le plus performant : +${pct}% volume vs ta moyenne`);
          }
        }
        // 2. Streak de PR
        const recentPrs = allPrs.filter(p => {
          const d = new Date(p.validatedAt);
          return (Date.now() - d.getTime()) < 7 * 86400000;
        });
        if (recentPrs.length >= 3) {
          insights.push(`${recentPrs.length} PR battus ces 7 derniers jours`);
        }
        // 3. Mètis en baisse
        const metisWithData = metisWeekly.filter(m => m.pct !== null);
        if (metisWithData.length >= 2) {
          const last2 = metisWithData.slice(-2);
          if (last2[0].pct - last2[1].pct > 10) {
            insights.push(`Ton Mètis baisse depuis 2 semaines (de ${Math.round(last2[0].pct)}% à ${Math.round(last2[1].pct)}%) — attention aux RIR prescrits`);
          }
        }
        // 4. Target ATHX proche
        for (const g of goals) {
          if (g.progress >= 0.95 && g.progress < 1 && g.projection?.eta) {
            insights.push(`Tu es à ${Math.round(g.progress * 100)}% du target ATHX ${g.name}, ETA = ${g.projection.eta} semaines`);
          }
        }
        // 5. Recovery alerte
        if (recoveryDelta !== null && recoveryDelta > 30) {
          insights.push(`Volume +${Math.round(recoveryDelta)}% cette semaine — surveille la fatigue`);
        }
        // 6. Adhérence forte
        const last14DaysSessions = allSets.filter(s => {
          const d = new Date(s.completedAt);
          return (Date.now() - d.getTime()) < 14 * 86400000 && STRENGTH_DAYS.includes(s.sessionDay);
        });
        const last14Days = new Set(last14DaysSessions.map(s => `${s.week}_${s.sessionDay}`));
        if (last14Days.size >= 8) {
          insights.push("14 jours d'adhérence parfaite — Áreté en hausse");
        }
        // 7. PR loin
        if (allPrs.length > 0) {
          const lastPrDate = new Date(Math.max(...allPrs.map(p => new Date(p.validatedAt).getTime())));
          const daysSincePr = Math.floor((Date.now() - lastPrDate.getTime()) / 86400000);
          if (daysSincePr >= 14) {
            insights.push(`Aucun PR depuis ${daysSincePr} jours — l'appel de Pónos résonne`);
          }
        }
        // 8. Squat overload
        const totalVol = allSets.filter(s => s.week >= blockWeeks[0] && s.week <= blockWeeks[1]).reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0);
        if (totalVol > 0) {
          const squatStd = ATHX_STANDARDS.find(s => s.id === 'squat');
          const squatVol = allSets.filter(s => s.week >= blockWeeks[0] && s.week <= blockWeeks[1] && squatStd.pattern.test(s.exerciseName || '')).reduce((sum, s) => sum + (s.weight || 0) * (s.reps || 0), 0);
          const pct = Math.round((squatVol / totalVol) * 100);
          if (pct > 40) {
            insights.push(`Concentration Squat ${pct}% du volume — diversifie les patterns`);
          }
        }

        setData({
          heatmapCells, blockCompletion, blockSessionCount, blockTotalSessions,
          blockVolume, blockPRCount, currentBlock, currentWeek,
          streak: streakRow, weeklyE1RMs, declaredByLift, athxTargets,
          topPRs, allPrs: prsWithDelta, prsByWeek, weeklyVolume, volumeMedian,
          currentAttrs, baselineAttrs, formatMinByWeek,
          recoveryDelta, metisWeekly, rpeWeekly, missedSessions,
          avgVolByDay, prByDay, insights, goals, bodyweight,
        });
      })();
      return () => { alive = false; };
    }, []);
    return data;
  }

  // ── SVG Chart Components ──

  const RingProgress = ({ pct, size = 100, strokeWidth = 6, color, children }) => {
    const r = (size - strokeWidth) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ * (1 - Math.min(pct, 1));
    return (
      <div style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none"
            stroke="var(--border-subtle)" strokeWidth={strokeWidth} />
          <circle cx={size / 2} cy={size / 2} r={r} fill="none"
            stroke={color} strokeWidth={strokeWidth}
            strokeDasharray={circ} strokeDashoffset={offset}
            strokeLinecap="round"
            transform={`rotate(-90 ${size / 2} ${size / 2})`} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          {children}
        </div>
      </div>
    );
  };

  const SectionHeader = ({ children }) => (
    <div style={{
      fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase',
      color: 'var(--text-muted)', fontFamily: 'var(--font-sans)',
      marginBottom: 'var(--sp-3)', marginTop: 'var(--sp-6)',
    }}>{children}</div>
  );

  const StatCard = ({ children, style }) => (
    <div style={{
      background: 'var(--bg-secondary, var(--bg-surface))',
      border: '1px solid var(--border-subtle)',
      borderRadius: 'var(--r-md)',
      padding: 16,
      ...style,
    }}>{children}</div>
  );

  const StatsPage = () => {
    const data = useDashboardData();
    const navigate = useNavigate();
    const [heatmapModal, setHeatmapModal] = useState(null);
    const [goalDrill, setGoalDrill] = useState(null);
    const [liftToggles, setLiftToggles] = useState({ squat: true, deadlift: true, bench: true, ohp: true, row: true });
    const [showAllPRs, setShowAllPRs] = useState(false);

    if (!data) return (
      <div style={{ padding: 'var(--sp-5) var(--sp-4)', textAlign: 'center', color: 'var(--text-tertiary)' }}>
        Chargement…
      </div>
    );

    const {
      heatmapCells, blockCompletion, blockSessionCount, blockTotalSessions,
      blockVolume, blockPRCount, currentBlock, currentWeek,
      streak, weeklyE1RMs, declaredByLift, athxTargets,
      topPRs, allPrs, prsByWeek, weeklyVolume, volumeMedian,
      currentAttrs, baselineAttrs, formatMinByWeek,
      recoveryDelta, metisWeekly, rpeWeekly, missedSessions,
      avgVolByDay, prByDay, insights, goals, bodyweight,
    } = data;

    const fmtVol = (v) => v >= 10000 ? (v / 1000).toFixed(1) + 'k' : String(Math.round(v));
    const ringColor = blockCompletion > 0.8 ? 'var(--accent-olympus)' : 'var(--accent-laurel)';
    const rank = streak ? getRank(streak.currentStreak) : STREAK_RANKS[0];

    // ── E1RM multi-line chart calculations ──
    const e1rmChartW = 360, e1rmChartH = 200;
    const e1rmPadL = 40, e1rmPadR = 16, e1rmPadT = 16, e1rmPadB = 28;
    const e1rmCW = e1rmChartW - e1rmPadL - e1rmPadR;
    const e1rmCH = e1rmChartH - e1rmPadT - e1rmPadB;
    const allE1RMVals = [];
    for (const std of ATHX_STANDARDS) {
      if (liftToggles[std.id]) {
        (weeklyE1RMs[std.id] || []).forEach(p => allE1RMVals.push(p.e1RM));
        if (declaredByLift[std.id]) allE1RMVals.push(declaredByLift[std.id]);
        if (athxTargets[std.id]) allE1RMVals.push(athxTargets[std.id]);
      }
    }
    const e1rmMin = allE1RMVals.length ? Math.min(...allE1RMVals) - 10 : 0;
    const e1rmMax = allE1RMVals.length ? Math.max(...allE1RMVals) + 10 : 100;
    const e1rmX = (w) => e1rmPadL + ((w - 1) / 19) * e1rmCW;
    const e1rmY = (v) => e1rmPadT + e1rmCH - ((v - e1rmMin) / (e1rmMax - e1rmMin || 1)) * e1rmCH;

    // ── Volume bar chart calculations ──
    const volChartW = 360, volChartH = 140;
    const volPadL = 8, volPadR = 8, volPadT = 20, volPadB = 20;
    const volCW = volChartW - volPadL - volPadR;
    const volCH = volChartH - volPadT - volPadB;
    const maxVol = Math.max(...weeklyVolume.map(w => w.volume), 1);
    const volBarW = volCW / 20 - 2;

    // ── PR timeline bar chart ──
    const prTimeW = 360, prTimeH = 100;
    const prTimePadL = 8, prTimePadR = 8, prTimePadT = 8, prTimePadB = 20;
    const prTimeCW = prTimeW - prTimePadL - prTimePadR;
    const prTimeCH = prTimeH - prTimePadT - prTimePadB;
    const allPrE1RMs = allPrs.filter(p => p.e1RM).map(p => p.e1RM);
    const maxPrE1RM = allPrE1RMs.length ? Math.max(...allPrE1RMs) : 100;

    // ── Recovery color ──
    let recoveryColor = 'var(--text-secondary)';
    if (recoveryDelta !== null) {
      if (recoveryDelta > 30) recoveryColor = 'var(--accent-blood)';
      else if (recoveryDelta > 15) recoveryColor = 'var(--accent-olympus)';
      else if (recoveryDelta >= 0) recoveryColor = 'var(--accent-laurel)';
      else if (recoveryDelta < -15) recoveryColor = 'var(--text-muted)';
    }

    return (
      <div style={{ padding: '0 var(--sp-4) var(--sp-6)', animation: 'fade-in var(--d-base) var(--ease-out)' }}>
        {/* Page header */}
        <div style={{ padding: 'var(--sp-5) 0 var(--sp-2)' }}>
          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
            color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
          }}>STATS · DASHBOARD</div>
          <div style={{
            fontFamily: 'var(--font-greek)', fontStyle: 'italic', fontSize: 15,
            color: 'var(--text-tertiary)', marginTop: 4,
          }}>Bloc {currentBlock.id} · {currentBlock.name}</div>
        </div>

        {/* ═══════ SECTION 1 — VUE D'ENSEMBLE ═══════ */}
        <SectionHeader>VUE D'ENSEMBLE</SectionHeader>

        {/* 1.1 Heatmap */}
        <StatCard style={{ padding: 'var(--sp-3)', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
          <svg width={Math.max(360, 20 * 18 + 40)} height={130} viewBox={`0 0 ${Math.max(360, 20 * 18 + 40)} 130`} style={{ display: 'block' }}>
            {/* Block labels */}
            {BLOCKS.map(b => {
              const x1 = 36 + (b.weeks[0] - 1) * 18;
              const x2 = 36 + (b.weeks[1]) * 18 - 2;
              return (
                <text key={b.id} x={(x1 + x2) / 2} y={10} textAnchor="middle"
                  fontSize="8" fontFamily="var(--font-mono)" fill="var(--text-tertiary)" fontWeight="700">
                  {b.name.toUpperCase().replace('LES ', '').slice(0, 10)}
                </text>
              );
            })}
            {/* Week labels */}
            {[1, 5, 10, 15, 20].map(w => (
              <text key={w} x={36 + (w - 1) * 18 + 7} y={22} textAnchor="middle"
                fontSize="7" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">
                W{w}
              </text>
            ))}
            {/* Block separators */}
            {[6, 12, 16].map(w => (
              <line key={w} x1={36 + w * 18 - 1} y1={26} x2={36 + w * 18 - 1} y2={118}
                stroke="var(--border-subtle)" strokeWidth="1" />
            ))}
            {/* Day labels */}
            {HEATMAP_ROW_LABELS.map((label, i) => (
              <text key={label} x={30} y={38 + i * 22} textAnchor="end" dominantBaseline="middle"
                fontSize="8" fontFamily="var(--font-mono)" fill="var(--text-tertiary)" fontWeight="700">
                {label}
              </text>
            ))}
            {/* Cells */}
            {heatmapCells.map((cell, idx) => {
              const ri = HEATMAP_ROWS.indexOf(cell.day);
              const x = 36 + (cell.week - 1) * 18;
              const y = 28 + ri * 22;
              const opacities = [0, 0.3, 0.6, 1.0];
              return (
                <rect key={idx} x={x} y={y} width={16} height={18} rx={2}
                  fill={cell.intensity > 0 ? 'var(--accent-laurel)' : 'transparent'}
                  fillOpacity={opacities[cell.intensity]}
                  stroke={cell.intensity === 0 ? 'var(--border-subtle)' : 'none'}
                  strokeWidth={cell.intensity === 0 ? 0.5 : 0}
                  style={{ cursor: cell.intensity > 0 ? 'pointer' : 'default' }}
                  onClick={() => cell.intensity > 0 && setHeatmapModal(cell)}
                />
              );
            })}
          </svg>
        </StatCard>

        {/* 1.2 Ring + 1.3 Counters */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--sp-3)', marginTop: 'var(--sp-3)' }}>
          <StatCard style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 'var(--sp-4)' }}>
            <RingProgress pct={blockCompletion} size={90} strokeWidth={5} color={ringColor}>
              <span style={{ fontSize: 20, fontWeight: 800, fontFamily: 'var(--font-sans)', color: 'var(--text-primary)' }}>
                {blockSessionCount}/{blockTotalSessions}
              </span>
              <span style={{ fontSize: 9, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', fontWeight: 700, letterSpacing: '0.08em', marginTop: 2 }}>
                BLOC {currentBlock.id}
              </span>
            </RingProgress>
          </StatCard>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--sp-2)' }}>
            <StatCard style={{ padding: 'var(--sp-3)' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>VOLUME BLOC</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--text-primary)', marginTop: 2 }}>{fmtVol(blockVolume)} <span style={{ fontSize: 11, color: 'var(--text-secondary)' }}>kg</span></div>
            </StatCard>
            <StatCard style={{ padding: 'var(--sp-3)' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>PR BATTUS</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: blockPRCount > 0 ? 'var(--accent-olympus)' : 'var(--text-primary)', marginTop: 2 }}>{blockPRCount}</div>
            </StatCard>
            <StatCard style={{ padding: 'var(--sp-3)' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>STREAK</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--text-primary)', marginTop: 2 }}>{streak?.currentStreak || 0}j <span style={{ fontSize: 10, color: rank.token }}>{rank.name}</span></div>
            </StatCard>
          </div>
        </div>

        {/* 1.4 Pentagon compact */}
        {currentAttrs && (
          <StatCard style={{ marginTop: 'var(--sp-3)', display: 'flex', justifyContent: 'center', padding: 'var(--sp-3)', cursor: 'pointer' }}
            onClick={() => navigate(ROUTES.HEROS)}>
            <Radar size={200}
              current={ATTR_KEYS.map(k => currentAttrs[k] || 0)}
              baseline={baselineAttrs ? ATTR_KEYS.map(k => baselineAttrs[k] || 0) : null}
              glyph="Α" />
          </StatCard>
        )}

        {/* ═══════ SECTION 2 — FORCE ═══════ */}
        <SectionHeader>FORCE</SectionHeader>

        {/* 2.1 Multi-lift e1RM chart */}
        <StatCard style={{ padding: 'var(--sp-3)' }}>
          <svg width="100%" viewBox={`0 0 ${e1rmChartW} ${e1rmChartH}`} style={{ display: 'block' }}>
            {/* Y-axis ticks */}
            {(() => {
              const range = e1rmMax - e1rmMin;
              const step = range > 100 ? 50 : range > 40 ? 20 : 10;
              const ticks = [];
              for (let v = Math.ceil(e1rmMin / step) * step; v <= e1rmMax; v += step) {
                ticks.push(v);
              }
              return ticks.map(v => (
                <g key={v}>
                  <line x1={e1rmPadL} y1={e1rmY(v)} x2={e1rmChartW - e1rmPadR} y2={e1rmY(v)}
                    stroke="var(--border-subtle)" strokeWidth="0.4" />
                  <text x={e1rmPadL - 4} y={e1rmY(v)} textAnchor="end" dominantBaseline="middle"
                    fontSize="8" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">{v}</text>
                </g>
              ));
            })()}
            {/* X-axis week ticks */}
            {[1, 5, 10, 15, 20].map(w => (
              <text key={w} x={e1rmX(w)} y={e1rmChartH - 4} textAnchor="middle"
                fontSize="8" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">S{w}</text>
            ))}
            {/* Per-lift: baseline + target dashed lines + actual curve */}
            {ATHX_STANDARDS.filter(s => liftToggles[s.id]).map(std => {
              const pts = weeklyE1RMs[std.id] || [];
              const baseline = declaredByLift[std.id];
              const target = athxTargets[std.id];
              const color = LIFT_COLORS[std.id];
              return (
                <g key={std.id}>
                  {baseline > 0 && (
                    <line x1={e1rmPadL} y1={e1rmY(baseline)} x2={e1rmChartW - e1rmPadR} y2={e1rmY(baseline)}
                      stroke={color} strokeWidth="0.6" strokeDasharray="3 3" opacity="0.4" />
                  )}
                  {target > 0 && (
                    <line x1={e1rmPadL} y1={e1rmY(target)} x2={e1rmChartW - e1rmPadR} y2={e1rmY(target)}
                      stroke={color} strokeWidth="0.6" strokeDasharray="6 3" opacity="0.25" />
                  )}
                  {pts.length >= 2 && (
                    <polyline
                      points={pts.map(p => `${e1rmX(p.week)},${e1rmY(p.e1RM)}`).join(' ')}
                      fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  )}
                  {pts.map((p, i) => (
                    <circle key={i} cx={e1rmX(p.week)} cy={e1rmY(p.e1RM)} r={2.5} fill={color} />
                  ))}
                </g>
              );
            })}
          </svg>
          {/* Legend toggles */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--sp-2)', marginTop: 'var(--sp-2)' }}>
            {ATHX_STANDARDS.map(std => (
              <button key={std.id} type="button"
                onClick={() => setLiftToggles(t => ({ ...t, [std.id]: !t[std.id] }))}
                style={{
                  display: 'flex', alignItems: 'center', gap: 4,
                  padding: '3px 8px', fontSize: 10, fontWeight: 700,
                  background: liftToggles[std.id] ? 'var(--bg-surface)' : 'transparent',
                  border: `1px solid ${liftToggles[std.id] ? LIFT_COLORS[std.id] : 'var(--border-subtle)'}`,
                  borderRadius: 'var(--r-sm)', cursor: 'pointer',
                  color: liftToggles[std.id] ? LIFT_COLORS[std.id] : 'var(--text-tertiary)',
                  fontFamily: 'var(--font-mono)', letterSpacing: '0.05em', textTransform: 'uppercase',
                  opacity: liftToggles[std.id] ? 1 : 0.5,
                }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: LIFT_COLORS[std.id], opacity: liftToggles[std.id] ? 1 : 0.3 }} />
                {LIFT_SHORT[std.id]}
              </button>
            ))}
          </div>
        </StatCard>

        {/* 2.2 ATHX Projection table */}
        <StatCard style={{ marginTop: 'var(--sp-3)', padding: 'var(--sp-3)' }}>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginBottom: 'var(--sp-2)' }}>
            PROJECTION ATHX
          </div>
          <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)' }}>
            {ATHX_STANDARDS.map(std => {
              const proj = data.goals.find(g => g.id === std.id);
              if (!proj) return null;
              return (
                <div key={std.id} style={{
                  display: 'grid', gridTemplateColumns: '80px 55px 70px 50px', gap: 4, alignItems: 'center',
                  padding: '4px 0', borderBottom: '1px solid var(--border-subtle)',
                  color: 'var(--text-secondary)',
                }}>
                  <span style={{ color: LIFT_COLORS[std.id], fontWeight: 700 }}>{LIFT_SHORT[std.id]}</span>
                  <span>{proj.current ? Math.round(proj.current) : '—'}</span>
                  <span style={{ color: 'var(--text-tertiary)' }}>{proj.target ? `${Math.round(proj.target)} (×${std.targetBW})` : '—'}</span>
                  <span style={{ color: proj.projection?.eta ? 'var(--accent-laurel)' : 'var(--text-tertiary)', fontStyle: proj.projection?.eta ? 'normal' : 'italic' }}>
                    {proj.projection?.eta ? `${proj.projection.eta} sem` : '—'}
                  </span>
                </div>
              );
            })}
          </div>
        </StatCard>

        {/* 2.3 Top 5 PRs */}
        <StatCard style={{ marginTop: 'var(--sp-3)', padding: 'var(--sp-3)' }}>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginBottom: 'var(--sp-2)' }}>
            TOP PR · DELTA
          </div>
          {topPRs.length === 0 ? (
            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontStyle: 'italic' }}>Aucun PR</div>
          ) : (
            <>
              {topPRs.map((pr, i) => (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', gap: 'var(--sp-2)',
                  padding: '4px 0', borderBottom: '1px solid var(--border-subtle)',
                  fontSize: 11, fontFamily: 'var(--font-mono)',
                }}>
                  <span style={{ color: LIFT_COLORS[pr.liftKey] || 'var(--text-secondary)', fontWeight: 700, flex: '0 0 90px' }}>
                    {pr.exerciseName}
                  </span>
                  <span style={{ color: 'var(--accent-olympus)', fontWeight: 700 }}>+{Math.round(pr.delta)} kg</span>
                  <span style={{ color: 'var(--text-tertiary)', fontSize: 10, marginLeft: 'auto' }}>
                    S{pr.week} · {Math.round(pr.e1RM)} e1RM
                  </span>
                </div>
              ))}
              {allPrs.length > 5 && (
                <button type="button" onClick={() => setShowAllPRs(true)}
                  style={{ marginTop: 'var(--sp-2)', fontSize: 10, color: 'var(--accent-olympus)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-mono)', fontWeight: 700 }}>
                  Voir tous ({allPrs.length})
                </button>
              )}
            </>
          )}
        </StatCard>

        {/* 2.4 PR Timeline */}
        <StatCard style={{ marginTop: 'var(--sp-3)', padding: 'var(--sp-3)' }}>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginBottom: 'var(--sp-2)' }}>
            PR TIMELINE
          </div>
          <svg width="100%" viewBox={`0 0 ${prTimeW} ${prTimeH}`} style={{ display: 'block' }}>
            {[1, 5, 10, 15, 20].map(w => (
              <text key={w} x={prTimePadL + ((w - 1) / 19) * prTimeCW} y={prTimeH - 4} textAnchor="middle"
                fontSize="7" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">S{w}</text>
            ))}
            {Object.entries(prsByWeek).map(([week, prs]) => {
              const w = Number(week);
              const bw = Math.max(prTimeCW / 20 - 4, 6);
              return prs.map((pr, i) => {
                const x = prTimePadL + ((w - 1) / 19) * prTimeCW - bw / 2 + i * (bw / Math.max(prs.length, 1));
                const h = (pr.e1RM / maxPrE1RM) * prTimeCH;
                return (
                  <rect key={`${w}-${i}`} x={x} y={prTimePadT + prTimeCH - h} width={bw / Math.max(prs.length, 1) - 1} height={h}
                    fill={LIFT_COLORS[pr.liftKey] || 'var(--accent-laurel)'} rx={1} />
                );
              });
            })}
          </svg>
        </StatCard>

        {/* ═══════ SECTION 3 — CHARGE ═══════ */}
        <SectionHeader>CHARGE</SectionHeader>

        {/* 3.1 Volume hebdo */}
        <StatCard style={{ padding: 'var(--sp-3)' }}>
          <svg width="100%" viewBox={`0 0 ${volChartW} ${volChartH}`} style={{ display: 'block' }}>
            {/* Median line */}
            {volumeMedian > 0 && (
              <line x1={volPadL} y1={volPadT + volCH - (volumeMedian / maxVol) * volCH}
                x2={volChartW - volPadR} y2={volPadT + volCH - (volumeMedian / maxVol) * volCH}
                stroke="var(--text-quaternary)" strokeWidth="0.6" strokeDasharray="4 3" />
            )}
            {weeklyVolume.map((wv, i) => {
              if (wv.volume === 0) return null;
              const x = volPadL + (i / 20) * volCW + 1;
              const h = (wv.volume / maxVol) * volCH;
              return (
                <g key={i}>
                  <rect x={x} y={volPadT + volCH - h} width={volBarW} height={h}
                    fill="var(--accent-laurel)" rx={1} />
                  <text x={x + volBarW / 2} y={volPadT + volCH - h - 4} textAnchor="middle"
                    fontSize="6" fontFamily="var(--font-mono)" fill="var(--text-tertiary)" fontWeight="700">
                    {fmtVol(wv.volume)}
                  </text>
                </g>
              );
            })}
            {[1, 5, 10, 15, 20].map(w => (
              <text key={w} x={volPadL + ((w - 1) / 20) * volCW + volBarW / 2} y={volChartH - 4} textAnchor="middle"
                fontSize="7" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">S{w}</text>
            ))}
          </svg>
        </StatCard>

        {/* 3.2 Distribution attributs (snapshot bar chart) */}
        {currentAttrs && (
          <StatCard style={{ marginTop: 'var(--sp-3)', padding: 'var(--sp-3)' }}>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginBottom: 'var(--sp-2)' }}>
              ATTRIBUTS · SNAPSHOT
            </div>
            {ATTR_KEYS.map(k => {
              const info = ATTRIBUTES_INFO[k];
              const val = currentAttrs[k] || 0;
              return (
                <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 'var(--sp-2)', marginBottom: 4 }}>
                  <span style={{ width: 60, fontSize: 10, fontWeight: 700, color: info.color, fontFamily: 'var(--font-mono)' }}>
                    {info.label}
                  </span>
                  <div style={{ flex: 1, height: 8, background: 'var(--bg-primary)', borderRadius: 4, overflow: 'hidden' }}>
                    <div style={{ width: `${val * 100}%`, height: '100%', background: info.color, borderRadius: 4, transition: 'width 0.3s' }} />
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', width: 28, textAlign: 'right' }}>
                    {Math.round(val * 100)}
                  </span>
                </div>
              );
            })}
          </StatCard>
        )}

        {/* 3.3 Total minutes par type */}
        {(() => {
          const fmts = Object.keys(FORMAT_COLORS);
          const maxMin = Math.max(...formatMinByWeek.map(w => fmts.reduce((s, f) => s + (w[f] || 0), 0)), 1);
          const hasAny = formatMinByWeek.some(w => fmts.some(f => (w[f] || 0) > 0));
          if (!hasAny) return null;
          return (
            <StatCard style={{ marginTop: 'var(--sp-3)', padding: 'var(--sp-3)' }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginBottom: 'var(--sp-2)' }}>
                MINUTES · PAR TYPE
              </div>
              <svg width="100%" viewBox={`0 0 ${volChartW} 120`} style={{ display: 'block' }}>
                {formatMinByWeek.map((wv, i) => {
                  const x = volPadL + (i / 20) * volCW + 1;
                  let yOff = 0;
                  return fmts.map(fmt => {
                    const val = wv[fmt] || 0;
                    if (val === 0) return null;
                    const h = (val / maxMin) * 80;
                    const rect = (
                      <rect key={`${i}-${fmt}`} x={x} y={100 - yOff - h} width={volBarW} height={h}
                        fill={FORMAT_COLORS[fmt]} rx={1} />
                    );
                    yOff += h;
                    return rect;
                  });
                })}
                {[1, 5, 10, 15, 20].map(w => (
                  <text key={w} x={volPadL + ((w - 1) / 20) * volCW + volBarW / 2} y={116} textAnchor="middle"
                    fontSize="7" fontFamily="var(--font-mono)" fill="var(--text-quaternary)">S{w}</text>
                ))}
              </svg>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--sp-2)', marginTop: 'var(--sp-2)' }}>
                {Object.entries(FORMAT_COLORS).map(([fmt, color]) => (
                  <span key={fmt} style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 9, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
                    <span style={{ width: 6, height: 6, borderRadius: 1, background: color }} />{fmt}
                  </span>
                ))}
              </div>
            </StatCard>

    const progLastE1rm = progLiftStats ? (progLiftStats.history.length ? progLiftStats.history[progLiftStats.history.length - 1] : progLiftStats.record) : 0;

                    padding: 'var(--sp-3) var(--sp-4)',

                    fontFamily: 'var(--font-greek)', fontStyle: 'italic',

                  {/* Label + ⓘ inline */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{info.label}</span>

        {/* Standards Stele ATHX */}

                    <div style={{ width: '100%', height: 0, borderTop: `2px ${i === 2 ? 'dashed' : 'solid'} ${rep.color}` }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: rep.color }}>{rep.label}</div>
                    <div style={{ fontSize: 10, color: 'var(--text-tertiary)' }}>{rep.hint}</div>

                  <span className="ody-tactical" style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>kg</span>

  };

  /* ==========================================================
     ProgressionPage — E1RM curves per lift, per design handoff
     Tabs: Squat / Deadlift / Bench / OHP / Row

  const ProgressionPage = () => {

          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,

          }}>
            PROGRESSION · e1RM
          </div>
        </div>

        {/* Tabs */}
        <div style={{
          display: 'flex', gap: 'var(--sp-2)', marginBottom: 'var(--sp-4)',
          overflowX: 'auto', WebkitOverflowScrolling: 'touch',
        }}>
          {SEED_LIFTS.map(l => {
            const active = l.key === activeLift;
            return (
              <button key={l.key} type="button" onClick={() => setActiveLift(l.key)}
                style={{
                  padding: 'var(--sp-2) var(--sp-4)',
                  background: active ? 'var(--bg-surface)' : 'transparent',
                  border: active ? '1px solid var(--accent-laurel)' : '1px solid var(--border-subtle)',
                  borderRadius: 'var(--r-md)',
                  color: active ? 'var(--accent-laurel)' : 'var(--text-tertiary)',
                  fontSize: 12, fontWeight: 700, textTransform: 'uppercase',
                  letterSpacing: '0.08em', cursor: 'pointer', whiteSpace: 'nowrap',
                  fontFamily: 'var(--font-sans)',
                }}>
                {l.key === 'squat' ? 'Squat' : l.key === 'ohp' ? 'OHP' : l.name.split(' ')[0]}
              </button>
            );
          })}
        </div>

        {/* E1RM Totem Card */}
        {liftRef && liftStats && (
          <div className="ody-tablet" style={{ padding: 'var(--sp-4) var(--sp-5)', marginBottom: 'var(--sp-4)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 'var(--sp-3)' }}>
              <div>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>{liftRef.name}</Inscription>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 4 }}>
                  <Totem size={40} color="var(--accent-laurel)">{lastE1rm || '—'}</Totem>
                  <span className="ody-tactical" style={{ fontSize: 13 }}>kg</span>
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <Inscription size="xs" style={{ color: 'var(--text-tertiary)' }}>VS BASELINE</Inscription>
                <div style={{
                  fontSize: 16, fontWeight: 800, marginTop: 4,
                  color: deltaBaseline > 0 ? 'var(--accent-laurel)' : 'var(--text-primary)',
                  fontFamily: 'var(--font-mono)',
                }}>
                  {deltaBaseline > 0 ? '+' : ''}{deltaBaseline} kg
                </div>
              </div>
            </div>
            <E1RMCurve liftKey={activeLift} width={360} height={220} />
          </div>
        )}

        {/* Repaires Card */}
        {liftRef && liftStats && (
          <div className="ody-tablet" style={{ padding: 'var(--sp-4) var(--sp-5)' }}>
            <Inscription size="xs" style={{ color: 'var(--text-tertiary)', marginBottom: 'var(--sp-3)', display: 'block' }}>
              REPÈRES · {liftRef.name.toUpperCase()}
            </Inscription>
            {[
              { label: 'Record absolu', value: liftStats.record, color: 'var(--accent-olympus)', hint: 'max e1RM' },
              { label: 'e1RM actuel', value: lastE1rm, color: 'var(--accent-laurel)', hint: 'dernier PR' },
              { label: 'Baseline', value: liftStats.baseline, color: 'var(--text-tertiary)', hint: '1RM déclaré' },
            ].map((rep, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', gap: 'var(--sp-3)',
                padding: 'var(--sp-3) 0',
                borderTop: i > 0 ? '1px solid var(--border-subtle)' : 'none',
              }}>
                <div style={{
                  width: 24, display: 'flex', alignItems: 'center',
                }}>
                  <div style={{ width: '100%', height: 0, borderTop: `2px ${i === 2 ? 'dashed' : 'solid'} ${rep.color}` }} />
                </div>
                <div style={{ flex: 1 }}>

                  <div style={{ fontSize: 10, color: 'var(--text-tertiary)' }}>{rep.hint}</div>

                <Totem size={24} color={rep.color}>{rep.value || '—'}</Totem>

              </div>
            ))}
          </div>
        )}

  };

  const RepriseSemaineCard = () => {
    const [confirm, setConfirm] = useState(false);
    const [done, setDone] = useState(false);
    const activate = async () => {
      setConfirm(false);
      await db.prefs.put({ key: 'weekOverride', value: { week: 1, expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000 } });
      setDone(true);
      setTimeout(() => setDone(false), 2000);
    };
    return (
      <Card style={{ marginTop: 12 }}>
        <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
          Reprendre semaine
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
          Reviens à la semaine 1 du programme. Tes sets sont conservés. Utile pour reprendre après une coupure.
        </div>
        {confirm ? (
          <div>
            <div style={{ fontSize: 12, color: 'var(--text-primary)', marginBottom: 10 }}>
              Repartir à la Sem 1 ? Tes sets sont conservés.
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button type="button" onClick={() => setConfirm(false)}
                style={{
                  flex: 1, background: 'transparent', border: '1px solid var(--border-strong)',
                  borderRadius: 10, color: 'var(--text-secondary)', padding: '10px 14px',
                  fontSize: 12, fontWeight: 700, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                }}>ANNULER</button>
              <button type="button" onClick={activate}
                style={{
                  flex: 1, background: 'var(--accent-royal)', border: 'none',
                  borderRadius: 10, color: '#fff', padding: '10px 14px',
                  fontSize: 12, fontWeight: 800, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                }}>CONFIRMER</button>
            </div>
          </div>
        ) : (
          <button type="button" onClick={() => setConfirm(true)}
            style={{
              background: 'transparent', border: '1px solid var(--border-strong)',
              borderRadius: 10, color: 'var(--text-primary)',
              padding: '8px 14px', fontSize: 12, fontWeight: 700,
              letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
            }}>REPRENDRE SEM-1</button>
        )}
        {done && (
          <div style={{ marginTop: 10, fontSize: 13, color: 'var(--accent-laurel)' }}>Reprise Sem 1 active</div>
        )}
      </Card>
    );
  };

  const ReglagesPage = () => {
    const [pingState, setPingState] = useState({ status: 'idle', msg: '' });
    const [bodyweight, setBodyweight] = useState('');
    const [bwSaved, setBwSaved] = useState(false);
    const [resyncState, setResyncState] = useState({ status: 'idle', msg: '' });
    const [resyncConfirm, setResyncConfirm] = useState(false);
    const [histSyncState, setHistSyncState] = useState({ status: 'idle', msg: '' });
    const [histSyncConfirm, setHistSyncConfirm] = useState(false);
    const [histHasLocal, setHistHasLocal] = useState(false);

    const doResync = async () => {
      setResyncConfirm(false);
      setResyncState({ status: 'loading', msg: 'RESYNC...' });
      try {
        await db.programme.clear();
        seedInFlight = null;
        const result = await seedIfEmpty();
        if (result.ok) {
          setResyncState({ status: 'ok', msg: `Programme rechargé · ${result.count} exercices` });
        } else {
          setResyncState({ status: 'err', msg: result.error || 'Erreur inconnue' });
        }
      } catch (e) {
        setResyncState({ status: 'err', msg: 'Erreur — pas de connexion ?' });
      }
    };

    const doHistSync = async () => {
      setHistSyncConfirm(false);
      setHistSyncState({ status: 'loading', msg: 'RESYNC...' });
      try {
        if (histHasLocal) {
          await db.sets.clear();
          await db.sessions.clear();
        }
        const setsResult = await syncSetsFromBackend({ force: true });
        const sessResult = await syncSessionsFromBackend({ force: true });
        if (setsResult.error) throw new Error(setsResult.error);
        if (sessResult.error) throw new Error(sessResult.error);
        const sp = setsResult.pulled || 0;
        const se = sessResult.pulled || 0;
        setHistSyncState({ status: 'ok', msg: `Historique restauré · ${sp} sets · ${se} sessions` });
      } catch (e) {
        setHistSyncState({ status: 'err', msg: 'Erreur — pas de connexion ?' });
      }
    };

    const openHistSync = async () => {
      const [sc, sec] = await Promise.all([db.sets.count(), db.sessions.count()]);
      setHistHasLocal(sc > 0 || sec > 0);
      setHistSyncConfirm(true);
      setHistSyncState({ status: 'idle', msg: '' });
    };

    useEffect(() => {
      db.prefs.get('bodyweight').then(row => {
        if (row?.value) setBodyweight(String(row.value));
      });
    }, []);

    const saveBodyweight = async () => {
      const v = parseFloat(bodyweight);
      if (!Number.isFinite(v) || v <= 0) return;
      await db.prefs.put({ key: 'bodyweight', value: v });
      setBwSaved(true);
      setTimeout(() => setBwSaved(false), 1500);
      // Revalide les badges set-based qui dépendent du BW
      checkBadges().catch(() => {});
    };

    const ping = async () => {
      setPingState({ status: 'loading', msg: 'Test en cours…' });
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.ok) setPingState({ status: 'ok', msg: json.message || 'API alive' });
        else setPingState({ status: 'err', msg: json.error || 'Réponse inattendue' });
      } catch (e) {
        setPingState({ status: 'err', msg: e.message || 'Erreur réseau' });
      }
    };
    const pingColor = {
      idle:    'var(--text-tertiary)',
      loading: 'var(--accent-royal)',
      ok:      'var(--accent-laurel)',
      err:     'var(--accent-blood)',
    }[pingState.status];
    // Rewards UI state
    const [rewardsRefresh, setRewardsRefresh] = useState(0);
    const rewards = useRewards(rewardsRefresh);
    const [editingMilestone, setEditingMilestone] = useState(null);
    const [editingValue, setEditingValue] = useState('');

    const startEdit = (milestone) => {
      setEditingMilestone(milestone.id);
      setEditingValue(rewards?.[milestone.id]?.description || '');
    };
    const commitEdit = async () => {
      if (editingMilestone) {
        await saveReward(editingMilestone, editingValue.trim());
        setEditingMilestone(null);
        setEditingValue('');
        setRewardsRefresh(r => r + 1);
      }
    };
    const cancelEdit = () => { setEditingMilestone(null); setEditingValue(''); };

    // 1RM connus — saisie hors onboarding. Lecture : 1RM le plus récent
    // par exerciseName depuis db.oneRMs. Écriture : append d'une nouvelle
    // ligne { weight, reps:1, e1RM:weight, computedAt } sans écraser
    // l'historique. Les exerciseName matchent EXACTEMENT ceux de
    // ONBOARD_LIFTS — toute divergence casserait useBestE1RMFor.
    const [oneRMValues, setOneRMValues] = useState({});
    const [oneRMRefresh, setOneRMRefresh] = useState(0);
    const [editingLift, setEditingLift] = useState(null);
    const [oneRMEditValue, setOneRMEditValue] = useState(0);

    useEffect(() => {
      db.oneRMs.toArray().then(rows => {
        const latestByName = {};
        for (const r of rows) {
          const cur = latestByName[r.exerciseName];
          if (!cur || (r.computedAt || '') > (cur.computedAt || '')) latestByName[r.exerciseName] = r;
        }
        const map = {};
        for (const [name, row] of Object.entries(latestByName)) {
          map[name] = row.weight || row.e1RM || 0;
        }
        setOneRMValues(map);
      });
    }, [oneRMRefresh]);

    const startEditOneRM = (name, currentValue) => {
      setEditingLift(name);
      setOneRMEditValue(currentValue || 0);
    };
    const cancelEditOneRM = () => { setEditingLift(null); setOneRMEditValue(0); };
    const saveOneRM = async () => {
      if (!editingLift || oneRMEditValue <= 0) { cancelEditOneRM(); return; }
      await db.oneRMs.add({
        exerciseName: editingLift,
        weight: oneRMEditValue,
        reps: 1,
        e1RM: oneRMEditValue,
        computedAt: new Date().toISOString(),
      });
      setEditingLift(null);
      setOneRMEditValue(0);
      setOneRMRefresh(r => r + 1);
    };

    // Sounds toggle
    const [soundsOn, setSoundsOn] = useState(isSoundsEnabled());
    const toggleSounds = async () => {
      const v = !soundsOn;
      await setSoundsEnabled(v);
      setSoundsOn(v);
      if (v) play(soundLyre); // preview son
    };

    return (
      <PageWrap title="Réglages" subtitle="API · ATHX · sons · récompenses · reset">
        <Card>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            API Apps Script
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)', wordBreak: 'break-all', marginBottom: 10 }}>
            {API_URL}
          </div>
          <button
            type="button"
            onClick={ping}
            style={{
              background: 'transparent',
              border: '1px solid var(--border-strong)',
              borderRadius: 10,
              color: 'var(--text-primary)',
              padding: '8px 14px',
              fontSize: 12,
              fontWeight: 700,
              letterSpacing: '0.4px',
              textTransform: 'uppercase',
              cursor: 'pointer',
            }}
          >Test connexion</button>
          {pingState.status !== 'idle' && (
            <div style={{ marginTop: 10, fontSize: 13, color: pingColor }}>{pingState.msg}</div>
          )}
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Bodyweight (kg)
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 8 }}>
            Pour les badges Atlas (squat 2× BW) et Achille (bench 1× BW).
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="number"
              inputMode="decimal"
              step="0.1"
              value={bodyweight}
              onChange={e => setBodyweight(e.target.value)}
              placeholder="ex: 78"
              style={{
                flex: 1,
                background: 'var(--bg-primary)',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: 'var(--text-primary)',
                padding: '10px 12px',
                fontSize: 14,
                outline: 'none',
              }}
            />
            <button
              type="button"
              onClick={saveBodyweight}
              style={{
                background: bwSaved ? 'var(--accent-laurel)' : 'transparent',
                border: '1px solid var(--border-strong)',
                borderRadius: 10,
                color: bwSaved ? '#0D0F0E' : 'var(--text-primary)',
                padding: '8px 18px',
                fontSize: 12,
                fontWeight: 700,
                letterSpacing: '0.4px',
                textTransform: 'uppercase',
                cursor: 'pointer',
                transition: 'all var(--dur-fast) var(--ease-out)',
              }}

        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            1RM connus
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>

          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {ONBOARD_LIFTS.map(lift => {

              return (
                <div key={lift.id} style={{

                  border: '1px solid var(--border-subtle)',
                  borderRadius: 10,
                  padding: 12,
                }}>
                  {!isEditing ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{lift.name}</span>
                      <span style={{
                        fontSize: 14,
                        fontWeight: 700,
                        color: v > 0 ? 'var(--accent-laurel)' : 'var(--text-tertiary)',
                        minWidth: 60,
                        textAlign: 'right',

                        {v > 0 ? `${v} kg` : '—'}
                      </span>
                      <button type="button" onClick={() => startEditOneRM(lift.name, v)}
                        style={{
                          background: 'transparent',
                          border: '1px solid var(--border-strong)',
                          borderRadius: 8,
                          color: 'var(--text-secondary)',
                          padding: '0 14px',
                          fontSize: 11,
                          fontWeight: 700,

                          textTransform: 'uppercase',

                          minHeight: 56,

                    </div>
                  ) : (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 10, textAlign: 'center', letterSpacing: '0.5px' }}>
                        {lift.name}
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <Stepper
                          value={oneRMEditValue}
                          onChange={setOneRMEditValue}
                          steps={[-5, -2.5, +2.5, +5]}

                          fontSize={22}
                          max={500}
                        />
                      </div>
                      <div style={{ display: 'flex', gap: 8 }}>
                        <button type="button" onClick={cancelEditOneRM}
                          style={{
                            flex: 1,
                            background: 'transparent',
                            border: '1px solid var(--border-strong)',
                            borderRadius: 10,
                            color: 'var(--text-secondary)',
                            padding: '14px',
                            fontSize: 11,
                            fontWeight: 700,
                            letterSpacing: '1px',
                            textTransform: 'uppercase',
                            cursor: 'pointer',
                            minHeight: 56,
                          }}>Annuler</button>
                        <button type="button" onClick={saveOneRM}
                          disabled={oneRMEditValue <= 0}
                          style={{
                            flex: 1,
                            background: oneRMEditValue > 0 ? 'var(--accent-laurel)' : 'var(--bg-surface-hover)',
                            border: 'none',
                            borderRadius: 10,
                            color: oneRMEditValue > 0 ? '#0D0F0E' : 'var(--text-tertiary)',
                            padding: '14px',
                            fontSize: 11,
                            fontWeight: 800,
                            letterSpacing: '1px',
                            textTransform: 'uppercase',
                            cursor: oneRMEditValue > 0 ? 'pointer' : 'not-allowed',
                            minHeight: 56,

        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Programme
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Recharge le programme des 20 semaines depuis ta sheet Google. Tes sets, 1RM, badges et streak ne sont pas affectés.
          </div>
          {resyncConfirm ? (
            <div>
              <div style={{ fontSize: 12, color: 'var(--text-primary)', marginBottom: 10 }}>
                Recharger le programme depuis la sheet ? Tes sets, 1RM, badges, streak ne sont pas affectés.
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button type="button" onClick={() => setResyncConfirm(false)}
                  style={{
                    flex: 1, background: 'transparent', border: '1px solid var(--border-strong)',
                    borderRadius: 10, color: 'var(--text-secondary)', padding: '10px 14px',
                    fontSize: 12, fontWeight: 700, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                  }}>ANNULER</button>
                <button type="button" onClick={doResync}
                  style={{
                    flex: 1, background: 'var(--accent-blood)', border: 'none',
                    borderRadius: 10, color: '#fff', padding: '10px 14px',
                    fontSize: 12, fontWeight: 800, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                  }}>CONFIRMER</button>
              </div>
            </div>
          ) : (
            <button type="button" onClick={() => { setResyncConfirm(true); setResyncState({ status: 'idle', msg: '' }); }}
              disabled={resyncState.status === 'loading'}
              style={{
                background: 'transparent', border: '1px solid var(--border-strong)',
                borderRadius: 10, color: resyncState.status === 'loading' ? 'var(--text-tertiary)' : 'var(--text-primary)',
                padding: '8px 14px', fontSize: 12, fontWeight: 700,
                letterSpacing: '0.4px', textTransform: 'uppercase',
                cursor: resyncState.status === 'loading' ? 'not-allowed' : 'pointer',
              }}>{resyncState.status === 'loading' ? 'RESYNC...' : 'RESYNC PROGRAMME'}</button>
          )}
          {resyncState.status !== 'idle' && resyncState.status !== 'loading' && (
            <div style={{
              marginTop: 10, fontSize: 13,
              color: resyncState.status === 'ok' ? 'var(--accent-laurel)' : 'var(--accent-blood)',
            }}>{resyncState.msg}</div>
          )}
        </Card>
        <RepriseSemaineCard />
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Historique
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Récupère ton historique de sets et sessions depuis la sheet. Utile après un wipe ou changement de device.
          </div>
          {histSyncConfirm ? (
            <div>
              <div style={{ fontSize: 12, color: 'var(--text-primary)', marginBottom: 10 }}>
                {histHasLocal
                  ? 'Cela va remplacer ton historique local par celui de la sheet. Tes données locales seront perdues. Continuer ?'
                  : 'Resync historique depuis la sheet ?'}
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button type="button" onClick={() => setHistSyncConfirm(false)}
                  style={{
                    flex: 1, background: 'transparent', border: '1px solid var(--border-strong)',
                    borderRadius: 10, color: 'var(--text-secondary)', padding: '10px 14px',
                    fontSize: 12, fontWeight: 700, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                  }}>ANNULER</button>
                <button type="button" onClick={doHistSync}
                  style={{
                    flex: 1, background: histHasLocal ? 'var(--accent-blood)' : 'var(--accent-olympus)', border: 'none',
                    borderRadius: 10, color: histHasLocal ? '#fff' : '#0D0F0E', padding: '10px 14px',
                    fontSize: 12, fontWeight: 800, letterSpacing: '0.4px', textTransform: 'uppercase', cursor: 'pointer',
                  }}>CONFIRMER</button>
              </div>
            </div>
          ) : (
            <button type="button" onClick={openHistSync}
              disabled={histSyncState.status === 'loading'}
              style={{
                background: 'transparent', border: '1px solid var(--border-strong)',
                borderRadius: 10, color: histSyncState.status === 'loading' ? 'var(--text-tertiary)' : 'var(--text-primary)',
                padding: '8px 14px', fontSize: 12, fontWeight: 700,
                letterSpacing: '0.4px', textTransform: 'uppercase',
                cursor: histSyncState.status === 'loading' ? 'not-allowed' : 'pointer',
              }}>{histSyncState.status === 'loading' ? 'RESYNC...' : 'RESYNC HISTORIQUE'}</button>
          )}
          {histSyncState.status !== 'idle' && histSyncState.status !== 'loading' && (
            <div style={{
              marginTop: 10, fontSize: 13,
              color: histSyncState.status === 'ok' ? 'var(--accent-laurel)' : 'var(--accent-blood)',
            }}>{histSyncState.msg}</div>
          )}
        </Card>
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Sons
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Lyre sur PR battu, cloche sur badge / fin de bloc, tick sur milestones timer.
          </div>
          <button type="button" onClick={toggleSounds}
            style={{
              width: '100%',
              background: soundsOn ? 'var(--accent-laurel)' : 'transparent',
              border: `1px solid ${soundsOn ? 'var(--accent-laurel)' : 'var(--border-strong)'}`,
              borderRadius: 10,
              color: soundsOn ? '#0D0F0E' : 'var(--text-primary)',
              padding: '10px 14px',
              fontSize: 12,
              fontWeight: 700,
              letterSpacing: '1.2px',
              textTransform: 'uppercase',
              cursor: 'pointer',
            }}>{soundsOn ? '◉ Activés' : '◎ Désactivés'}</button>
        </Card>

        {/* Récompenses tangibles auto-définies (Étape 12) */}
        <Card style={{ marginTop: 12 }}>
          <div style={{ color: 'var(--text-secondary)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '1.5px', fontWeight: 700, marginBottom: 8 }}>
            Mes récompenses
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 10 }}>
            Promesse physique pour chaque milestone. Contrat avec toi-même.
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {REWARD_MILESTONES.map(m => {
              const reward = rewards?.[m.id];
              const isEditing = editingMilestone === m.id;
              return (
                <div key={m.id} style={{
                  background: 'var(--bg-primary)',
                  border: '1px solid var(--border-subtle)',
                  borderRadius: 10,
                  padding: '10px 12px',
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 4 }}>{m.label}</div>
                  {isEditing ? (
                    <div style={{ display: 'flex', gap: 6 }}>
                      <input
                        type="text"
                        value={editingValue}
                        onChange={e => setEditingValue(e.target.value)}
                        autoFocus
                        placeholder="Ex: t-shirt training"
                        style={{
                          flex: 1,
                          background: 'var(--bg-surface)',
                          border: '1px solid var(--border-strong)',
                          borderRadius: 8,
                          color: 'var(--text-primary)',
                          padding: '6px 10px',
                          fontSize: 12,
                          outline: 'none',
                        }}
                      />
